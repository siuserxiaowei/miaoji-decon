var SRC = "> 场景：杨帆出海社群 · 广州 · 智能硬件主题午餐会，约 25 位创始人轮流自我介绍 + 百道数据(谷歌云代理)/谷歌商业化嘉宾分享，饭桌上深聊玄学与商业模式。\n> ⚠️ 飞书原 AI 摘要把这场总结成\"客户购车/活动安排\"——彻底没接住。这其实是一张 **AI 硬件出海的行业横切面**。\n\n## ⏱ 如果只读 10 分钟（8 条带走判断）\n\n1. **硬件不再靠硬件赚钱**。整桌共识：硬件正从\"卖一次赚差价\"变成\"服务入口\"，钱在后端的订阅 / 广告 / 增值服务。把硬件当成一个能持续收费的入口来设计。\n2. **硬件广告变现是被低估的金矿**。谷歌的人现场说：一套 SDK 植入硬件，成本极低、收入很高，去年摄像头企业测试效果极好。你做硬件/App，先问能不能加广告变现这条后端收入。\n3. **出海是这桌人的默认动作**，不是选项。北美、越南、拉美、东南亚都有人在打；不出海几乎没人讨论。\n4. **众筹是智能硬件出海首发的标准打法**。追觅、安克、绿联都靠海外众筹卖期货首发；但\"没音量就没水花\"，众筹本质是营销战不是筹钱。\n5. **\"咨询便宜、改命贵\"**——所有卖建议的生意都是前端低价诊断引流、后端高价订阅复购（算命：咨询几百块，改命 800 万，改回来 1200 万）。\n6. **方案商最大的命门是版权归甲方**。一家方案商把产品全套做出来、预售 800 台，结果投资人撤了换人做，前功尽弃。做方案商要想清楚这个结构性风险。\n7. **品牌化是硬件唯一抄不走的护城河**。功能、渠道、模型都能抄，物料质感和审美抄不走——但要每天坚持。\n8. **国内没有订阅习惯**。同一个产品，海外能做订阅，国内\"只能打包卖一次\"。变现模式要分国别设计。\n\n## 🎯 这篇真正能学什么\n\n这不是一场\"谁卖了什么\"的产品展，而是一张 **AI 硬件出海的商业模式地图**。值得学的是四件事：①硬件靠什么后端变现（订阅/广告/软硬结合）；②出海怎么落地（众筹/线下渠道/本地化）；③哪些赛道正在风口（情绪疗愈/AI玩具/AI珠宝）；④哪些商业模式有结构性坑（方案商版权、国内订阅、玄学合规）。读完别记产品，记这四张图。\n\n## 🧭 道法术器势（→ 你可以怎么用）\n\n| 层 | 本场对应（榨干版） | 你可以怎么用 |\n|---|---|---|\n| **道** 明向 | 硬件价值从\"一次性硬件利润\"转向\"持续服务入口\"；情绪/玄学=心理刚需的商业化外壳；中外消费习惯不同（国内无订阅习惯） | 设计产品先问：我赚的是一次性差价，还是能持续收费的入口？我卖的是不是真刚需？ |\n| **法** 立本 | 品牌化护城河 vs 铺量；方案商 vs 自有品牌两种命（版权风险）；玄学\"咨询便宜+改命贵\"漏斗 | 把\"低价诊断引流 + 高价复购变现\"套到你的生意；做方案商先把版权/分成写死 |\n| **术** 立策 | 海外众筹首发（全链路营销）；线下沙龙/展会体验式卖货；端侧大模型当隐私卖点；矩阵/闲鱼获客 | 选一个最小动作：设计一次\"现场能玩能拍能聊\"的体验，或跑一场众筹/沙龙测市场 |\n| **器** 成事 | 广告变现 SDK；AI token 聚合平台（成本1000多卖3000多）；自研 OpenCore 省 50% 算力；众筹/招商/局的资源网 | 给硬件接一条后端变现（广告SDK/增值订阅）；做品牌别押一折中转 token |\n| **势** 察时 | AI 硬件出海是大势；情绪/疗愈/AI玩具/AI珠宝正起但\"非常卷\"；硬件广告变现是新窗口 | 趁窗口进，但避开最卷的红海；优先卡\"有后端变现\"的细分；自己核实宏观数字 |\n\n## 📚 深挖：8 个值得单独学的知识点\n\n### 1. 硬件的三条后端变现路径（这是全场的\"道\"）\n百道/谷歌反复讲：硬件别赚一次性利润，要变成\"持续服务入口\"。三条路：\n- **订阅/增值服务**：翻译耳机→跨文化助手、摄像头→宠物情绪陪伴、音箱→帮你规划旅行，靠订阅 App 持续收费。\n- **广告变现（最实）**：谷歌的人——\"一套 SDK 加进去，成本很低、收入很高\"，去年摄像头企业测试效果极好，已成不错利润来源。\n- **软硬结合**：小游戏盒子塞进硬件 App 做\"游戏中心\"，靠游戏内广告分成给硬件做增益。\n**你能用**：你的硬件/App，至少接一条后端收入，别只靠卖货那一锤子。\n\n### 2. 国内没有订阅习惯——变现模式必须分国别\n现场原话：\"中国人没有订阅习惯，国内只能打包卖。\" 同一产品，海外做订阅、国内做买断。这解释了为什么这桌一半人\"今年不做国内、只做海外众筹\"。**你能用**：定价/变现先分国别想，别把海外订阅模型套到国内。\n\n### 3. 众筹 = 智能硬件出海的首发引擎（不是筹钱，是营销战）\n肉肉（众筹 KOL）揭底：追觅/安克/绿联新品都通过海外众筹平台\"卖期货\"首发；操盘是页面搭建+广告投放+红人+PR+社群的**全链路营销**。关键认知：\"没有一定音量，众筹也没水花\"；很多人众筹其实是为了**测市场评测**。**你能用**：硬件出海首发优先考虑众筹，但先攒\"音量\"（红人/社群/PR）再上。\n\n### 4. 方案商的结构性死穴：版权归甲方\n花眼科技（自称小白、做了 7 个月、12 人）血泪：全套帮投资人做出来、预售 800 多台，结果**投资人撤了、换人做，版权全归甲方**，前功尽弃。\"方案商就是会遇到这种情况。\" **你能用**：做方案商先把版权归属、分成、撤场条款白纸黑字写死；想做长久价值就得有自有品牌。\n\n### 5. 品牌化是硬件唯一抄不走的护城河\n博林（玄学饰品，走品牌化、样品现场卖光）：\"功能/玩法可以像素级抄，但物料质感、审美、调性堆出的认知抄不走——只是要每天坚持。\" 对照铺量党：用便宜模型直接调、不管品牌。**你能用**：选你最强的一个产品，把包装/物料/内容细节做到\"超出用户对数码产品的预期\"。\n\n### 6. 玄学/情绪健康是密集赛道，底层是\"心理刚需\"\n一桌至少 5 家做情绪/疗愈硬件：关爱科技(助眠梦伴，7月海外众筹)、彼岸心智(情绪识别算法+冥想坐垫=AI私教)、博林(玄学卦象CPT心理)、声波疗愈、AI珠宝。底层逻辑：\"玄学不是迷信，是心理刚需的外壳——花 100 万买 2000 万的安心。\" **你能用**：把\"情绪价值/安心感\"当成可定价的真需求；但赛道\"非常卷\"，要找有后端变现的细分。\n\n### 7. 玄学命理的变现漏斗 = 一切咨询生意的通用结构\n香港命理师对大陆老板：线上算命几百块\"就是玩\"（前端引流）→ 真钱在\"调运/改命\"的订阅复购（改运 800 万、改回 1200 万）。这桌人做的是\"中成药版\"——提取有效成分(缓解焦虑)、合理价格卖。**你能用**：诊断便宜到无脑买，治疗贵到年年付——教育/咨询/AI 工具都能套。**不要误读成**把前端咨询费卖贵。\n\n### 8. AI token / 算力本身就是一门生意\n- 龙虾盒子：甲方在卖、方案商负责做，**所有 A token 都在方案商这付费续费**，相当于接了 API 聚合平台帮甲方输送 token（成本 1000 多、卖 3000 多）。\n- 自研 OpenCore：同样的 Skill 省 50% 算力，帮个人卖家/工厂一键部署出海。\n- 工业级算力盒子：把充电桩闲置电力转化成 token 输送给企业。\n**你能用**：如果你服务一堆中小硬件/出海客户，\"帮他们管 token/算力\"本身就是可持续收费点。\n\n## 🛠 可直接复用的方法（含\"不要误读成\"）\n\n**方法 1：给硬件接一条后端变现**\n- 核心意思：硬件利润薄，真正的钱在后端订阅/广告/软硬结合。\n- 你可以怎么用：评估你的产品能不能加广告 SDK，或设计一个增值订阅。\n- 不要误读成：把硬件卖更贵——后端变现才是复利。\n\n**方法 2：低价诊断 + 高价复购漏斗**\n- 核心意思：前端诊断便宜到无脑买做获客，后端治疗/订阅反复复购挣钱。\n- 你可以怎么用：前端给 9.9 或免费诊断，后端设计可持续复购的服务。\n- 不要误读成：把前端咨询费卖贵——那样获客就死了。\n\n**方法 3：出海首发用众筹，但先攒音量**\n- 核心意思：众筹是营销战，靠红人/PR/社群把\"音量\"做起来再上。\n- 你可以怎么用：上众筹前先用内容/红人攒一波关注，否则没水花。\n- 不要误读成：众筹=被动等人来投——没音量的众筹大多扑街。\n\n## 📅 7 天作业\n\n- **Day 1**：列出你产品\"功能上能被抄的 3 条\"和\"认知/品牌上抄不走的 3 条\"。\n- **Day 2**：给你的硬件/生意设计一条后端变现（广告 SDK / 增值订阅 / 软硬结合），算清单用户能多收多少。\n- **Day 3**：设计一个\"便宜到无脑买\"的前端诊断款 + 对应的后端复购款。\n- **Day 4**：拆 3 个同行，看他们靠功能、品牌还是后端变现赚钱。\n- **Day 5**：给产品设计一个\"现场能玩、能拍、能聊\"的线下体验动作。\n- **Day 6**：如果要出海，列出目标市场（北美/东南亚/拉美）+ 首发方式（众筹/独立站/分销），各写一条落地路径。\n- **Day 7**：找 3 个目标客户，验证他们愿不愿为\"情绪/品牌/服务订阅\"多付钱。\n\n## 🤔 回到自己业务的追问\n\n- 我赚的是一次性差价，还是能持续收费的入口？\n- 我的壁垒是功能（可抄）还是品牌/认知（不可抄）？\n- 我能不能把诊断做到无脑买，把钱挣在后端复购？\n- 我的变现模式分国别了吗（国内买断 vs 海外订阅）？\n- 我踩在风口窗口期，还是在最卷的红海里挤？\n- 如果我是方案商，版权/分成/撤场条款写死了吗？\n- 我有没有被\"宏观大趋势数字\"忽悠，而没核实真实需求？\n\n## 👥 关键人物与资源（这桌人能给你什么）\n\n| 人 | 是谁 | 对你的价值 |\n|---|---|---|\n| **郭总** | 前网易有道/严选海外负责人；现做美国品牌出海全案（合作 2 万+ 线下门店、独立站、TikTok、自有分销平台、AI 工具），常驻硅谷/洛杉矶 | 出海**美国线下落地**的最强节点 |\n| **申屠一** | 现网易有道，AI 教育硬件出海（词典笔/答疑笔/听力宝），越南首站、9 门学科 | AI 教育硬件出海**本地化**经验 |\n| **Sherry 李（李孟聪）** | 谷歌商业化变现，推硬件**广告变现 SDK**，前 Lazada | 硬件加广告变现的对接人 |\n| **肉肉** | 海外**众筹 KOL**，服务追觅/安克/绿联，全链路营销 + 投融资对接 | 硬件出海众筹首发 + 找投资 |\n| **严波（关爱科技）** | 助眠硬件\"关爱梦伴\"，大理疗愈起家，学术派，7 月海外众筹 | 情绪/睡眠赛道对标 |\n| **刘颖（彼岸心智）** | 情绪识别算法 + 冥想坐垫 AI 私教 | 情绪硬件算法对标 |\n| **刘萍萍（智象未来）** | AI 视频生成 + 广告机（与移动合作），刚融 5 亿 | AIGC 软硬结合标杆 |\n| **Emma** | 协会运营（不收会员费，只邀优质硬件品牌办私密活动，深圳湾游艇会） | 硬件圈**资源对接局**入口 |\n| **Binmax** | 程序化广告 + 硬件广告变现 + AI token 服务 | 广告变现 + token 服务 |\n\n## 💬 金句\n\n- \"你卖的最贵的其实是改命。\"——低价获客、高价复购的极致注解。\n- \"他花 100 万，是买个 2000 万的安心。\"——情绪/玄学消费的本质。\n- \"一套 SDK 加进去，成本很低，收入很高。\"——硬件广告变现的诱惑。\n- \"中国人没有订阅习惯，国内只能打包卖。\"——变现分国别的硬约束。\n- \"我可以把品牌抄了，但品牌很多人不会每天（坚持做）。\"——护城河的真相。\n\n## ⚠️ 来源边界\n\n本篇基于飞书妙记逐字稿整理；人名以 ASR 识别为准（如\"申屠一\"\"郭总\"等可能有偏差，真实姓名待核）；宏观数字（如心理医生缺口 600 万、广告变现收入规模）为现场销售口径，未独立核实，使用前请存疑；不含原始逐字稿正文。";
