var SRC = "> 场景：一顿广州饭桌局，约 5-6 人（\"涛哥/浩哥/超哥/宝哥\"似为同一人——一个做 AI 产品出海+API 中转站的操盘手，全程主讲；东道主是 siuser 小伟/佳伟老师，其余是做跨境电商代写、视频号、想入局做站的朋友）。边吃边聊，没有 PPT、没有议程，是一场\"老炮儿当桌输出方法论\"的非正式分享。\n> ⚠️ 飞书原关键词把这场总结成\"豆包/语音输入法/网站/流量/工作流\"——抓的都是表层词。真正的主线是：**一个人怎么用 AI 把\"全栈式 AI 产品出海\"（卖铲子 HiAPI + 掘金 SEO 站群 + 自媒体导流 + 出海合规）跑成系统**，以及\"技术人正在被 AI 抹平壁垒\"这条焦虑底色。这桌话密度不低，但夹在大量点餐/付款/拍照噪声里，需要靠上下文拎出来。\n\n## ⏱ 如果只读 10 分钟（7 条带走判断）\n\n1. **\"卖铲子 + 自己掘金\"两条腿一起走，是这个人的核心打法**。他原话：\"我们既要卖铲子，我还要去掘金。\"掘金（做产品/站群）有失败风险，卖铲子（API 中转/工具）少赚但稳赚——用确定性现金流养不确定性的高赔率尝试。\n\n2. **AI 产品的打法和老互联网\"烧钱获客、边际成本归零\"已经不是一回事**。他点名对比：OpenAI/谷歌是烧钱获客的老打法，Anthropic 是\"上来就对企业收钱\"的新打法（并引\"Anthropic 年初 80 亿、5 个月后 400 亿 ARR\"——*销售口径，存疑待核*）。做产品要想清楚你走哪条。\n\n3. **\"刷 token 量\"被他当成一个人 AI 段位的硬指标**。他自述一个月烧约 800 美金（Claude Max 20x ≈650刀 + Google Ultra 250刀），并放话\"100 美金都用不到就是非常不合格\"。底层逻辑：token 烧得够，你才懂业务流程怎么审、怎么优化；只买个 20 块 Plus 问问 GPT/豆包\"根本不算用 AI\"。*这是激励/贩卖焦虑口径，别照单全收，但\"用量=熟练度\"的方向有道理。*\n\n4. **SEO 站群 = 持续种树，不是速成**。他的方法：VB code 出新站→打磨一两周→直接发导航站外链（ADSY 等博客也发）→让 AI 每天写文章→用 GSC 数据反向优化排名。明确反对\"抢新词新站\"（见效快但没量了就没量）。一个 codex 词长期排前三就能吃掉大量流量。\n\n5. **自媒体是加法、产品是十倍杠杆**——他用亲身数据背书：\"做了 5 年自媒体，去年做一年产品，收益增长 10 倍。\"但他没有抛弃自媒体，而是把推特当出海产品的\"冷启动基本盘\"和流量收益来源（自述推特流量分成一个月三四千，是公众号的 7-8 倍）。\n\n6. **逆向/中转的合规红线是\"在哪逆向、给谁用\"**。他的说法：逆向国外模型给全球用户 = 没人管；逆向字节豆包/MiniMax 等国内模型 = 容易出事。\"东南亚那些出问题就是因为搞国内\"。人在国内 vs 海外、税务是否交换（美国不和中国换、香港/新加坡 CRS 会换）都是变量。*这是灰产边缘话题，仅作信息记录，不构成任何操作建议。*\n\n7. **知识付费的旧模式（卖信息差、卖课、卖陪伴）正在塌，下一层是\"卖结果\"**。他反复说：盗版 20 块能买到你 3000 块的课，纯知识博主的信息差\"变得很少了\"，社群要升级到\"帮学员拿到结果他才续费\"。点名周德龙、刘思毅等头部博主\"很焦虑、AI 用得很差\"。\n\n## 🎯 这篇真正能学什么\n\n这不是一场结构化分享，而是一个\"已经跑通 AI 产品出海\"的人在饭桌上**无防备地暴露他的操作系统**。值得学的是三张图：①**业务架构图**——卖铲子（HiAPI/中转）+ 掘金（SEO 站群+小产品）+ 自媒体（推特冷启动）怎么互相喂；②**个人能力观**——他怎么用\"刷 token 量/买 Mac/买社群\"来定义\"跟不跟得上 AI\"；③**生态焦虑图**——技术壁垒被抹平、大厂裁员、知识付费塌方背后的同一条逻辑。读完别记他买了几台 Mac mini，记这三张图和它们背后的判断。\n\n## 🧭 道法术器势（→ 你可以怎么用）\n\n| 层 | 本场对应（榨干版） | 你可以怎么用 |\n|---|---|---|\n| **道** 明向 | AI 把\"技术壁垒\"抹平了，会写代码不再是护城河，能用 AI 跑通业务流程的人才是；产品 > 自媒体（十倍杠杆 vs 加法）；做产品比做知识付费\"纯粹\"（聊业务不聊卖课） | 别再把\"我会不会写代码\"当资产；问自己：我有没有一件\"十倍杠杆\"的事在做，还是只在做加法？ |\n| **法** 立本 | 卖铲子+掘金双轮：用确定性现金流（中转/工具）养高赔率尝试（站群/产品）；产品养出\"基本盘\"再用自媒体冷启动；社群是攒资源不是赚钱 | 把你的业务拆成\"稳赚的铲子\"和\"博赔率的金矿\"两层，先确保有铲子兜底再去掘金 |\n| **术** 立策 | SEO 站群 SOP：VB code 起站→打磨 1-2 周→发导航站外链→AI 日更文章→GSC 反向优化；推特群\"抱团带量\"互相转发做冷启动；做产品先\"抄\"一个对标站再迭代 | 选一个最小动作：起 1-2 个站挂着、让 AI 每天发外链/文章；或进一个能互相转发的推特/出海群把流量带起来 |\n| **器** 成事 | HiAPI（多模态图像/视频中转，对接 100+ 模型）；Claude Code/Codex；小龙虾（openclaw）自动发文+驱动飞书；豆包语音输入法 vs Typeless（写文章 vs vibe coding）；128G 内存 Mac / 多台 Mac mini 跑多客户端 | 给自己配齐\"能多开 agent\"的机器；写作类用保留口语风格的语音输入、coding 类用会渲染结构的工具，分场景选器 |\n| **势** 察时 | AI 行业\"三四个月看不清\"，模型价格在涨（他说 Codex 5.5 已是 5.3 的 4 倍）、账号封号变严；大厂裁员（CloudFlare/Meta/Salesforce）；知识付费从卖课→卖结果 | 趁现在 token 还便宜、自己还能练，把 AI 使用技巧吃透；别等价格涨上来、壁垒拉开了才学 |\n\n## 📚 深挖：8 个值得单独学的知识点\n\n### 1. \"卖铲子 + 掘金\"双轮：用确定性养不确定性\n他原话：\"我们现在是全栈，我们既要卖铲子，我还要去掘金。掘金这过程中有一定失败风险，但卖铲子这个过程中我可以少赚钱，但我肯定是赚钱。\"铲子是 HiAPI/中转站（少赚但稳赚），金矿是 SEO 站群和小产品（可能扑街也可能十倍）。\n- **为什么重要**：这是个人/小团队对抗高失败率的经典资金结构——别让所有筹码都压在赔率项上，先用一条稳定现金流给自己兜底和续命。\n- **你能用**：盘一下你的业务里哪条是\"铲子\"（旱涝保收）、哪条是\"金矿\"（博大的），如果只有金矿没有铲子，优先补一条铲子。\n\n### 2. AI 产品 ≠ 互联网产品：从\"烧钱归零\"到\"上来收钱\"\n他点破两套打法：\"互联网产品是疯狂烧钱获客、边际成本归零，这是 OpenAI、谷歌的打法；但 Anthropic 的打法是上来就对企业客户收钱。\"并以 Anthropic ARR \"年初 80 亿、5 个月后 400 亿\"佐证（*销售口径，数字夸张，务必独立核实*）。AI 产品的边际成本（token/算力）不为零，所以纯烧钱获客的老剧本不一定成立。\n- **为什么重要**：很多人还在用\"先免费烧规模再变现\"的互联网思维做 AI 产品，但 AI 每个用户都在烧真金白银的推理成本，变现模型必须前置。\n- **你能用**：设计 AI 产品时先算清单用户的 token 成本和付费意愿，别默认\"先免费做大再说\"。\n\n### 3. \"刷 token 量\"= AI 段位的硬指标（注意是激励口径）\n他把\"一个月烧多少 token\"直接等同于一个人的 AI 水平：\"你刷的 token 量不够，意味着你对整个业务流程不知道怎么去审 token、怎么去快速优化；只买个 20 块 PLUS 问问 GPT、问问豆包，根本不算用 AI。\"自述配置：Claude Max 20x(约650刀)+Google Ultra(250刀)≈800刀/月，128G Mac 跑 8 个客户端、全 1.5 倍高速。\n- **为什么重要**：抛开贩卖焦虑的成分，内核是对的——**AI 能力是练出来的，量变（大量真实任务喂进去）才有质变**，光\"聊天问问题\"确实学不到业务级用法。\n- **你能用**：与其纠结订哪个会员，不如逼自己把真实业务任务大批量丢给 agent 跑，在跑的过程中学会\"审 token、控质量、并行多开\"。**不要误读成**\"烧钱越多越牛\"——烧在真实业务上才算数，乱烧只是浪费。\n\n### 4. SEO 站群方法论：种树，不抢新词\n完整 SOP：①VB code 起新站；②打磨一两周确认没大问题再发外链；③直接发导航站（含 ADSY 这类博客）外链，\"站只要不太挫就直接发\"；④让 AI 每天写 SEO 文章、发朋友圈保持活跃和收录；⑤用 GSC（Google Search Console）数据反向优化，把排名顶上去。明确**不做新词新站**——\"见效快但没量了就没量了\"，而是持续做品牌站，\"种树要给半年一年\"。\n- **为什么重要**：这是低成本、可被 AI 自动化的长期流量打法，和\"投流速成\"是两条路。关键洞察是\"正确方向上持续做\"，最怕\"做两天停两天、心态波动大\"。\n- **你能用**：起 1-2 个方向正确的站先挂着，配 AI 日更外链/文章，盯 GSC 数据迭代；把它当种树而非种菜。\n\n### 5. 自媒体当\"冷启动基本盘\"，产品才是十倍杠杆\n他的核心判断：\"自媒体的增量就是做加法，没有太大杠杆。我做了 5 年自媒体，去年做一年产品，收益增长 10 倍，直接干过过去几年。\"但他没弃掉自媒体，而是把推特重定位成**出海产品的冷启动引擎**——组推特群让大家互相转发带量（\"向阳乔部发一条推特，我们中转量增加 800 人\"），同时推特流量分成本身也能赚（自述一个月三四千，是公众号 7-8 倍）。\n- **为什么重要**：这解决了\"做产品没流量、做自媒体没杠杆\"的两难——用自媒体的低成本曝光给产品做冷启动，是\"基本盘 × 杠杆项\"的组合。\n- **你能用**：如果你有自媒体底子，别只把它当变现终点，把它当成给你下一个产品导流的冷启动资产。\n\n### 6. 逆向/中转的合规边界：在哪逆向、给谁用、税务换不换\n他给的\"安全口径\"：逆向国外模型、面向全球用户 = 基本没人管；逆向国内模型（字节豆包、MiniMax 等）= 容易出事，\"东南亚那些出问题就是搞了国内\"。延伸到税务：人在海外/美国主体赚的钱国内查不到，但\"钱不能进香港/新加坡\"（CRS 税务信息交换），\"美国不和中国交换\"。还提到额度低（账户几十万）没人管、额度大才有风险。\n- **为什么重要**：作为信息可以理解灰色业务的风险地图——风险不在\"做没做\"，而在\"对象、地域、规模、资金路径\"。\n- **你能用**：仅作认知记录。**不要误读成**操作指南——逆向破解、跨境避税都有明确法律风险，本条不构成任何建议，真要碰需独立法律/税务咨询。\n\n### 7. 知识付费的终局：从卖信息差/卖课/卖陪伴 → 卖结果\n他给知识付费排了进化序列：\"以前卖信息差、卖课，再卖陪伴（顶峰会/千里会卖陪伴）；但现在用户盗版 20 块能买到你 3000 块的东西，纯知识博主的信息差变得很少了，下一层得是**帮学员拿到结果，他才续费**。\"点名周德龙、刘思毅等头部博主\"很焦虑、AI 用得很差\"，文科生对 AI 天生有恐惧、老板不带头用就搞不起来。\n- **为什么重要**：这是 AI 时代对所有\"卖认知\"生意的通用判断——信息和课程在贬值，\"交付结果\"在升值。\n- **你能用**：如果你在做任何教育/咨询/社群，问自己：我卖的是信息差（在贬值）还是结果（在升值）？把交付从\"讲明白\"逼到\"带学员做出结果\"。\n\n### 8. 语音输入分场景选器：豆包（保口语）vs Typeless（会渲染）\n一个很实操的细节：他说**写文章用豆包语音输入法**（保留\"兄弟们干就完了\"这种口语风格和个人调性），**做 vibe coding 用 Typeless**（背后接 Claude/ChatGPT API，会把语音渲染成有条理的结构，但会洗掉口语味）。并引\"姚顺宇在张小军采访里说豆包语音 API 模型全世界独一档\"（*转述口径，待核*），延伸出一个产品机会：有人接豆包语音 API（据说 50 块用几个月）自己 vibe code 一个输入法，做成\"口语风格/结构化渲染\"两种模式可切换。\n- **为什么重要**：同一类工具（语音转写）在不同任务下要选不同的——写作要保你的\"人味\"，coding 要的是结构化准确。这是\"按场景选器\"的好例子，也是一个真实的小产品缺口。\n- **你能用**：写作和写代码别用同一个语音输入设置；如果你想做小工具，\"语音输入法套壳 + 数据在自己手里\"是个被点名的可做方向。\n\n## 🛠 可直接复用的方法（含\"不要误读成\"）\n\n**方法 1：卖铲子 + 掘金 双轮兜底**\n- 核心意思：用稳赚的工具/服务现金流，养高赔率的产品尝试。\n- 你可以怎么用：先确保有一条旱涝保收的\"铲子\"业务，再拿它的现金流去博\"金矿\"。\n- 不要误读成：什么都做=全栈——他能双轮是因为铲子已经跑通有钱兜底，不是上来铺摊子。\n\n**方法 2：SEO 站群\"种树式\"长期主义**\n- 核心意思：起站→打磨→AI 日更外链文章→GSC 反向优化，持续半年一年。\n- 你可以怎么用：起 1-2 个正确方向的站挂着自动养，盯数据迭代，别频繁起新站抢新词。\n- 不要误读成：站群=速成流量——他明确说\"两天起飞两天崩\"的心态波动是最大的坑，靠的是熬。\n\n**方法 3：用真实业务\"刷量\"练 AI**\n- 核心意思：把大量真实任务丢给 agent 并行跑，在跑中学会审/控/优化。\n- 你可以怎么用：本周挑一批你平时手动做的活，逼自己全部用 agent 跑一遍。\n- 不要误读成：\"烧钱越多越牛\"——烧在真任务上才长能力，为了刷量而刷量是纯浪费。\n\n**方法 4：自媒体当产品冷启动引擎**\n- 核心意思：用自媒体的低成本曝光给产品导流，再用产品收益反哺。\n- 你可以怎么用：把你的账号/社群当成下一个产品的冷启动资产，做\"抱团互相带量\"。\n- 不要误读成：自媒体本身能赚大钱——他明说自媒体是加法、没杠杆，它的价值在于给产品引流。\n\n## 📅 7 天作业\n\n- **Day 1**：把你现在的业务画成\"铲子 vs 金矿\"两层图——哪条旱涝保收、哪条博大的？如果没有铲子，列出一条能兜底的稳定现金流候选。\n- **Day 2**：挑一批你平时手动做的真实任务（哪怕琐碎），全部丢给 Claude Code/Codex 或 agent 并行跑一遍，记录你\"学会了哪个新用法\"。\n- **Day 3**：起 1 个最小站（VB code/套模板都行），接上\"让 AI 每天写一篇文章 + 发一条外链\"的自动流程，挂着养。\n- **Day 4**：打开 GSC（或同类工具）看一个你已有站/页的搜索数据，挑一个有曝光没点击的词做一次反向优化。\n- **Day 5**：盘你的自媒体资产，设计一个\"用它给某个产品冷启动\"的具体动作（比如约 2-3 个同行互相转发）。\n- **Day 6**：把你写作和写代码的语音/AI 输入工具分场景配一次——写作保口语风格、coding 要结构化。\n- **Day 7**：如果你在做任何\"卖认知\"的生意，写下你现在卖的是\"信息差/课/陪伴/结果\"中的哪一层，再写一条\"往结果层升级\"的动作。\n\n## 🤔 回到自己业务的追问\n\n- 我的业务有没有\"铲子\"兜底，还是全压在金矿上、一扑街就归零？\n- 我做的事是十倍杠杆（产品/系统），还是只是做加法（多发一篇、多接一单）？\n- 我对 AI 是\"聊天问问题\"级，还是\"丢真实业务进去跑\"级？差距在哪？\n- 我的流量是种树（持续 SEO/内容）还是种菜（投流/抢新词，停了就没）？\n- 我有没有一个能给下一个产品冷启动的\"基本盘\"资产？\n- 我卖的是信息差/课（在贬值），还是结果（在升值）？\n- 我会不会因为\"老业务还赚钱\"而没动力转型，等壁垒被抹平才慌？\n\n## 👥 关键人物与资源（这桌人能给你什么）\n\n> ⚠️ 这桌人 ASR 称呼极混乱，\"涛哥/浩哥/超哥/宝哥\"高度疑似同一主讲人，真名待核；下表按\"角色\"而非姓名整理更可靠。\n\n| 人 | 是谁（ASR 口径，待核） | 对你的价值 |\n|---|---|---|\n| **主讲人（涛哥/浩哥/超哥/宝哥）** | 前自媒体博主转型做 AI 产品出海，运营 HiAPI（多模态图像/视频中转，对接 100+ 模型）+ SEO 站群 + 推特，月烧约 800 刀 token，多台 Mac/Mac mini | \"全栈式 AI 出海\"打法的活样本；中转/工具/站群/出海合规都能问 |\n| **siuser 小伟 / 佳伟老师** | 广州本地东道主，办社区/社群（千里会、出海群），与智谱/阶跃/千问等大模型厂合作多，AI 硬件出海也在做 | 本地社区与模型厂资源对接入口 |\n| **陆哥** | 在成都，自媒体做得不错但还没把推特/出海做起来，主讲人多次想拉他分享/做内容 | 自媒体转出海的潜在合作对象 |\n| **说话人 3（涛哥之一，电商方向）** | 做过视频号带货→代写，现跑跨境电商自营，想把自用工具产品化（\"自营跑通再做工具站\"），用小龙虾驱动飞书 | 跨境电商 + 工具化路径的对标 |\n| **狗哥（杭州）** | 做跨境电商，基于 Wikihow 做大量自动化工具，\"自营+卖工具\"双轮 | 跨境电商自动化工具打法对标 |\n| **千里会 / 出海群** | 主讲人运营的两个社群：千里会偏资源杂烩可语音，出海群只做出海 | 攒出海资源、抱团带量的入口 |\n| **被点名的焦虑头部博主** | 周德龙、刘思毅等知识星球/社群头部，\"AI 用得差、很焦虑、要从卖课转卖结果\" | 反面参照：纯知识付费在 AI 时代的困境样本 |\n\n## 💬 金句\n\n- \"我们既要卖铲子，我还要去掘金。\"——一句话讲清他的双轮业务结构。\n- \"你只是在外围买个 20 块的 PLUS 问问 GPT、问问豆包，根本不算用 AI。\"——他对\"用 AI\"的门槛定义（带激励口径）。\n- \"我做了 5 年自媒体，去年做一年产品，收益直接增长 10 倍。\"——产品 vs 自媒体的杠杆差。\n- \"新词新站见效快，但没量了就没量了。\"——种树 vs 种菜的取舍。\n- \"盗版 20 块买到的东西比你 3000 块的还好，那你的东西是干什么的？\"——知识付费必须升级到\"卖结果\"的逼问。\n- \"做产品之后朋友变多了，做自媒体朋友少——见面聊业务，不用卖课说服你。\"——做产品 vs 做知识付费的关系质感。\n\n## ⚠️ 来源边界\n\n本篇基于飞书妙记逐字稿（ASR）整理，识别质量一般：人名/称呼混乱（\"涛哥/浩哥/超哥/宝哥\"疑为同一人，\"姚顺宇\"\"张小军\"\"周德龙\"\"刘思毅\"\"HiAPI/HiAPI\"等拼写均待核），工具名（VB code、Typeless、小龙虾/openclaw、ADSY、GSC）按上下文还原。所有商业数字（Anthropic 80亿→400亿 ARR、月烧 800 刀、推特分成三四千、Codex 涨价 4 倍、推特带来 800 中转用户等）均为现场口头销售/激励口径，未独立核实，引用前请存疑。涉及逆向/破解/跨境税务的内容仅作信息记录，不构成任何操作建议，相关行为有明确法律风险。本篇不含原始逐字稿正文；其余大量内容为点餐、付款、拍照等饭局噪声，已剔除。";
