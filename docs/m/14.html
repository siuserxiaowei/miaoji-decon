var SRC = "> 场景：siuser小伟 和「涛哥」两人去广州广交会逛「扬帆出海」展会（由 Swift 等联合主办的出海主题大会），一路录音。**前 28 分钟基本是两人路上 + 入场的闲聊吐槽**（认证、取票、拍照发朋友圈、调侃「民间组织」、顺手撩了一个做 USDT/USDC 跨境收款的展位），信息密度很低；**真正的干货在后 17 分钟的两场台上分享**：① 刘总（展会组织方）讲短剧出海 + AI 把内容生产成本打下来；② 张璐（阿卡迈 Akamai 云与 AI 产品业务经理）讲「龙虾时代 / Token 时代」与企业数据主权、私有化 GPU。\n> ⚠️ 飞书原关键词把这场标成「中转站、盈亏平衡点、模型公司、对话代码」——这其实只抓到了张璐那一段的零碎词，没接住「这是一场短剧/AI 出海展会 + 一场关于『要不要私有化部署 Token』的销售型演讲」的全貌。**本场整体信息密度偏低，前半是闲聊，下面只挑真正能学的点写，不注水。**\n\n## ⏱ 如果只读 10 分钟（6 条带走判断）\n\n1. **AI 把短剧的内容成本从「一部 100 多万」打到「一部 5000 块」**。同一拨人两年前在美国拍一部剧花 100 多万人民币，现在用 AI 工具 30 集、40 分钟，一下午干完，token 成本压到五六千。产值结构被彻底重写——这才是「AI 出海」最硬的那张图。\n\n2. **短剧出海是当下少见的「三位数增长」赛道**。讲者展示官方点点（点动）下载/收入榜，头部厂商（如九州文化的 ShowMax）海外这几个月还在三位数增长；「在中国你去找这种三位数增长的机会其实不多」，这是这届展会 50 多家 AIGC 企业涌进来的根本原因。\n\n3. **游戏公司正在集体转型做「AI 游戏」并把广告素材 / 剧情打通**。讲者说这几天见的游戏公司都在立新业务线，把游戏内过场剧情和 AI 内容生产结合——AI 内容能力正在横向渗透到相邻行业。\n\n4. **「龙虾时代 = Token 时代」：今年和去年是两个世界**。张璐的核心叙事——AI 从「训练时代」转入「推理时代」，走向所有人、所有公司、所有岗位；一次 agent 对话背后可能要推理 40~50 次，token 消耗量级跳变。\n\n5. **盲目用公开 Token，可能在 1~2 年内把自己的护城河喂给大模型公司**。三大风险：① 欧洲 GDPR 合规（有出海企业收到「几亿欧元罚单」——销售口径，存疑）；② 企业私有数据/工作流被公开模型训练走（举三星工程师把半导体核心技术喂 ChatGPT 的例子）；③ 中转站可能已经「十几手」，你的对话/代码被层层收录转卖。\n\n6. **中转站便宜到「1 美金额度 = 3 毛人民币」，但那是智商税 + 数据漏斗**。张璐给出私有化的「盈亏平衡点」逻辑：当团队到一定规模（举例 200 人、每天 1 万次调用）、且数据敏感时，就该开始试 GPU 私有化部署——这是他卖阿卡迈 + 英伟达推理单卡（每小时 2 美金）的落点。\n\n## 🎯 这篇真正能学什么\n\n这场录音值得学的不是「谁卖了什么」，而是三件事：①**一条具体行业（短剧/泛娱出海）被 AI 重做成本结构后发生了什么**——从 100 万到 5000 块的产值跃迁是可迁移的判断模板；②**「公开 Token vs 私有化部署」这道每家用 AI 的公司迟早要算的账**——什么时候该停止裸用公开模型、开始保护数据护城河；③**一场销售型演讲是怎么结构化的**——张璐的话术（黄仁勋金句开场 → 制造焦虑/三大风险 → 给出盈亏平衡点 → 落到自家产品）本身就是一套可拆解的 B2B 销售脚本。读完别记展会，记这三张图。\n\n## 🧭 道法术器势（→ 你可以怎么用）\n\n| 层 | 本场对应（榨干版） | 你可以怎么用 |\n|---|---|---|\n| **道** 明向 | AI 不是加个功能，是把整条行业的**成本结构**重写（短剧 100 万→5000 块）；数据是真正值钱的东西（小伟当场插话「我觉得是数据值钱」），裸用公开模型=慢慢把护城河送人 | 看任何行业先问：AI 能把这件事的单位成本砍掉几个数量级？我手上最值钱的是不是数据？ |\n| **法** 立本 | 用公开 token 的三种模式（裸用公开/云上 GPU+私有数据/完全自建）按规模与数据敏感度分层；销售用「金句开场→制造焦虑→盈亏平衡点→落产品」的固定漏斗 | 给自己的 AI 用法分层：哪些场景能裸用公开模型，哪些必须隔离；学这套漏斗反过来识别别人在向你卖什么 |\n| **术** 立策 | AI 批量生产短剧（30 集/一下午/五六千）；外包报价「时薪×1.5 倍、写维护费」；用 GPT 喂几份大厂合同生成甲乙方合同；逛展现场加微信、助理代加获客 | 接私活先按「时薪×1.5 + 维护费」报价；用 AI 起草合同初稿再人工核；逛展把「加微信」当标准动作 |\n| **器** 成事 | 阿卡迈+英伟达推理单卡（每小时 2 美金）；Claude Code / Codex / Seedance / 龙虾·爱马仕（agent）；中转站（1 美金=3 毛）；短剧出海工具；昆仑 play（收 USDT/USDC 的跨境支付） | 想私有化先「租一台 GPU 试一块」别一上来自建；编程/生视频/agent 各选一个主力工具；跨境收款卡点可问昆仑 play |\n| **势** 察时 | 短剧/泛娱出海是当下罕见的三位数增长赛道；AI 进入「推理时代/应用时代」；游戏公司集体转 AI 游戏；私有化 GPU 推理是新窗口 | 趁短剧/AIGC 出海窗口卡位；如果你已大量用 token，现在就该算私有化的账（但宏观数字自己核实） |\n\n## 📚 深挖：5 个值得单独学的知识点\n\n### 1. AI 把短剧产值「从 100 万到 5000 块」——成本结构级的颠覆\n刘总（说话人 3）现身说法：他和朋友两年前在美国拍过一部剧，花了 100 多万人民币；现在用 AIGC 工具，一部剧 token 成本压到五六千，30 集、40 分钟一下午就能干完，「品质还可以、能看」，只是定义为「批量化」产物。**为什么重要**：这不是「效率提升 20%」，是单位成本砍掉两个数量级——这种级别的变化会重塑整个供给侧（谁能做、做多少、卖多便宜），也是判断一个 AI 应用是不是「真机会」的尺子。**你能用**：评估任何 AI 项目时，别问「能不能提效」，问「能不能把某件事的单位成本打到原来的 1%」；能，才是结构性机会。\n\n### 2. 短剧/泛娱出海 = 当下少见的「三位数增长」赛道\n刘总用官方榜单（点动/点点）展示：海外短剧下载与收入榜上「三位数增长」的是九州文化 ShowMax 等头部，整个海外短剧市场这几个月都在三位数增长，「在中国你去找这种三位数增长的机会其实不多」，这也是本届展会涌进 50 多家 AIGC 参展企业的原因。美国市场的泛娱阵营「基本被中国厂商包围」，头部已超过奈飞的体量（现场口径）。**为什么重要**：增速本身是势——在一个仍在三位数增长的池子里，平庸玩家也能被水位抬起来；在饱和市场里，优秀玩家也举步维艰。**你能用**：找方向时优先看「还在三位数增长且中国供给链有优势」的细分，短剧/AI 玩具/AIGC 工具都在这条线上。\n\n### 3. 「龙虾时代 = Token 时代」：从训练时代切到推理时代\n张璐（说话人 2，阿卡迈）的叙事骨架：去年大家还在卷大模型训练，能上市的上市、活不下来的退出转做智能体；今年正式进入**应用/推理时代**，走向所有人、所有岗位。标志是 agent 普及——一次「龙虾/爱马仕」（这里 ASR 把某 agent 产品识别成了「龙虾」「爱马仕」，疑指某类通用 agent，名字待核）对话背后要推理 40~50 次，相当于和大模型聊 40~50 次。开场金句借黄仁勋 GTC：「年薪 50 万的工程师，配 25 万的 token，生产力提 10 倍」。三类最火的 token：编程类（Claude Code / Codex）、生视频（Seedance）、通用 agent（龙虾/爱马仕）。**为什么重要**：「训练→推理」的切换意味着算力开销从一次性集中训练，变成每个企业天天烧的运营成本——这就把「token 怎么用、在哪算、归谁」变成每家公司的财务问题。**你能用**：把 token 当成一条会持续增长的运营成本科目来管理，而不是「随便充点用」。\n\n### 4. 盲目裸用公开 Token 的三大风险（这是张璐的「制造焦虑」段，也是最实的认知）\n- **GDPR 合规雷**：出海欧洲若把客户数据直接喂公开大模型（OpenAI / Claude），明确违反 GDPR；称「有一家出海企业过去两年收到几亿欧元罚单」（销售口径，金额存疑，需核实）。\n- **私有数据被训练走**：举三星例子——总工程师调 bug 时把半导体核心设计喂给 ChatGPT，结果「第二年全球都能问 ChatGPT 得到这些信息」，护城河被训练进了公开模型。\n- **中转站层层转卖**：很多公司/个人用中转站，便宜到「在某站充 1 美金 = 3 毛人民币」，但「最多十几手」，你的对话/代码可能已被十几个中转站收录，而「数据转卖已成一门生意」，攒几个 G/T 的中转站数据能反卖给大模型公司。\n\n**为什么重要**：这三条把「便宜的 token」背后的隐性代价显性化了——合规罚款、护城河流失、数据被转卖。即便它服务于卖货，逻辑本身成立。**你能用**：给团队定一条红线：哪些数据（客户隐私、内部工作流、机密代码）绝不进公开模型/中转站；对外简单爬取类任务才用公开 token。\n\n### 5. 「盈亏平衡点」框架：什么时候该从公开 Token 转私有化 GPU\n张璐给的分层决策（用 token 的三种模式）：① 中小团队（10~50 人，或 50 人以下）裸用公开 token 就够，不必折腾；② 规模上来（50~100 人，或 token 调用量很大）→ 上「云上 GPU + 私有数据 + 私有化部署」；③ 规模再大或数据极敏感 → 才考虑完全自建。他对四类场景（文本/语音/图像/视频）各算了一个「盈亏平衡点」，举例：200 人团队、每人每天对话 50 次 = 每天 1 万次文本调用，到这个量就该开始部署 GPU。落点是阿卡迈 + 英伟达的推理单卡（型号 ASR 不清，疑指某 6000 级推理卡，区别于训练时代的 H100），每小时 2 美金，先「租一台试一块」。**为什么重要**：这是一套可复用的「自建 vs 外购」决策结构——不是「越早自建越好」，而是用规模 × 数据敏感度两个变量卡阈值。**你能用**：套到任何「公有云 vs 私有部署」「外包 vs 自建团队」的决策——先定阈值，没到阈值别提前自建。\n\n## 🛠 可直接复用的方法（含「不要误读成」）\n\n**方法 1：用「成本砍掉几个数量级」判断 AI 机会**\n- 核心意思：真机会是把单位成本从 100 万级打到 5000 级，而非提效 20%。\n- 你可以怎么用：评估项目先算「AI 能把这件事的单位成本压到原来的几分之一」。\n- 不要误读成：所有用了 AI 的事都是机会——降本不到数量级的，多半只是锦上添花。\n\n**方法 2：给数据划红线，再决定哪些进公开模型**\n- 核心意思：客户隐私 / 内部工作流 / 机密代码不进公开模型与中转站，对外爬取类才用公开 token。\n- 你可以怎么用：列一张「能/不能进公开模型」的数据清单，发给团队。\n- 不要误读成：所有 AI 都要私有化——50 人以下小团队裸用公开模型反而最划算，私有化是有阈值的。\n\n**方法 3：用「盈亏平衡点」决定自建时机**\n- 核心意思：按规模 × 数据敏感度卡阈值，到点才上 GPU，且先租一台试。\n- 你可以怎么用：估算自己每天的 token 调用量，对照「该不该开始试私有化」。\n- 不要误读成：私有化越早越好——没到量自建就是浪费，「租一台试一块」是更稳的第一步。\n\n**方法 4：接私活/外包的报价纪律**（来自开头闲聊，但很实）\n- 核心意思：报价要在「时薪 × 工作时间」基础上乘 1.5 倍，并写清后续维护费。\n- 你可以怎么用：下次接单按此公式报价，合同里明确维护条款（可用 GPT 喂几份大厂合同生成初稿再人工改）。\n- 不要误读成：AI 干的活就不值钱、随便报——工作量看着小，但维护、沟通、跑动成本要计价。\n\n## 📅 7 天作业\n\n- **Day 1**：挑你所在行业的一件核心工作，算一笔账：AI 能把它的单位成本打到原来的几分之一？写下数字。\n- **Day 2**：列一张「数据红线表」——哪些数据绝不能进公开大模型/中转站，发给协作的人。\n- **Day 3**：估算你（或团队）每天的 token 调用量，对照张璐的盈亏平衡逻辑，判断「该不该开始考虑私有化」。\n- **Day 4**：拆解张璐这段演讲的销售结构（金句开场→三大风险制造焦虑→盈亏平衡点→落产品），用同一结构写一版你自己产品的 pitch。\n- **Day 5**：研究一个短剧/AIGC 出海标杆（如九州 ShowMax），看它靠什么在海外做三位数增长。\n- **Day 6**：把你正在用的中转站/公开 API 盘一遍，确认有没有把敏感数据/代码裸喂出去，做一次清理。\n- **Day 7**：给一个待报价的私活/项目，按「时薪×1.5 + 维护费」出一版正式报价单。\n\n## 🤔 回到自己业务的追问\n\n- 我的业务里，AI 能把哪件事的成本打到原来的 1%？我抓住了吗？\n- 我赚钱靠的是不是「还在三位数增长」的势？还是已经在红海里挤？\n- 我有没有在裸用公开模型/中转站，把最值钱的数据慢慢送出去？\n- 我的团队规模和数据敏感度，到了该私有化的阈值了吗？还是其实裸用更划算？\n- 别人向我推「你必须 XX，否则 1~2 年被淘汰」时，我能不能看穿这是销售漏斗的「制造焦虑」环节？\n- 我接活/报价有没有把维护、沟通、跑动成本算进去？\n- 短剧/泛娱出海这波，中国供应链优势我能不能借一段？\n\n## 👥 关键人物与资源（这桌人能给你什么）\n\n| 人 | 是谁 | 对你的价值 |\n|---|---|---|\n| **刘总**（说话人 3，展会组织方/致辞嘉宾） | 短剧/泛娱出海圈内人，自己拍过美国短剧，手上有 AIGC 短剧工具与海外榜单数据，包里随身带「泡 AI」翻译录音产品 | 短剧/AIGC 出海的行业数据与工具对接入口 |\n| **张璐**（说话人 2） | 阿卡迈（Akamai）云与 AI 产品业务经理，主推「私有化 GPU 推理 + 数据主权」，阿卡迈联合英伟达的推理单卡 | 企业要做私有化 token 部署 / 算力降本时的对接人 |\n| **siuser小伟**（录音者本人） | 在做海外支付 + token 项目；干外包出身；当场对「数据值钱」「中转站一吨卖多少」有强嗅觉 | 出海支付 / token 业务的同行视角 |\n| **涛哥**（说话人 1，「鹏涛」） | 同行（做支付 + token、海外支付），外包出身，对报价/签合同很熟，写公众号文章（被王磊推给刘润看过） | 报价/合同/外包打法 + 内容影响力的参照 |\n| **昆仑 play**（展位） | 跨境支付，主打能收 USDT / USDC（很多做跨境支付的收不了 U） | 跨境收款卡在「收不了 U」时的备选方案 |\n| **王磊**（提及） | 刘润与周鸿祎（ASR「周永义」存疑）的顾问，做「微信聊天日报」类产品，把小伟的文章推给了刘润 | 高层顾问圈的连接点（信息流向参考） |\n\n## 💬 金句\n\n- 「同一部剧，两年前美国拍花了 100 多万，现在 5000 块。」——刘总。AI 对内容产值的颠覆，一句话讲透。\n- 「在中国你去找这种三位数的增长机会其实不多。」——刘总。为什么短剧出海现在这么挤。\n- 「如果你还在写代码，我觉得你是上一个时代的人了。」——张璐。推理/应用时代对岗位的重定义（带销售夸张，听个方向）。\n- 「你用中转站本身是一种智商税……你已经不知道你的中转站是几手了，最多十几手。」——张璐。便宜 token 背后的数据漏斗。\n- 「我觉得是数据值钱。」——siuser小伟当场插话。一句话点破整段演讲的底层：卖的是算力，护的是数据。\n- 「技术越来越不值钱了，但是这个钱你可以顺手赚。」——涛哥（开头闲聊）。对 AI 时代外包/接活的实在判断。\n\n## ⚠️ 来源边界\n\n本篇基于飞书妙记逐字稿整理，原录音 45 分钟、**前 28 分钟为路上与入场闲聊，信息密度低**，干货集中在后段两场台上分享。人名/产品名以 ASR 识别为准，多处待核：「龙虾」「爱马仕」疑为某类通用 agent 产品代称、阿卡迈推理单卡型号、「九州 ShowMax」「点动/点点」榜单名、「周永义」（疑为周鸿祎）等均可能有偏差。宏观与销售数字（如「几亿欧元 GDPR 罚单」「1 美金=3 毛」「200 万个泡 AI」「100 倍年化增长」「盈亏平衡点阈值」）为现场销售/分享口径，**未独立核实，使用前请存疑**；张璐整段为阿卡迈的 B2B 销售演讲，结论服务于卖私有化方案，请带着这个前提阅读。不含原始逐字稿正文。";
