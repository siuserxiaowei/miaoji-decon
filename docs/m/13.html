var SRC = "> 场景：广州 · 第六届「全球产品与增长展会」下午场。录音是从**台下听众**视角录的——涛哥几个人一边听台上分享、一边闲聊（吃喝、充电、买卖 CDS/广告位、约晚饭），所以逐字稿里**台上干货和台下闲聊高度交织**，且属于明显的「商业化推介会」：上台的多是 AppLovin / 移动行业数据公司 / 腾讯云 / 订阅基建商等**服务商在卖自己的产品**，听众里也有大量在台下做生意（接客户、谈框架合同）。\n> ⚠️ 飞书原 AI 摘要若把这场总结成「客户购车 / 签到流程 / 喝咖啡」之类，是被开头一大段排队闲聊带偏了——这场真正的内容是一张 **「AI 时代出海增长」的服务商横切面 + 超级个体方法论**。\n> ⚠️ 关键提示：台上嘉宾**几乎都在卖货**（投放平台、数据归因、云/token、订阅 AB 测试），凡是「成本很低收入很高」「省下几十倍钱」「1.5 倍业绩增长」这类数字，都是**销售口径**，用前请自己核实。ASR 对公司名/产品名识别**错得厉害**（把 AppLovin 摊成 SOM/SOI/XOM/Excel/Auburn，把\"超级个体\"打成\"超级困难\"），本篇靠上下文还原，拿不准处已标注。\n\n## ⏱ 如果只读 10 分钟（7 条带走判断）\n\n1. **「超级个体」是这场的主旋律**：一个人用全球最聪明的工具，一年能做 100 个 App、写一本书、打黑客松。门槛不在「你能造什么」，而在「你敢想造什么」。多位嘉宾独立讲了同一件事。\n2. **AI 不再是独立赛道，是每个产品的默认配置**。行业榜单从「纯 AI App 单独排」改成「只要融入生成式 AI 就算 AI 产品」——意味着不接 AI 的产品会被默认淘汰。\n3. **纯 AI 产品的钱被头部吃光**：头部 10% 的产品拿走整个品类 90% 的收益。想靠纯 AI 赚钱，要么进头部，要么别只做纯 AI。\n4. **变现别只押订阅**：建议把「订阅 + 一次性消费道具」组合做，尤其移动端先让用户看到付费墙；并用 AI 给用户打标签、在需求最强时精准推送。\n5. **企业用 AI 的差距，64% 来自「对话深度」而非「对话次数」**（某研究口径，疑似欧莱雅案例，ASR 混乱）。头部公司不是用得多，是用得深——这是会拉大的差距。\n6. **GEO（让 AI 推荐你）要提前布局**：未来用户靠 AI 搜产品，AI 只推它认可的高质量内容；现在就得做内容营销，否则被 AI「蒸馏再蒸馏」后流量质量越来越差。\n7. **「信任资产 / 数据资产」是 AI 时代普通人的护城河**：手搓一个 App 太简单了，差异不在功能，在你长期积累的、结构化的数据和市场信任——等 AI 足够成熟时它才能「真正懂你」。\n\n## 🎯 这篇真正能学什么\n\n这不是一场能学到某个具体打法 SOP 的会（台上多是服务商软广 + 台下闲聊），而是一张 **「2025→2026 AI 出海增长」的认知地图**。值得学的是四件事：①超级个体的心法（敢想 + 用全球最强工具 + 在没反馈的日子默默向前）；②投放/变现这条产业链上有哪些角色在卖什么（投放算法、数据归因、订阅基建、云/token 网关）；③AI 已成产品默认配置后，差异化和护城河往哪走（数据深度、信任、品牌、GEO）；④哪些数字是销售口径、要打折听。读完别记是谁讲的，记这四张图，并养成「听到漂亮数字先问是不是卖货口径」的反射。\n\n## 🧭 道法术器势（→ 你可以怎么用）\n\n| 层 | 本场对应（榨干版） | 你可以怎么用 |\n|---|---|---|\n| **道** 明向 | 超级个体时代：瓶颈是「你想造什么」不是「能造什么」；AI 是长期主义不是短期；差异在数据/信任资产，不在功能 | 别再纠结「会不会做」，先逼自己「敢不敢想」；现在就开始结构化沉淀自己的数据/工作流，养未来的「懂你」的 AI |\n| **法** 立本 | 变现要组合（订阅+一次性消费）、分国别/分系统设计；产品不同阶段护城河不同（早期靠判断力→中期靠买量→后期靠用户量/品牌）；GEO 内容营销提前布局 | 给自己产品画一张「阶段—护城河」图：现在靠什么活、下一阶段靠什么；把变现拆成「订阅+消费品」两条腿 |\n| **术** 立策 | 用 AI 给用户精细化打标签、在需求最强时刻推最精准的付费；AB 测试价格分三档实时调；先想用户诉求→直接让 AI 试出产品 | 选一个最小动作：给你的付费墙做一次「分层+时机」实验；遇到新点子，先让 AI 当天试出 demo 再判断 |\n| **器** 成事 | 投放算法平台（疑 AppLovin，IPRO/IARO/MAXRO 等广告类型、D28 算法）；移动行业数据/归因；订阅基建+AB 测试；腾讯云 token 网关（合规调海外模型、按意图分发省钱）、出海 23 地区节点 | 选型时把「投放—归因—订阅—算力」这条链补全；但所有「省 X 倍」先做 POC 验证再信 |\n| **势** 察时 | AI 已是产品默认配置；中国应用出海娱乐类增速最猛（口径 22%→30%）；token 成「电力之后的新能源」；纯 AI 头部通吃 | 趁 AI 默认化窗口把 AI 接进现有产品；出海优先看高增长品类；但避开已被头部通吃的纯 AI 红海 |\n\n## 📚 深挖：8 个值得单独学的知识点\n\n### 1. 超级个体：「一个人 = 一支队伍」的具体形态（这场的\"道\"）\n分享嘉宾（李欣佳/郑总，ASR 名字不一致）现身说法：一年做了约 100 款 App、跟机械工业出版社签了一本 15 万字的书《AI 时代零基础玩转 AI 应用：从创意到落地》、人生第一次打黑客松进决赛、同时读华科经济学+北大管理两个学位、开小红书「明星梦想家」做内容。腾讯云的柯总也独立呼应：\"超级个体的瓶颈不是你能造什么，而是你想造什么。\"\n**为什么重要**：这不是鸡汤，是 AI 把「产能」从团队规模里解放出来的真实样本——做软件/网页从几周压到几小时。底层逻辑：生产力瓶颈从「执行」迁移到了「想象力和判断力」。\n**你能用**：列出你「一直想做但觉得做不了」的 3 件事，挑一件本周用 AI 直接出最小 demo，验证瓶颈到底在不在你以为的地方。\n\n### 2. 超级个体的 12 条心法（值得单独抄下来）\n同一位嘉宾快速过了一套「OPC 心得」，挑出真有信息量的几条：①打工是最小风险的投资，创业是最大回报的投资（经济学视角，做不成就当交学费）；②复利/滚雪球——「一年做 10 款 App，3 年后的迭代和一年的不一样」；③工具要找**全世界**最聪明的，不是中国最聪明的，「要做聪明人」；④**在没有反馈（含弱反馈）的日子里也能默默向前**；⑤「决心和天赋相比，天赋被高估了；时间长了，决心就是你的天赋」；⑥宁静接受不能改变的、勇气改变能改变的、智慧分辨二者（平静祷文）。\n**为什么重要**：这套东西的价值不在新，在于它给「长期主义」配了可执行的自我对话——尤其「弱反馈期默默向前」直接对治独立开发者最容易死的阶段。\n**你能用**：把「在没反馈的日子默默向前」贴在工位，给自己设一个「无论数据如何，连续做 30 天」的复利动作。\n\n### 3. AI 从「独立赛道」变成「产品默认配置」（势的拐点）\n移动数据公司嘉宾（Brina/郑楚丽，疑 Sensor Tower/data.ai 一类）讲到一个关键变化：2026 年 3 月的全球榜单**首次**把「只要融入生成式 AI 的产品」都算进 AI 榜，而非只排纯 AI App；且榜单依据从下载转向**月活**。一句话：\"AI 已经不再是一个独立的角色，而是每个产品都需要具备的默认能力。\"\n**为什么重要**：这是判断窗口期的硬信号——当行业统计口径都默认「产品=带 AI」，不接 AI 等于自动出局；同时纯 AI 单品的稀缺性溢价在消失。\n**你能用**：盘点你现有产品，列出「哪个环节接上 AI 能立刻提体验」，把 AI 当默认能力补进去，而不是当一个独立新产品去立项。\n\n### 4. 纯 AI 产品「头部 10% 吃掉 90% 收益」\n圆桌上嘉宾直说：在 AI（尤其纯 AI）品类里，头部 10% 的产品拿走整个品类 90% 的收益，头部一定能把 ROI 做很高，\"想赚钱还得努力\"。\n**为什么重要**：幂律分布意味着「做个能用的纯 AI App」不等于能赚钱——要么挤进头部，要么换打法（把 AI 嵌进已有成熟产品，借存量用户和场景）。圆桌另一条印证：很多人靠「在已成熟的传统产品（照片编辑、运动健康）里加 AI 功能」提升 VIP 购买率，而非从零做纯 AI。\n**你能用**：如果在做纯 AI 单品，诚实评估自己离头部多远；否则优先考虑「成熟产品 + AI 增量功能」这条更稳的路。\n\n### 5. 变现：订阅 + 一次性消费要组合，并用 AI 做分层和时机\n订阅基建商（亚太团队，疑 RevenueCat / Adapty 一类，全球约 2 万+ 客户）给的实操：①别只押订阅，把「订阅 + 一次性消费道具」作为不同形式组合推荐，尤其 PC/移动端 App；②AB 测试价格分三档、按不同国家地区实时生成和调价；③移动端先让用户看到付费墙；④核心是「怎么对用户精细分层 + 怎么在需求最强时推最精准的购买」，用 AI 自动打标签、实时推送。MV 例子很具体：用户拿到一首 AI 生成的歌，最想要的是「直接给我生成一个 MV」，为此非常愿意付费——高价值需求点往往在「生成之后的下一步」。\n**为什么重要**：这是把「AI 变现」从口号落到机制：分层 + 时机 + 组合 SKU，是订阅疲软后最现实的提收入手段。\n**你能用**：给你的付费墙做两件事——按地区/系统分三档价格 AB 测；找出用户「生成之后还想要的下一步」，做成单独付费点。\n\n### 6. 企业用 AI 的差距：64% 来自「对话深度」而非「次数」\n腾讯云柯总引用一项研究（ASR 把来源讲成\"欧莱雅\"，疑有误，且把 top1%/5%/50% 公司破产数、3.5 倍使用量等数字搅在一起，**强烈建议核实**）：对比前沿公司和落后公司用 AI 的差距，只有约 36% 来自「对话次数」，剩下约 64% 来自「对话深度」；且这个领先差距在持续扩大。\n**为什么重要**：即便数字不准，方向有价值——企业落地 AI 的胜负手不是「用没用」，是「用得深不深」（把 AI 嵌进核心流程、多轮深度协作），这决定了能不能拉开身位。\n**你能用**：别满足于团队「都在用 AI」，去查谁在用 AI 做深活（多轮、嵌进关键流程），把这种用法当标杆推广。⚠️ 引用前请核实数据真实来源。\n\n### 7. token / 算力网关：「电力之后的新能源」与省钱机制\n腾讯云把 token 比作「电力之后的新能源」，并讲了网关产品的两个真实痛点解法：①**合规调海外模型**——海外模型国内难用，CLP/网关帮你合规合法地从海外调用全球模型；②**按意图智能分发模型**——识别后台使用意图，把任务分给合适档位的模型，因为「世界一流模型和中央部模型价格差几十倍」，能帮公司每年省一大笔。还提到出海有 23 个地区节点、65 个运营大区。\n**为什么重要**：当 token 成为持续成本，「按需求把贵活给贵模型、便宜活给便宜模型」的网关思路，是真实的降本杠杆；对要合规用海外模型的出海团队尤其实在。\n**你能用**：如果你的产品在烧 token，盘一下「哪些请求其实不需要顶级模型」，做一层按意图/难度的模型路由——不一定买腾讯的，自己也能搭。⚠️ 「省几十倍」是其卖点口径。\n\n### 8. GEO（让 AI 推荐你）+ 信任资产 = 新的获客与护城河\n圆桌收尾两条彼此呼应：①**GEO 要提前布局**——以后 C 端用户会让 AI 帮自己搜/推荐产品，AI 只推它判断为高质量的内容；而 AI 生成的营销文越来越多，被「蒸馏一遍再蒸馏推给用户」后，劣质内容带来的流量质量持续走低。所以现在就要做好内容营销，未来才不会在 AI 检索里被埋没。②**信任资产/数据资产是护城河**——「现在手搓一个 App 太简单了」，差异不在功能，在数据深度、合作伙伴集成广度、以及在一个市场里长期积累的用户信任；普通人最该做的是「让自己的数据资产结构化」，等 AI 成熟时才能真正懂你。\n**为什么重要**：当产能不再稀缺（人人能手搓），稀缺的是「被 AI 信任 / 被用户信任 / 被结构化沉淀」的东西——这是从「卷功能」转向「卷资产」的明确信号。\n**你能用**：本周起做两件长期事——开始为「被 AI 检索/推荐」写高质量内容；建一个结构化沉淀自己工作流/数据的习惯（哪怕只是规范化笔记）。\n\n## 🛠 可直接复用的方法（含\"不要误读成\"）\n\n**方法 1：先想用户诉求 → 直接让 AI 当天试出 demo → 再决定做不做**\n- 核心意思：圆桌共识——别再「我们有什么技术就做什么」，改成「用户要什么 → 让 AI 试 → 搞不好就给你试出来了 → 再落地」。敢想 + 快速出。\n- 你可以怎么用：下次有想法，当天用 AI 出一个能跑的最小版本，用它而不是用想象去判断。\n- 不要误读成：把「敢想敢做」当成不验证就梭哈——它的前提是「快速试出来看数据」，是低成本验证，不是赌。\n\n**方法 2：变现做「订阅 + 一次性消费」组合 + AI 分层精准推**\n- 核心意思：单押订阅会疲软；用 AI 给用户打标签，在需求最强的时刻推最精准的付费点（含消费道具和订阅两条线），价格按地区分档 AB 测。\n- 你可以怎么用：给付费墙加一条一次性消费 SKU；用行为标签触发推送，而不是统一弹窗。\n- 不要误读成：「多塞付费点」=多收钱——没有「分层 + 对的时机」，硬塞只会掉转化。\n\n**方法 3：按「难度/意图」做模型路由降本**\n- 核心意思：贵活给贵模型、便宜活给便宜模型，价格能差几十倍；GEO 内容也提前布局。\n- 你可以怎么用：把请求分级，简单请求走便宜模型；同时开始写「让 AI 愿意推荐你」的内容。\n- 不要误读成：一刀切全用最便宜模型——质量塌了反而砸口碑；路由的前提是分得准。\n\n## 📅 7 天作业\n\n- **Day 1**：列出 3 件「一直想做但觉得做不了」的事，挑一件明天用 AI 出最小 demo。\n- **Day 2**：把这个 demo 真做出来，用数据/体验判断瓶颈是否真在你以为的地方。\n- **Day 3**：盘点现有产品，找出「接上 AI 立刻提体验」的一个环节，把 AI 当默认能力补进去（不立新项目）。\n- **Day 4**：给付费墙设计一次「分层 + 时机」实验：加一条一次性消费 SKU，或按地区分三档价格做 AB。\n- **Day 5**：盘一遍你在烧的 token/算力，标出「其实不需要顶级模型」的请求，设计一层模型路由。\n- **Day 6**：为「被 AI 检索/推荐」写一篇高质量内容（GEO 起步），并开始一个结构化沉淀数据/工作流的习惯。\n- **Day 7**：画一张「产品阶段—护城河」图：现在靠什么活（判断力/买量/用户量/品牌），下一阶段靠什么，差什么。\n\n## 🤔 回到自己业务的追问\n\n- 我的瓶颈到底是「不会做」，还是「不敢想」？（用 AI 出 demo 一试便知）\n- 我的产品是把 AI 当独立新项目，还是当默认能力补进存量产品？哪个更稳？\n- 如果我在做纯 AI 单品，我离「头部 10%」有多远？要不要换成「成熟产品 + AI 增量」？\n- 我的变现是单押订阅，还是订阅 + 消费组合 + 分层时机精准推？\n- 我团队是「都在用 AI」，还是有人在用 AI 做深活、嵌进核心流程？\n- 我有没有为「被 AI 推荐」提前布局内容？我的数据/工作流结构化了吗？\n- 听到「成本极低收入极高 / 省几十倍 / 1.5 倍增长」时，我有没有先问一句「这是不是卖货口径」？\n\n## 👥 关键人物与资源（这桌人能给你什么）\n\n> ⚠️ 名字与公司多为 ASR 识别，错率高，仅供按「角色」找人时参考，真实身份待核。\n\n| 人 | 是谁（按内容推断） | 对你的价值 |\n|---|---|---|\n| **郑总 / 李欣佳**（名字 ASR 不一致） | 超级个体分享者：前 HRD，一年做约 100 款 App、签书《AI 时代零基础玩转 AI 应用》、打黑客松进决赛、读两个学位；小红书「明星梦想家」 | 个人 AI 创业 / 超级个体方法论的活样本 |\n| **卡洛黄 / 康总** | 投放平台大中华区负责人（疑 AppLovin / Applovin 系），讲 IPRO/IARO/MAXRO 广告类型、D28 算法、投变一体 | 出海效果投放 + 聚合变现对接 |\n| **陈总（炫极科技 CEO）** | 做面向年轻人的数字生活产品出海（MAS，3D/红包等，ASR 极糊） | 年轻态 / 数字生活产品出海参考 |\n| **Brina / 郑楚丽** | 移动行业数据公司大中华区商务（疑数据/归因平台），讲全球下载/消费/出海榜单数据 | 出海大盘数据、归因合规、品类趋势 |\n| **柯立东 / 柯总** | 腾讯云华南云原生总经理，讲超级个体、token 网关、合规调海外模型、出海节点 | 出海云/算力/token 网关、合规调模型 |\n| **施超**（南京稻城科技联合创始人） | 圆桌嘉宾，出海老兵（约 10 年） | AI 出海实战交流 |\n| **Benson**（小影科技产品负责人） | 圆桌嘉宾，工具+泛娱乐，讲 AI 音乐/视频高频依赖与差异化 | AI 音乐/视频赛道、护城河阶段论 |\n| **王朝超**（黑蚁资本合伙人） | 圆桌嘉宾，讲产品不同阶段壁垒（产品→买量→用户量/品牌） | 投资视角的阶段护城河判断 |\n| **订阅基建商嘉宾（亚太负责人）** | 疑 RevenueCat/Adapty 一类，全球 2 万+ 客户，订阅基建+AB 测试+分群 | 订阅变现优化、AB 测试、用户分群 |\n| **涛哥 / 录音方一桌** | 台下听众，期间在谈 CDS/广告位买卖、框架合同、约硬件总监饭局 | 提示：这桌本身在做投放/资源生意，是个现成的人脉/交易场 |\n\n## 💬 金句\n\n- \"你能造什么不是瓶颈，你想造什么才是。\"——超级个体时代生产力瓶颈的迁移。\n- \"工具一定要找全世界最聪明的，不是中国，是全世界——就是要做聪明人。\"——超级个体的工具观。\n- \"你需要学会在没有反馈的日子里，也能够默默向前。\"——独立开发者最该贴墙上的一句。\n- \"决心和天赋相比，天赋是被高估的；但时间长了，决心就是你的天赋。\"——长期主义的注脚。\n- \"头部 10% 的产品，把整个品类 90% 的收益全部拿走了。\"——纯 AI 赚钱的幂律真相。\n- \"现在手搓一个 App 太简单了。\"——所以差异不在功能，在数据/信任资产。\n- \"最好的方式就是先让你的数据资产结构化，等 AI 足够成熟时让它真正懂你。\"——普通人 AI 时代的护城河。\n\n## ⚠️ 来源边界\n\n本篇基于飞书妙记逐字稿整理，**这是一场服务商推介性质的行业大会下午场录音，且从台下听众视角录制，台上分享与台下闲聊高度交织**。人名/公司名以 ASR 识别为准且错率很高（AppLovin 被摊成 SOM/SOI/XOM/Excel/Auburn、\"超级个体\"被打成\"超级困难\"、来源\"欧莱雅\"疑误、嘉宾姓名前后不一），本篇靠上下文还原并标注存疑，引用前务必独立核实。所有「成本极低 / 收入很高 / 省几十倍 / 1.5 倍业绩增长 / 头部 90% 收益 / 64% 来自对话深度」等均为**现场销售或演讲口径**，未独立核实，使用前请打折存疑。不含原始逐字稿正文。";
