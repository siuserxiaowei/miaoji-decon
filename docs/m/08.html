var SRC = "> 场景：一场活动散场后的私下夜话/饭局闲聊，3 人左右的小圈子边收拾边唠，话题在「极客 App 起诉风波→播客平台格局→AI 圈大佬八卦→中转站/AI token 生意→活动撑场结算→组织管理」之间跳。\n> ⚠️ **本场信息密度低。** 这是一段以人情世故、行业八卦、互相吹捧/互怼为主的散场闲聊，没有结构化的知识分享，飞书关键词（社群/变现/风控/主播/嘉宾）基本贴对了氛围。下面只挑**真有信息量的几条**展开，不注水凑数。\n\n## ⏱ 如果只读 10 分钟（5 条带走判断）\n\n1. **「小组件」诉讼复盘：你先合规上线，对方风控没做好，反咬你是恶意竞争——但告不赢。** 讲者一方做语音小组件（类似\"今天早上起床了吗\"那种），起量后被极客系一方起诉，核心争议是用户上传违规语音被举报。最后开庭前对方撤诉。教训：**抢跑合规者反而被当成下三滥手段栽赃**，但只要证据在你这，法官会劝对方撤诉。\n2. **播客平台格局现场口径：小宇宙（小红书系/推得好但量没那么大）、荔枝（上市公司、海外社交一年 30 多亿、但国内业务天天被打）、喜马拉雅（用户量大、收了蜻蜓 FM）。** 一句\"小红书要做自己的播客\"是值得留意的平台动向信号。\n3. **中转站/AI token 是这桌人的主营赚钱方式之一。** 多次提到\"中转站\"\"做 AI token\"\"openrouter\"\"AI 基建\"\"卖 Token 卖得更好\"——这是个真实在跑、能排进\"全网前五\"口径的现金流生意，且彼此是友商/可合作关系。\n4. **RPA→爬虫→AI 的\"每波都踩风口\"路径，正被 Codex/computer use 干掉。** 一位讲者：22 年爬虫、23 年 RPA、24 年 AI；做 RPA（影刀/UiBot）\"一个月能干十几万\"，现在被 \"code 5 的 computer（全流程打通、不用学）\"打得\"体无完肤、完全卖不动\"。\n5. **活动是\"互相撑场/借势\"的生意，不是慈善。** 杨帆出钱请这桌人帮忙撑场（包嘉宾+招募），现场为\"签到的人到底是谁拉来的\"扯皮——本质是 KPI/归因之争。同时一方借这个大场合发布自己刚做两周的媒体品牌\"逐日前线\"，\"攒个 PR 物料\"。\n\n## 🎯 这篇真正能学什么\n\n这场会**不是来学硬知识的**，是来看一张**圈子生态切片**：谁和谁是友商、谁起诉过谁、谁靠中转站/social/SEO 赚钱、风口怎么一茬茬换、活动撑场怎么结算与归因。值得带走的不是\"谁说了什么\"，而是三个体感：①**合规抢跑也会被栽赃，证据留好就不怕诉讼**；②**风口生意（RPA/中转站）有保质期，被新工具替代是常态**；③**圈内活动的人情账（撑场/借势/归因）是门暗规则**。\n\n## 🧭 道法术器势（→ 你可以怎么用）\n\n| 层 | 本场对应（榨干版） | 你可以怎么用 |\n|---|---|---|\n| **道** 明向 | 风口生意有保质期（爬虫→RPA→AI 一路被新工具碾）；圈子里\"低调谦虚做事\"被认为是对的；身份是自己给的（吹的天花板≠真天花板） | 别把当下现金流当永久护城河；定期问\"什么新工具能把我这门生意干掉\" |\n| **法** 立本 | 诉讼应对：证据在手+律师交换证据后让对方知难而退；活动用\"互相撑场/借势\"换 PR 物料；社群变现按\"人数×客单价×群数\"算 GMV | 遇到无理起诉先固定证据别慌；做新品牌找大场合搭车发布攒 PR |\n| **术** 立策 | 内容\"全部分发\"而非靠极客那种互相点赞抱团；冷启动\"各种手段都有\"；外站 SEO 靠不停注册独立站+导流的\"战群\"打法 | 内容做全平台分发，别困在一个要靠人情互推的小生态 |\n| **器** 成事 | 中转站/AI token、openrouter、AI 基建；Codex / \"code 5 computer\"；RPA 工具影刀/UiBot（在被替代） | 若你也卖 token，盯紧 openrouter 这类聚合层；用 computer use 重估你手里会被替代的工具型业务 |\n| **势** 察时 | 小红书要自做播客；荔枝海外社交一年 30 多亿；Claude 4.8 / Codex 同晚发布；computer use 正在吃掉 RPA | 关注小红书播客动向；把\"被 AI agent 替代\"当成今年要主动应对的势 |\n\n## 📚 深挖：3 个值得单独学的知识点\n\n### 1. 「合规抢跑反被栽赃」的诉讼复盘——证据决定一切\n**是什么**：讲者一方做了个语音小组件（类似\"今天早上起床了吗\"的互动小组件），先于对方（极客系，疑为安卓侧\"语音组件\"产品方）合规上线并起量。对方在安卓没做好风控，用户上传了违规语音（现场反复提到\"瑟琴的语音\"被举报）导致其产品被下架，对方便认定是讲者一方恶意举报/搞竞对，\"气势汹汹起诉\"。结果：\"我们律师跟对方律师交换证据之后\"\"法官跟对方律师说你现在最好的结果就是撤诉\"，最终开庭前撤诉。\n**为什么重要**：这是一个典型的\"我先把事做对、对方自己出错却来咬我\"的纠纷模型。关键不在谁先上线，而在**证据链**——交换证据后对方律师自知告不赢，法官直接劝撤。它也提醒：抢跑合规者在对方眼里会被解读成\"下三滥手段\"，舆论/情绪上你未必占理，但法律上证据为王。\n**你能用**：被无理起诉时，第一动作是固定/留存证据（上线时间、风控逻辑、沟通记录），交给律师做证据交换，多数\"吓唬式起诉\"会自行撤诉。\n\n### 2. 播客/音频平台格局现场口径\n**是什么**：席间随口盘了一圈——**小宇宙**（被指是\"他们家的\"即小红书系？现场口径，存疑；\"推得好但量没那么大\"）、**荔枝**（上市公司，做海外社交，\"去年做了 30 多个亿\"，但国内业务\"天天被打\"）、**喜马拉雅**（用户量最大，\"被蜻蜓 FM 收了\"——此句方向可能反了，通常说法是喜马拉雅体量更大，需核实）。还有一句信号：\"**小红书要做自己的播客**\"\"越来越多了\"。\n**为什么重要**：这是从业者茶余饭后的\"体感排名\"，未必精确，但能快速校准一个赛道里谁大谁小、谁在扩张。\"平台要自做内容生态\"（小红书做播客）往往是上游动作，会影响下游创作者/工具方。\n**你能用**：把\"小红书自做播客\"记为一个待验证信号；涉及音频分发时，平台体量口径自己再独立核实（本场数字均为饭桌口径）。\n\n### 3. 风口生意的\"保质期\"：RPA 正被 computer use 干掉\n**是什么**：一位讲者自述路径——\"22 年我做爬虫，23 年做 RPA，24 年做 AI\"，被同桌评\"每一波都是风口\"。RPA（点点点的自动化，工具点名**影刀、UiBot**）巅峰期\"一个月能干十几万\"，但现在\"被 code 5 的 computer 干的……倍感的体无完肤，完全卖不动了\"——因为 computer use\"全流程打通、根本不需要学任何东西\"。\n**为什么重要**：这是一个鲜活的\"工具型生意被上一层 AI 能力吞掉\"的案例。RPA 的价值是\"教机器按固定流程操作\"，而通用 computer use 直接让用户用自然语言驱动、无需配置，等于把 RPA 的护城河填平。**任何\"帮人省重复操作\"的工具，都要警惕被更通用的 agent 替代。**\n**你能用**：盘一遍你手里靠\"帮人省事/自动化\"赚钱的业务，逐条问\"通用 AI agent 能不能直接做\"；能被替代的，要么往更深的行业 know-how 走，要么趁还能卖的时候转型。\n\n## 🛠 可直接复用的方法（含\"不要误读成\"）\n\n**方法 1：无理诉讼，先固证再交换证据**\n- 核心意思：对方\"气势很足\"地起诉，多是吓唬；律师交换证据后对方自知告不赢，法官会劝撤诉。\n- 你可以怎么用：保留上线时间、风控/合规记录、聊天记录，交律师走证据交换流程。\n- 不要误读成：以为先上线就天然有理——决定胜负的是证据，不是先后或情绪。\n\n**方法 2：内容\"全平台分发\"，不困在要靠人情互推的小生态**\n- 核心意思：讲者明确表示不玩极客那种\"互相转来转去、抱团互推\"，内容\"全部分发\"。\n- 你可以怎么用：把一份内容做成多平台分发，别把增长押在一个要每天\"亲亲么么哒\"维系关系的小圈子。\n- 不要误读成：完全不要关系——而是不要把命脉系在\"必须互推才有量\"的封闭生态上。\n\n**方法 3：借大场合搭车发布，换 PR 物料**\n- 核心意思：一方借\"撑场\"的活动，顺势发布刚做两周的媒体品牌\"逐日前线\"，攒一份 PR 物料。\n- 你可以怎么用：有新品牌/产品时，找一个现成的大场合搭车首发，低成本拿到曝光和素材。\n- 不要误读成：为发布硬办一场活动——搭车别人的场更省成本。\n\n## 📅 7 天作业\n\n- **Day 1**：列出你目前主要现金流来源，逐条标注\"会不会被某个通用 AI agent / 新工具替代\"。\n- **Day 2**：把一项\"会被替代\"的业务，写出一条转型或加深行业 know-how 的路径。\n- **Day 3**：检查你最重要内容的分发面——是否只押了一个平台/一个要靠互推的小圈子？补一个新分发渠道。\n- **Day 4**：整理一份\"合规/上线/沟通\"证据留存清单，作为日后任何纠纷的默认动作。\n- **Day 5**：研究\"小红书做播客\"这条信号——查一手资料，判断和你业务有没有关系。\n- **Day 6**：如果你在做 AI token/中转站，调研 openrouter 这类聚合层的定价与合作模式。\n- **Day 7**：找一个近期的大场合，设计一次低成本\"搭车发布\"，把它变成可复用的 PR 物料。\n\n## 🤔 回到自己业务的追问\n\n- 我现在赚钱的工具/业务，半年内会不会被一个更通用的 AI agent 直接替代？\n- 我的增长是不是押在一个\"必须互相点赞抱团\"才有量的封闭生态里？\n- 如果明天被人无理起诉，我手里的证据链够不够让对方知难而退？\n- 我有没有把\"风口红利\"误当成\"永久护城河\"？\n- 我有没有可以\"搭车大场合发布\"的新品牌/产品，省下自己办活动的成本？\n- 涉及平台体量/收入这类数字，我是不是把饭桌口径当成了事实？\n\n## 👥 关键人物与资源（这桌人能给你什么）\n\n> 人名均为 ASR 识别 + 现场绰号，准确度低，仅作线索。\n\n| 人 | 是谁（现场口径） | 对你的价值 |\n|---|---|---|\n| **子木 / 子路** | 内容/SEO 玩家，声量大、SEO 水平不错；被指\"被 AI 洗稿误引用\"卷入争执 | SEO/内容增长对标 |\n| **戈飞（高飞）** | SEO 高手，\"超级怼量型\"、短期见效强但\"以牺牲品牌长期为代价\"；爱在极客上互怼 | 学\"短期怼量 vs 长期品牌\"的策略权衡 |\n| **飘哥 / 岳峰顺** | 中转站/AI token 大佬，\"最赚钱的中转、前五的\"，一堆 App 早不运营但仍赚钱；与讲者互为友商（\"黑白双煞\"） | 中转站/AI token 生意对标与合作 |\n| **博宇** | 到处都在的社群常客，懂投放策略；外站靠\"多多\"起步，3 个月后转\"不停注册独立站+导流\"的战群打法 | 独立站 SEO/投放打法 |\n| **做增长的讲者（说话人3）** | 自述\"做增长/用户增长/冷启动各种手段都有\"，23 年就在一支烟花、深圳有书等社群，刚从美国回来 | 用户增长/冷启动 |\n| **做 openrouter 的人** | 专做 AI 基建，接很多 AI 基建项目，\"Token 卖得更好\"，传 B 轮融资、对接英伟达（均为现场口径，存疑） | AI 基建/token 供给侧 |\n| **杨帆** | 活动组织方，出钱请这桌人撑场（包嘉宾+招募） | 活动撑场/借势资源方 |\n| **瑞奇老板** | 低调到场不愿上台分享，私下做背调交流，\"你别把我东西卖了\" | 圈内低调实力派 |\n\n## 💬 金句\n\n- \"出门在外，身份是自己给的。\"——对\"天花板/前五\"这类自我标榜的清醒注脚。\n- \"反正赚钱就行了，哪需要运营呢？\"——飘哥式产品观：App 早不运营但仍在赚钱。\n- \"你自己的风控、管控没有做好，我们也没做这个事情。\"——诉讼里把责任归位的关键一句。\n- \"这现在被 code 5 的 computer 干的……完全卖不动了。\"——RPA 被通用 agent 替代的现场体感。\n- \"圈内小魏老师做的低调谦虚做事情，在外面是对的。\"——这个圈子对\"低调做事\"的价值认同。\n\n## ⚠️ 来源边界\n\n本篇基于飞书妙记逐字稿整理，**本场为活动散场后的私下闲聊，信息密度低、八卦与互怼为主，已如实少写**。人名/产品名（子木、戈飞、飘哥、岳峰顺、博宇、逐日前线、影刀、UiBot、\"code 5 computer\"等）均以 ASR 识别 + 现场绰号为准，偏差很大，使用前务必核实真实身份。平台体量/收入数字（荔枝 30 多亿、社群 300 多万 GMV、喜马拉雅被蜻蜓收购等）为饭桌口径，未独立核实，存疑。不含原始逐字稿正文。";
