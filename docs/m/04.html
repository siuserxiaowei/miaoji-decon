var SRC = "> 场景：广交会现场的「AI 大出海」专场，4 位嘉宾连续主题分享（AI 订阅变现 / AIGC 内容带货 MCN / AI 数据增长平台 / 海外用户研究）+ 一场圆桌讨论。台上像一条产业链横切面：从「怎么变现」到「怎么获客」到「怎么读懂用户」一路打通。\n> ⚠️ 飞书原标题叫「AI出海业务策略讨论」，方向没跑偏，但容易被读成一场泛泛而谈的圆桌。实际上前半场四个分享各自是**一门生意的方法论**，信息密度比标题暗示的高得多——别只读圆桌。\n\n## ⏱ 如果只读 10 分钟（7 条带走判断）\n\n1. **AI 出海最贵的学费不是技术，是 PMF 不能跨市场搬运**。耶鲁博士背景的用研嘉宾点名：95% 出海团队没做基础用户研究就砸广告，「在中国验证过的 PMF」迁到海外**要从零重找**——这是反复出现、最该记的一条。\n2. **C 端 AI 产品订阅要「年订阅 + 短试用」组合，且先测本地化、最后测价格**。谷歌系嘉宾给的优先级很反直觉：本地化成本低见效快先测，价格放到最后测。\n3. **AIGC 内容能不能变现，取决于背后的商业模式，不取决于 AI 本身**。MCN 嘉宾原话「Attention is not enough」——Sora 算力日烧 100 万美金、30 天留存不到 1%，照样关停；用户爱看的是内容不是 AI。\n4. **\"先有商业模式，再用 AI 规模化\"是铁律**。很多人把「商业模式问题」误当成「技术问题」：先用一个账号跑通 0→1 的市场验证，AI 负责 1→N 的批量复刻。\n5. **AI 让成功和失败都来得更快——包括被薅死**。两个真实案例：智算平台一夜被「闲鱼薅羊毛攻略」薅掉 3000 万；免费试用关不掉、一关用户跑光。边际成本结构变了，定价要重想。\n6. **软件不值钱了，值钱的是交付**。圆桌共识：AI 工具 3 个月就重写一次（龙虾/Claude Code/Codex），与其卖 SaaS 订阅，不如「来的时候就把钱收了」做买断 + 卖交付/技术服务。\n7. **AI 时代每个开发者都得是架构师**。链条是「目标 → 判断 → 架构」；写代码 90%+ 可被替代，但定目标、做判断、管住 AI 不越界这部分人更重要了。\n\n## 🎯 这篇真正能学什么\n\n这不是一场「谁家产品多牛」的路演，而是一张 **AI 出海的全链路作战地图**：①后端怎么变现（订阅组合 / 买断 + 交付 / 内容带货四赛道）；②流量怎么获取和放大（高流批量 + 精准社区 + AARRR 漏斗）；③用户怎么真正读懂（PMF 不可搬运 + 三层价值 + AI 深访）；④AI 时代的人该干什么（从执行者变判断者/架构师）。读完别记嘉宾名字，记这四张图，尤其是「PMF 不能跨市场搬运」和「先有商业模式再上 AI」这两条贯穿全场的底层判断。\n\n## 🧭 道法术器势（→ 你可以怎么用）\n\n| 层 | 本场对应（榨干版） | 你可以怎么用 |\n|---|---|---|\n| **道** 明向 | ①PMF 不会自己旅行，换市场要从零重找；②用户买的不是功能，是情感/身份价值（三层）；③Attention is not enough，内容火 ≠ 商业模式成立 | 上新市场前先问：我是在搬运旧 PMF，还是真重做了？我卖的是「省时间」还是「让他成为某种人」？ |\n| **法** 立本 | 先有 0→1 商业模式再用 AI 做 1→N；AARRR 全漏斗（获取/激活/转化/留存/裂变）AI 只强化前端，后端靠产品深耕；买断+交付 vs SaaS 订阅 | 把「人工跑通一个，AI 复制一千个」当默认路径；别只盯获客，把漏斗后三段补上 |\n| **术** 立策 | 年订阅+短试用组合；先测本地化、最后测价格；高流批量抢首波测试流量；找垂直社区/论坛的低成本健康流量；AI 深访替代麦肯锡咨询师 | 设计一次「本地化 A/B 测试」；上广告先用批量素材抢测试流量，再放大那 1/10000 的爆款 |\n| **器** 成事 | 谷歌 AD 2026 商业化报告/SP-BI 平台；琳琅 AI Agent 建联系统（1 运营管 1000+ 达人）；数海私有化部署数据增长平台；Pika 语音深访智能体 + 400 万先锋消费者 panel；龙虾开源工具+market | 缺哪条能力先看有没有现成平台接（深访/达人/数据合规），别全自己造 |\n| **势** 察时 | AI 出海是大势且「中国人的出海」（人/餐厅/文化一起出去）；用研被 AI 彻底革命（连 Anthropic 都用 AI interviewer 访谈 8 万用户）；AI 让胜负来得更快 | 趁 AI 深访/AI 内容这个窗口降本，但守住「读懂用户」这条不被替代的护城河 |\n\n## 📚 深挖：9 个值得单独学的知识点\n\n### 1. PMF 不能跨市场搬运——AI 出海最贵的学费（全场的\"道\"）\n用研嘉宾（自称耶鲁机器学习博士、做过美国商学院教授、连续创业者，公司 Pika/总部新加坡，人名 ASR 未给出准确名）反复强调：「PMF 不会自己去旅行」。中国创始人常默认「我在国内验证过 PMF、供应链又强，出海就能攻城略地」——**这个假设被实践反复证伪**。他举《明日边缘》：主角到了东京就迷失了，不再知道自己是谁、对周围人有什么价值，正是中国 sellers 出海的真实困境。数据狠：**95% 出海团队没做基础用研就砸广告**，融来的钱花几百万推下去，才发现 PMF 错了、ICP 定义错了。\n**为什么重要**：这是「在大树上修剪枝叶 vs 重扎根基」的区别——点式地知道「海外不爱大而全、爱垂直单一」「强制社交分享会有合规麻烦」这些都不够，根上是每个市场要重找 PMF。\n**你能用**：进新市场前，先老实做基础用研（见知识点 2），别拿国内 PMF 当通行证。\n\n### 2. 进新市场的「用研最低作业清单」（可直接抄的 SOP）\n同一位嘉宾给了一份「打小抄式」的捷径清单，进任何新市场至少完成：\n- **20 个以上对 ICP（理想客户画像）的深度访谈（IDI）**；\n- **1–2 个平台的社区聆听**（community listening，如 Reddit 找相关 subreddit、Discord、TikTok 评论区/直播间）；\n- **3–5 个专家访谈**（最懂本地深层价值与行业壁垒，能帮你省 6–18 个月、省几百万）；\n- **至少 3 个本地竞品的对比研究**。\n做完这套，你才有「大树的根基」，知道 PMF 在哪、三层 job-to-be-done 各是什么、营销/销售/本地化怎么打。\n**为什么重要**：把「做用研」从一句正确的废话，变成一张能照着勾的清单。\n**你能用**：把这四项做成 checklist，下次进新市场前逐项打钩，没打满不准投广告。\n\n### 3. 用户买的是三层价值：功能 / 情感 / 身份（用研的核心框架）\n嘉宾用现场另一位讲过的「强力水管」当例子拆三层：功能层=把车库庭院冲干净；**情感层**=带来一种「无所不能、能把所有污垢清干净」的力量感/爽感（真实生活很无力，水管让他觉得无所不能）；**身份层（social/identity）**=用了这产品后，「我在周围人眼中成为了什么样的人」。特斯拉同理——访谈追问几层之后，买的是「符合潮流、热爱环保、马斯克粉丝」这种身份认同，这时产品才变成品牌。\n**为什么重要**：中国团队第一层（功能、有 data）最擅长，第二、三层最不擅长，而真正打动海外用户、撑起品牌溢价的是后两层。\n**你能用**：给你的产品写三层价值，逼自己把情感层和身份层写出来，没有就说明还停在「功能照片」层。\n\n### 4. 数据 / 分析 / 洞察是冰山三层，只有\"洞察\"能指导创新\n嘉宾把三者拆成冰山：**数据**=发现现象（如这个市场付费转化率远低于其他市场）；**分析(Analytics)**=做归因/attribution、session recording，找摩擦在哪；**洞察(Insight)**=底层有哪些用户心理机制/情绪/社会价值观在驱动这些行为。真实案例：一款「AI+日历」产品进北美欧洲 CAC 高、转化低，查数据查不出原因；做人类学研究(anthropographic)后发现——**欧美用户认为日历极其隐私，非常介意 agent 工具碰自己的日历**。找到这个 insight 后用「人工干预」式做法解决，广告 ROI 翻了 5 倍。\n**为什么重要**：「真正指导创新的不是数据、甚至不是分析，是洞察」——这是这桌人对「数据驱动」的最重要修正。\n**你能用**：你卡住的转化指标，别停在分析层，去做几个深访挖底层心理动机。\n\n### 5. AI 深访把用研提效 10–20 倍（一个正在被革命的赛道）\n传统深访很贵、很碎、难规模化：教 MBA 学生做好要一学期，麦肯锡咨询师一小时 1000 美金，创始人一个月做 10 个就到顶，还要反复 reschedule。这位嘉宾做了 Pika：用 Speech-to-Speech、多模态模型训了个**有同理心、能听情绪、带专业知识的 AI 访谈师**，能同时对全球 1000 个用户做一对一个性化深访；又建了个 **400 万 lead user（先锋消费者+专家）panel**，解决「海外找不到人访谈、团队不会讲西/葡语」的问题。佐证趋势：Anthropic 自己做了 AI interviewer（Ava）访谈 8 万+用户，挖出「用 AI 两大动机=专业卓越/个人成长，三大担忧=不可靠(幻觉)/取代工作/马屁精(Yes man)」。\n**为什么重要**：用研这个「最贵最难规模化」的环节正在被 AI 重做，是个真实窗口。⚠️ 「提效 10–20 倍」「400 万 panel」是嘉宾自家产品口径，未独立核实。\n**你能用**：做用户访谈别再纯靠人肉，评估能不能用 AI 深访工具批量跑一轮。\n\n### 6. AIGC 内容变现：Attention is not enough，先有商业模式再上 AI\nMCN 嘉宾（琳琅智选总经理，TikTok AI 含量最高的 MCN，签约 1 万+ 海外网红，每月 100 万美金纯 AI 内容订单，人名 ASR「李希/李信」存疑）的核心论点：2017 谷歌《Attention Is All You Need》开启 AI，但商业变现领域 **attention is not enough，内容背后的商业模式成立更重要**。Sora 反例——日烧算力 100 万美金、30 天留存不到 1%、半年关停；OpenAI 都不挣钱不代表 AIGC 不能变现，因为「用户爱看的是内容，不是 AI 本身」（类比：爱看美女主播 ≠ 爱去整容院蹲着）。一个真能挣钱的带货视频：300 万播放、9000+ 销量、8 万美金销售额、0 广告，靠 link(触达/3 秒留存) + latch(转化/拟真展示卖点)。\n**为什么重要**：戳破「用 AI 把烂内容复刻 100 遍就能赚」的幻觉——0×100 还是 0，喷头卖 50 刀能成、卖 100 刀再吸引人也不行。\n**你能用**：上 AI 批量化之前，先用一个账号把「有人愿意为你买单」的 0→1 跑通，再交给 AI 做 1→N。\n\n### 7. 局部替代 + 先有后优：AI 落地的两条实操心法\n同一 MCN 嘉宾讲了大厂高管出来创业的常见坑——**路径依赖想「放个大招做一站式全链路系统」**，在 AI 时代有两大压力：①资金压力大；②AI/内容行业更迭极快，大招憋到一半行业可能就变了/全团队被迫重构。他们的做法是「**局部替代**」：先找一个最费人、一天做 100 遍的运营节点把它自动化，再到 SOP 下一个节点，把动作蒸馏成 skill 再让 agent 因地制宜调用——一年前还靠大学生三班倒回消息（每天触达 10 万达人），现在 1 个运营管 1000+ 达人，人效 10–20 倍。另一条「**先有后优**」：60 分的东西也有 60 分的意义（40 分的早期 AI 视频跑通了分发系统、养成了达人发 AI 视频的习惯），别等完美才发。\n**为什么重要**：这是「不要憋大招、要切片落地」的可迁移方法论，对任何想用 AI 改造业务的团队都成立。\n**你能用**：列出你最费人、重复度最高的一个节点先自动化掉，别一上来就想做全链路系统。\n\n### 8. C 端 AI 订阅的变现组合与 A/B 测试优先级\n开场谷歌系嘉宾（AD 商业化产品）的几条硬结论：①把 LTV 拉长到 180 天看，可能翻 6 倍以上，别一味做低价门店式定价（伤现金流、回收周期太长）；②**「年订阅 + 一周左右短试用」**对整体转化和活跃最正面，是较理想的订阅架构；③A/B 测试优先级有讲究——**先测本地化**（成本低、见效快，含货币单位/可视化要素/地道文本表达），再测区域套餐推广，再测实验周期，**最后才测价格**；④首会话就把消费锚点直观抛出、按用户分层(千人千面)做定向付费推送（如按「学西班牙语」关键词下载的用户，付费墙就聚焦西班牙语案例）。\n**为什么重要**：给了一套可直接落地的订阅运营 SOP，尤其「价格最后测」反直觉但成本逻辑清晰。⚠️ LTV 翻 6 倍等为销售口径，需用自己数据验证。\n**你能用**：做 AI 订阅 App，先排一轮本地化 A/B，别一上来就改价格。\n\n### 9. AI 时代的边际成本与定价：从\"开发成本\"变\"持续消耗\"，警惕被薅\n圆桌一位技术出身嘉宾的洞察：AI 公司的边际成本结构变了——以前是「开发一次，火了就爆，不火成本沉没在那」；现在「**只要上线、有人用就持续消耗你**」，免费试用一开，用户觉得好用（甚至拿你当中转站），一关用户全跑光。两个血案：朋友做智算/算力平台，国内站被做成「闲鱼薅羊毛攻略」（攻略 1 块钱一份、还做成知识付费），**一夜 3000 万没了**。由此圆桌的解法是「**带着你的 agent 来玩**」——只提供工具/平台（如龙虾的开源工具+market），流量/算力用户自己付；收费不走 SaaS 而是**买断+交付**（软件不值钱、3 个月重写一次，值钱的是最后的交付和技术服务）。\n**为什么重要**：AI 产品的定价和防薅必须重新设计，老的「免费引流再转化」在高边际成本下可能直接被薅死。\n**你能用**：上免费试用前，先算清单用户的真实消耗成本和被批量薅的风险，考虑买断/「自带 token」模式。\n\n## 🛠 可直接复用的方法（含\"不要误读成\"）\n\n**方法 1：进新市场先做\"用研最低作业\"再砸广告**\n- 核心意思：20+ ICP 深访 + 1–2 平台社区聆听 + 3–5 专家访谈 + 3 竞品对比，这套做完才有 PMF 根基。\n- 你可以怎么用：做成 checklist，没打满不准投广告。\n- 不要误读成：把它当「正确的废话」收藏了事——95% 的团队就是知道重要但没做，结果交了几百万学费。\n\n**方法 2：先有商业模式（0→1），再用 AI 规模化（1→N）**\n- 核心意思：先用一个账号/一次投放跑通「有人愿意买单」的市场验证，AI 负责批量复刻。\n- 你可以怎么用：想创业先别辞职，副业开个账号发内容，看有没有人以任何形式买单。\n- 不要误读成：把商业模式问题当技术问题——0×100 还是 0，AI 复刻不出不存在的需求。\n\n**方法 3：局部替代，别憋大招**\n- 核心意思：找最费人、重复度最高的一个节点先自动化，再蒸馏成 skill 交给 agent，逐节点推进。\n- 你可以怎么用：今天就列出你团队「一天做 100 遍」的那个动作，先把它干掉。\n- 不要误读成：上来做一站式全链路系统——资金压力大，且行业一变就得重构。\n\n**方法 4：AI 内容投放用\"高流批量抢测试流量 + 放大爆款\"**\n- 核心意思：用 AI 批量出素材抢首波测试流量（前期红利、利润好），但最高价值那一条永远是创意最好的、不是 AI 随机生成的。\n- 你可以怎么用：1 万条里找到那 1/10000 用户喜欢的，重点研究怎么放大它。\n- 不要误读成：AI 批量=躺赚——批量内容重复性高，转化能不能复用、用户有没有粘性都要另花成本验证。\n\n## 📅 7 天作业\n\n- **Day 1**：给你最核心的一个产品写「三层价值」（功能/情感/身份），写不出后两层就说明还停在功能层。\n- **Day 2**：列出你「在国内验证过、但搬到目标海外市场可能失效」的 3 条 PMF 假设。\n- **Day 3**：把「用研最低作业清单」（20 深访/社区聆听/3-5 专家/3 竞品）做成 checklist，对当前出海市场逐项自评打钩。\n- **Day 4**：找你业务里「最费人、一天做 100 遍」的那个节点，写出怎么先把它自动化掉。\n- **Day 5**：找 1-2 个目标用户真正聊一次（不是发问卷），挖一条你数据里看不到的「洞察」。\n- **Day 6**：重算一笔账——如果开免费试用，单用户真实消耗成本是多少？会不会被批量薅？要不要改成买断/自带额度？\n- **Day 7**：把你产品的获客方式套进 AARRR 漏斗，看后三段（转化/留存/裂变）哪一段最空，定一个补法。\n\n## 🤔 回到自己业务的追问\n\n- 我出海是在搬运国内 PMF，还是真的为这个市场重找了 PMF？\n- 我卖的是「省时间/提效率」，还是「让用户成为某种人」？海外那个市场吃这套吗？\n- 我把「商业模式问题」误当成「技术问题」了吗？0→1 跑通了再上 AI 吗？\n- 我的 AI 产品边际成本结构变了——免费试用会不会被薅死？该买断还是订阅？\n- 我的获客漏斗后三段（激活/转化/留存/裂变）补上了吗，还是只在最前端堆 AI 内容？\n- 我做决策靠的是数据、分析，还是真正的用户洞察？\n- AI 时代我是在做「执行」还是「判断/架构」？我管得住 AI 不越界吗？\n\n## 👥 关键人物与资源（这桌人能给你什么）\n\n⚠️ 本场逐字稿基本未给清晰姓名，多以「说话人 N」标注，下表按其自述身份归纳，姓名多为 ASR 推测/缺失，对接前需核实。\n\n| 人 | 是谁（自述） | 对你的价值 |\n|---|---|---|\n| **谷歌 AD 商业化嘉宾**（说话人2，开场） | 谷歌系 C 端 AI 订阅变现产品，有 2026 商业化报告、SP-BI 平台，2 万+客户大盘数据，展位 V11 | C 端 AI 订阅的本地化/定价 A/B 测试方法与大盘对标 |\n| **李希/李信（ASR 存疑）** | 琳琅智选(Lynx) 总经理，AI 含量最高的 TikTok MCN，签约 1 万+ 海外网红，月 100 万美金纯 AI 内容订单，杭州、做校企合作 | AIGC 内容带货出海 + 海外达人规模化建联 |\n| **数海 AI 解决方案负责人**（说话人2，第三场） | 数海科技（数据中心领域 10 年），出海客户 1500+、接入采集 8000+ 站点，私有化部署 AI 数据增长平台，展位 A45 | 出海数据合规（私有化部署免跨境）+ AI 业务增长/用户全域感知 |\n| **用研嘉宾（耶鲁博士，人名缺失）** | 数据科学家/前美国商学院教授/连续创业者，2024 底孵化 Pika（总部新加坡），AI 深访智能体 + 400 万先锋消费者 panel，常驻上海/新加坡/旧金山 | 海外 PMF 重建、用户深访/洞察、最该深聊的一桌人 |\n| **鲍/Bao（主持人，说话人1）** | 投资人出身，上帝视角看 AI/出海行业 | 行业全景、项目成败判断 |\n| **圆桌嘉宾 Apple** | AI 产品经理 | AI 产品落地、被替代岗位判断 |\n| **圆桌嘉宾（珠海佳邦物流经理）** | 报关/代理/代客业务（含美国线） | 出海物流/代理落地 |\n| **圆桌嘉宾（前上市公司营销总监）** | 带过百人团队，后做海外社媒垂类第一的 UGC | 海外社媒投流、增长团队 |\n| **圆桌嘉宾（龙虾相关，说话人1之一）** | 主张「带着 agent 来玩」、买断+交付模式，提到龙虾开源工具+market | AI 工具的定价/交付模式 |\n\n## 💬 金句\n\n- 「PMF 不会自己去旅行。」——出海最该刻在脑门上的一句，换市场就要从零重找。\n- 「Attention is all you need，但在商业变现领域，attention is not enough。」——内容火 ≠ 生意成立。\n- 「很多人会错误地把一个商业模式问题归因于一个技术问题。」——先有 0→1，再让 AI 做 1→N。\n- 「真正能够指导创新的，不是数据，甚至不是分析，是洞察。」——数据/分析/洞察的冰山三层。\n- 「软件现在已经不值钱了，值钱的是我最后的交付。」——AI 时代的定价新逻辑。\n- 「带着你的 agent 来玩，流量你自己付。」——高边际成本下的防薅/收费心法。\n- 「60 分的东西也是有 60 分的意义的。」——先有后优，别等完美才发。\n- 「我们一般来说会叫做销转……AARRR，能放大的不只是第一道获取流量。」——别只在最前端堆 AI。\n\n## ⚠️ 来源边界\n\n本篇基于飞书妙记逐字稿整理；逐字稿为 ASR，多数嘉宾以「说话人 N」标注、姓名缺失或识别存疑（如「李希/李信」「鲍/Bao」「Apple」，公司名「琳琅智选/Lynx」「数海/书海」「龙虾」「Pika」均以听写为准，真实主体待核）；宏观数字（LTV 翻 6 倍、用研提效 10–20 倍、400 万 panel、月 100 万美金订单、一夜被薅 3000 万、Sora 日烧 100 万美金/留存<1% 等）为现场分享/销售口径，未独立核实，使用前请存疑；不含原始逐字稿正文。";
