var SRC = "> 场景：这不是一场\"会\"。这是一段约 3.5 小时的环境录音，主角（siuser小伟，下称\"小伟\"，被叫\"江总\"）一边在如家商旅酒店前台值班/办事（开房、登记身份证、收外卖、调机器人送货），一边断续地打电话/咨询律师，处理一笔被某集团拖欠近一年的尾款；后半段是和朋友\"涛哥\"复盘一场没录上的 AI 硬件/出海饭局。\n>\n>\n> ⚠️ <strong>信息密度低</strong>：全程 70% 是酒店前台流水（\"哪个房间\"\"身份证后四位\"\"放桌子上写房号机器人送上去\"）和私人闲聊（打游戏、唱生日歌、室友洁癖段子）。飞书把它命名为\"酒店事务及业务合作讨论\"——前半截没问题，但真正有学习价值的只有两条暗线：①<strong>一笔合同欠款该不该起诉</strong>的实战决策；②一场<strong>AI 硬件出海饭局的二手复盘</strong>。\n>\n> 本篇只榨这两条，其余不注水。\n\n## ⏱ 如果只读 10 分钟（5 条带走判断）\n\n1. <strong>合同里被塞了\"AI 提示/AI 生成\"痕迹，差点成了对方拒付的借口。</strong> 全程反复出现\"合同最下面有 AI 提示，他说不合格，要重签\"。教训很直白：<strong>对外正式合同别留 AI 痕迹</strong>，更别在没人工逐条审过的情况下签——小伟自己吐槽\"我又刚好在外面见客户，没认真看，他们现在才跟我提\"。\n\n2. <strong>一笔 4 万多（后面又说 8 万多）的尾款拖了快一年，对方集团\"内斗/财产混同/已成失信被执行人\"。</strong> 小伟连夜咨询了至少两个律师，核心结论指向：<strong>对方公司已经没钱，胜诉≠拿到钱，强行起诉大概率是\"出口气\"而非\"拿回钱\"</strong>。最后他自己定性：\"我要出口气哪有拿钱舒服？\"——并倾向先整理证据、暂缓起诉。\n\n3. <strong>签了保密协议却自己先违约（在闲鱼挂了对方产品），成了反被拿捏的把柄。</strong> 小伟全程在问律师：\"我们泄露了他的版权/知识产权，他会不会拿这个点要挟我不给钱？\"这是典型的<strong>自己手不干净，导致维权时投鼠忌器</strong>。\n\n4. <strong>饭局的二手复盘价值，被\"没录上\"直接清零。</strong> 涛哥参加了一场信息量\"巨多\"的 AI 硬件/出海饭局（讲了游戏、应用、ESIM 卡、出海赚钱赛道），但录音设备\"宣传能录24小时，结果几分钟就断电\"，\"全都没录到\"。最痛的一课不是内容，是：<strong>高价值场合的记录冗余没做好，等于白去。</strong>\n\n5. <strong>\"任何事 + 自媒体 = 王炸，唯独单独做自媒体最亏。\"</strong> 这是涛哥这场里唯一一句成型的认知金句：产品/硬件带着自媒体一起做，是流量给产品做杠杆；但脱离产品单做自媒体（卖课/纯流量）是最差的选择。\n\n## 🎯 这篇真正能学什么\n\n别指望从这段录音里学\"行业横切面\"——它没有。它能练的是另一种眼力：<strong>怎样从一地鸡毛的日常里，识别出两个真实的商业决策现场</strong>。①一个创业者面对\"被赖账\"时，如何在律师建议、情绪（出口气）、沉没成本（已经拖一年）和自身瑕疵（违反保密协议）之间做\"起诉 / 不起诉\"的取舍；②一个人转述一场他自己都没消化、没录下来的高价值饭局时，信息衰减有多严重——<strong>这恰恰反向证明了\"在场 + 完整记录\"本身就是稀缺资产</strong>。读完记住这两个场景的\"决策结构\"，别记酒店房号。\n\n## 🧭 道法术器势（→ 你可以怎么用）\n\n| 层 | 本场对应（榨干版） | 你可以怎么用 |\n|---|---|---|\n| <strong>道</strong> 明向 | 维权的本质是\"拿回钱\"不是\"赢官司\"；对方没钱时，胜诉是张废纸。自己先违约（破坏保密协议），维权就先矮三分。 | 任何纠纷先问：赢了之后<strong>真能拿到钱吗</strong>？再问：我自己手干净吗？ |\n| <strong>法</strong> 立本 | \"起诉 vs 暂缓\"是个期望值计算：P(胜诉)×P(可执行)×金额 − 律师费 − 时间。本场算下来负期望，于是暂缓。 | 把每个维权/诉讼当一笔投资算 ROI，而不是凭一口气。 |\n| <strong>术</strong> 立策 | 先整理证据（合同、聊天记录、转账流水、公对公记录）再决定打不打；合同重签去掉 AI 痕迹；写合同\"偏甲方、对乙方苛刻\"。 | 纠纷第一步永远是<strong>固证</strong>；正式合同人工逐条审、留好验收标准。 |\n| <strong>器</strong> 成事 | 律师（陈律师/王总/于总等多方咨询）；天眼查类工具查对方\"经营情况/是否失信被执行人\"；飞书会议纪要可当现场录音工具。 | 谈合作前先查对方公司有没有钱/有没有失信记录；重要场合用飞书实时纪要兜底录音。 |\n| <strong>势</strong> 察时 | 对方集团正在\"内斗/暴雷/财产混同\"——这是个\"再拖下去更难拿\"的负向时间窗。AI 硬件/出海/游戏出海被反复说\"很赚钱\"，但本场只有传闻没有实据。 | 对暴雷中的债务人，\"等他盈利\"几乎=放弃；赛道热度要自己独立核实，别信饭局二手口径。 |\n\n## 📚 深挖：6 个值得单独学的知识点\n\n### 1. 合同里的\"AI 痕迹\"如何变成对方的拒付借口\n<strong>是什么</strong>：全程出现至少 5 次——\"他说合同最下面有 AI 什么提示，说不合格，要重新签\"\"直接去掉这个 AI 的东西，让他重新签一份，就算之前的合同\"。推测是合同文本里残留了 AI 生成/AI 提示的标记或措辞，被对方挑出来当\"合同不规范\"的理由。\n<strong>为什么重要</strong>：当一方想拖延/拒付时，<strong>任何形式瑕疵都会被放大成谈判筹码</strong>。AI 痕迹只是导火索，本质是\"合同没经过专业法务逐条审\"——小伟自己承认\"我们以前没那么麻烦，是因为之前吃了亏，才招了专业法务跟财务\"。\n<strong>你能用</strong>：对外正式合同（尤其有验收标准、尾款条款的）出手前，<strong>清掉一切 AI 生成痕迹并人工逐条审</strong>；别在\"见客户路上没认真看\"的状态下签字。\n\n### 2. \"胜诉概率\"和\"拿到钱概率\"是两件事\n<strong>是什么</strong>：小伟反复追问律师同一组问题——\"胜诉的概率大吗？\"\"能拿到钱的几率大不大？\"\"是胜诉了才有钱，还是没胜诉也有钱？\"\"起诉之后是不是没那么快拿到钱？\"他逐渐意识到对方\"已经是失信执行人\"\"集团财产混同\"\"还压着别人几十万报销款给不了\"。\n<strong>为什么重要</strong>：很多人把\"打赢官司\"当终点，但对一家已经资不抵债/失信的公司，<strong>判决书可能无法执行</strong>。期望值 = 胜诉率 × 可执行率 × 金额，本场可执行率已经很低。\n<strong>你能用</strong>：决定起诉前，先用天眼查/中国执行信息公开网查对方<strong>是否已是失信被执行人、有无可供执行财产</strong>；若已失信，重心从\"起诉\"转向\"固证 + 等可执行时机 / 债权打包\"。\n\n### 3. 自己违反保密协议，会让维权\"投鼠忌器\"\n<strong>是什么</strong>：小伟最担心的不是欠款本身，而是——\"这次合作签了保密协议，我们稍微泄露了一下（在闲鱼挂了他的产品），被他们发现及时下架了，我怕他们卡这个点说不给我们钱/拿这个要挟我。\"且涉及知识产权归属（\"产品是我们设计，但知识产权是他的\"）。\n<strong>为什么重要</strong>：这是个<strong>双向把柄</strong>结构——你要他还钱，他用你违约反制。维权前自己若有硬伤，议价权会被对冲掉。\n<strong>你能用</strong>：合作期间严守保密/版权条款，<strong>别为一点短期曝光把把柄送出去</strong>；万一已违约，固证时如实评估这条风险，别在谈判里被对方一击命中。\n\n### 4. \"出口气 vs 拿钱\"——情绪化维权的自我提醒\n<strong>是什么</strong>：小伟有句很清醒的自问自答——\"不然我要干嘛？我要出口气哪有拿钱舒服啊？\"以及最后倾向\"先把资料整理一下发律师，有机会就整，没机会就不整\"\"实在没精力再搞这个了，最近头特别大\"。\n<strong>为什么重要</strong>：拖了一年的欠款叠加沉没成本，最容易让人\"为了争一口气\"投入更多时间金钱，结果是<strong>二次损失</strong>。把\"出气\"和\"拿钱\"分开，是成本控制的关键一步。\n<strong>你能用</strong>：每次想\"非告他不可\"时，先问自己——我图的是钱还是气？如果是气，有没有比打官司更便宜的出气方式？\n\n### 5. 高价值场合的\"记录冗余\"必须提前做\n<strong>是什么</strong>：涛哥参加了一场\"讲了巨多信息量\"的饭局（游戏出海、APP 进前50、ESIM 卡源头价、各赛道赚钱方式），但用来录音的设备\"宣传能录24小时，结果可能录了几分钟就断电了\"\"全都没录到\"\"我还专门打开了的，还确认了的\"。小伟当场教他：\"手机怎么不打开录？你飞书会议纪要也可以开来录的，右上角实时会议。\"\n<strong>为什么重要</strong>：信息越密集的场合，单点记录失败的代价越高。<strong>记录要做冗余</strong>（手机录音 + 飞书实时纪要 + 当场笔记），不能押注一个\"宣传很美\"的硬件。这场录音本身就是个反面教材——它录下了 3.5 小时酒店流水，却没录下真正值钱的那场饭局。\n<strong>你能用</strong>：进任何高价值局之前，<strong>默认开两路记录</strong>；别信硬件厂商的\"24小时续航\"宣传，进场前充满电、当场确认在录。\n\n### 6. \"任何事 + 自媒体 = 王炸，单做自媒体最亏\"\n<strong>是什么</strong>：涛哥的原话——\"把产品跟自媒体顺带做（是王炸），但唯独单独做自媒体是最亏的\"\"任何事情加自媒体都是王炸，唯独单独的自媒体很尴尬\"，并举例\"像 Orange 橘那种逻辑是对的，疯狂做流量、不卖课、卖产品，用产品的价值杠杆、品牌力\"。\n<strong>为什么重要</strong>：这是本场唯一一条能独立成立的商业认知。自媒体是<strong>放大器不是发动机</strong>——它给\"已有实体（产品/服务）\"加杠杆很猛，但脱离实体、只靠卖课/纯流量变现，护城河薄、天花板低。\n<strong>你能用</strong>：如果你已经有产品，<strong>给它配自媒体做流量杠杆</strong>；如果你只想\"单做自媒体卖课\"，先想清楚背后到底卖什么实体价值。\n<strong>不要误读成</strong>：自媒体没用——恰恰相反，是\"自媒体必须挂靠在一个实体生意上才最猛\"。\n\n## 🛠 可直接复用的方法（含\"不要误读成\"）\n\n<strong>方法 1：起诉前先做\"可执行性尽调\"</strong>\n- 核心意思：查对方是否失信被执行人、有无可供执行财产，再决定起不起诉。\n- 你可以怎么用：用天眼查 + 中国执行信息公开网查对方公司，评估\"赢了能不能拿到钱\"。\n- 不要误读成：胜诉率高就该起诉——可执行率为零时，胜诉只是张纸。\n\n<strong>方法 2：纠纷第一步是固证，不是开撕</strong>\n- 核心意思：把合同、聊天记录、转账流水（含公对公记录）、产品交付证据先整理齐。\n- 你可以怎么用：开一个文件夹，按时间线归集所有证据，再找律师评估。\n- 不要误读成：先去找对方理论——没固证就开撕，容易把对方逼到删证据。\n\n<strong>方法 3：正式合同清 AI 痕迹 + 人工逐条审 + 留验收标准</strong>\n- 核心意思：对外合同别留 AI 生成痕迹，尾款/验收条款要人工审、写明确验收标准。\n- 你可以怎么用：签字前问自己——验收标准写清了吗？AI 痕迹清了吗？我是不是在路上没细看？\n- 不要误读成：用 AI 起草合同就是错——错的是不审、不清痕迹、不写验收标准。\n\n<strong>方法 4：高价值场合开双路记录</strong>\n- 核心意思：手机录音 + 飞书实时纪要双保险，进场充满电当场确认在录。\n- 你可以怎么用：进局前 30 秒做\"记录检查清单\"：电量、是否在录、是否两路。\n- 不要误读成：买个\"能录24小时\"的硬件就够了——单点设备就是这次翻车的原因。\n\n## 📅 7 天作业\n\n- <strong>Day 1</strong>：把那笔欠款的所有证据（合同、聊天记录、转账/公对公流水、闲鱼下架记录）按时间线归到一个文件夹。\n- <strong>Day 2</strong>：用天眼查 + 执行信息公开网查对方公司——是否失信被执行人、有无可执行财产、还有多少类似债权人。据此给\"可执行率\"打个分（高/中/低）。\n- <strong>Day 3</strong>：把\"起诉 / 暂缓\"做成一张期望值表：胜诉率 × 可执行率 × 金额 − 律师费 − 预计耗时，算出净期望，再决定。\n- <strong>Day 4</strong>：单独评估\"保密协议违约\"这条反制风险有多大，准备好万一被对方提起时的应对说法。\n- <strong>Day 5</strong>：拿出一份你最近的对外合同，删掉所有 AI 痕迹，补上明确验收标准，标出\"偏甲方\"的关键条款。\n- <strong>Day 6</strong>：给自己定一套\"高价值局记录 SOP\"（双路记录 + 进场检查清单），下次进局前执行。\n- <strong>Day 7</strong>：用\"任何事 + 自媒体\"这把尺，审视手上一个产品/项目——它的自媒体杠杆有没有挂在实体价值上？没有就补，或砍掉纯自媒体的幻想。\n\n## 🤔 回到自己业务的追问\n\n- 这笔钱我图的是\"拿回来\"还是\"出口气\"？如果对方真没钱，我还要不要投时间进去？\n- 我手上还有几笔类似的\"拖着没结的款/账\"？哪些已经进入\"再拖更难拿\"的负向窗口？\n- 我对外签的合同，有几份是\"在路上没认真看\"就签的？验收标准写清了吗？\n- 我和合作方的关系里，有没有\"我自己也违约/有把柄\"的地方，会在维权时反噬我？\n- 我有没有把重要场合的记录当回事？上一次\"本该记下来却没记下来\"损失了多少？\n- 我做的事里，自媒体到底是挂在实体生意上的杠杆，还是悬空的纯流量幻想？\n\n## 👥 关键人物与资源（这桌人能给你什么）\n\n| 人 | 是谁 | 对你的价值 |\n|---|---|---|\n| <strong>小伟 / 江总</strong>（siuser小伟，本人） | 录音主角，既在酒店前台值班办事，又是做 AI 硬件/出海的创业者，正处理被欠款纠纷 | —（本人） |\n| <strong>涛哥</strong> | 小伟的朋友/伙伴，做流量/出海，参加了那场没录上的 AI 硬件饭局；提出\"任何事+自媒体=王炸\"的认知 | 出海/流量圈的二手信息源；认知伙伴 |\n| <strong>谢总 / 老谢</strong>（疑似欠款方对接人） | 欠款合作的早期对接人，\"最开始老谢用公账给我打的\"；后期尾款转公对公 | 追款时的关键对接线索（人名待核） |\n| <strong>老王 / 谢总上司</strong> | 小伟追问\"我现在沟通老王那边，还是您之前那边的上司\"——欠款方内部对接对象 | 追款沟通链路上的节点（待核） |\n| <strong>陈律师 / 王总 / 于总</strong> | 小伟连夜咨询的多位律师/顾问，给出\"胜诉≠拿到钱、对方失信\"的判断 | 诉讼可行性评估；起诉/暂缓决策参谋 |\n| <strong>北野鱼海（公司，ASR 存疑）</strong> | 小伟让 AI 搜索的欠款方公司——\"欠我4万多快一年\"\"想看他公司有没有钱赔\" | 待尽调的债务方主体（名称以 ASR 为准，需核实） |\n| <strong>皇宫 / 黄工 / 黄宫</strong>（ASR 多个写法，疑同一人） | 被要求\"重新整一份合同（去掉 AI 提示）\"的对象，疑为合同相关乙方/对接人 | 合同重签的对接人（人名待核） |\n\n## 💬 金句\n\n- \"我要出口气哪有拿钱舒服啊？\" —— 维权别被情绪绑架：分清你图的是钱还是气。\n- \"想了一晚上，跟律师聊了一晚上，都想不出这笔钱怎么拿回来，只有一个——等他们集团盈利了。\" —— 对暴雷中的债务人，\"等他盈利\"基本等于放弃。\n- \"任何事情加自媒体都是王炸，唯独单独的自媒体就很尴尬。\" —— 自媒体是放大器，不是发动机。\n- \"做产品没那么快正反馈。\" —— 给做实体产品的人打的预防针：别拿做流量的爽点要求做产品。\n- \"终于感觉自己上牌桌了……还是得做产品是吧？\" —— 蹭局蹭多了的自省：进圈子是手段，做出东西才是目的。\n\n## ⚠️ 来源边界\n\n本篇基于飞书妙记逐字稿整理，<strong>该录音信息密度低</strong>：约 3.5 小时里大部分是酒店前台日常操作与私人闲聊，真正有学习价值的只有\"欠款是否起诉\"与\"出海饭局二手复盘\"两条暗线，本篇据此从简，未注水凑数。人名/公司名以 ASR 识别为准，<strong>\"北野鱼海\"\"皇宫/黄工\"\"谢总/老谢\"\"老王\"等均可能识别有误，追款/合作前务必独立核实真实主体</strong>。涉及金额（4 万多 / 8 万多 / 几十万报销款）、\"对方已成失信被执行人/财产混同\"等均为录音中当事人单方口径，未经独立核实，作决策前请以天眼查、执行信息公开网及专业律师意见为准。本篇不含原始逐字稿正文。";
