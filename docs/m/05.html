var SRC = "> 场景：飞行社「AI 开放麦」第三期直播课。主持人张佳宁，分享嘉宾是 Keep 人力资源总监张玲（Linda）。Linda 一个非技术 HR，用飞书妙搭 + aily，独自搭出了一个全员在线、含 30 多张数据表、对接北森 API 的「员工福利广场」系统，现已正式上线、近 400 用户。整场是一次<strong>完整的低代码实战复盘 + 踩坑分享</strong>，干货密度高。\n>\n>\n> ⚠️ 这不是产品演示秀，真正值钱的是后半段她主动交底的「三个坑 + 搭建顺序 + 数据库/权限/API 的取舍」。如果只看前面的功能介绍，就把这场会看浅了。\n\n## ⏱ 如果只读 10 分钟（7 条带走判断）\n\n1. <strong>非技术 HR 真的能独自搭出复杂业务系统</strong>。Linda 没有代码经验、不懂设计，靠妙搭 + aily + 自然语言对话，一个人搭出了含 30 多张表、对接 HR 系统 API、多管理员权限的全员系统。零门槛低代码已经能扛真实业务，不再是玩具。\n2. <strong>搭建顺序错了会重做两周</strong>。她最大的教训：先把所有功能做完、最后才改设计风格，结果「设计一变，功能链路全乱、有些链路跑不通」，返工一两周。<strong>正确顺序是：先定设计风格 → 再搭数据库 → 最后跑功能链路</strong>。\n3. <strong>前台简单、后台才是真功夫</strong>。前台页面只用了 3 天；后台数据库、权限、API 对接、全流程调试用了两三周。一个月的项目里，时间几乎全花在「调设计、调数据库、调权限」上。\n4. <strong>权限别用系统自带的\"硬编码角色\"，直接用自然语言在前台配</strong>。她先用妙搭自带权限角色做，发现满足不了\"按页面/模块/部门/职场\"的多维需求，于是<strong>把后端权限角色全删掉</strong>，纯靠和 AI 对话（约 5 轮）把权限调好。删干净后端权限是前提，否则系统会先读后端再读前台、互相打架。\n5. <strong>动态人员数据用 API 对接，别用多维表格手动同步</strong>。多维表格同步简单但每天要手动更新、维护成本高；她改成直连北森 API、每天 9 点自动同步，只取最小必要字段（司龄/职级/绩效等），前期费点劲、后期几乎零运营。\n6. <strong>妙搭扛不住高并发</strong>。几十人陆续登录没问题，但抢红包式的几十上百人同时登录会崩。所以她<strong>不做大推广，按业务事件（商保到期、EAP 排期）小规模分批触达</strong>，用运营节奏保系统稳定。\n7. <strong>隐私设计是赢得员工信任的关键动作</strong>。体检报告\"只上传不存储\"，后台查不到谁传过；EAP/全科医生咨询结果只对本人呈现；对外 API 的 Secret 做加密解密 + 权限分离。把\"员工敢用\"当成产品设计目标，而不是事后补丁。\n\n## 🎯 这篇真正能学什么\n\n这场会练的是<strong>「一个业务人，如何用低代码 AI 工具把一摊散乱的业务收敛成一个系统」的全流程眼力</strong>。读完该记住四张图：①搭建的正确<strong>先后顺序</strong>（设计→数据库→功能）；②妙搭/aily 各自<strong>能干什么、边界在哪</strong>（妙搭搭前台和表，aily 搭 agent/知识库/工作流，妙搭不抗高并发）；③<strong>动态数据 = API 对接</strong>这个判断；④把\"散在各处的入口\"收敛成\"一个广场 + 自动通知触达\"后，<strong>业务指标真的会变</strong>（今年福利使用人数是去年约两倍）。别记她做了哪些福利按钮，记这套方法。\n\n## 🧭 道法术器势（→ 你可以怎么用）\n\n| 层 | 本场对应（榨干版） | 你可以怎么用 |\n|---|---|---|\n| <strong>道</strong> 明向 | 福利广场不是\"介绍页\"，是把商保/体检/居住证/电脑福利等全链路<strong>收口成一个完整系统</strong>；散乱入口 = 高咨询量 = 福利触达失败；系统的本质是降咨询量、降运营、提触达 | 盘一摊你天天被重复问的事务，先问：能不能收口成一个入口 + 自助 + 自动通知，把人从答疑里释放出来？ |\n| <strong>法</strong> 立本 | 非技术人用低代码自建，比\"市场采购 / 定制开发\"更快更省（24 年选型：市面无合适产品、定制又贵又慢）；<strong>最小必要数据</strong>原则；按业务事件分批运营而非一把梭推广 | 评估\"买 vs 自建\"时把低代码自建当成真选项；数据只取功能必需的最小集；上线后按事件小步触达，别追求一次性大推广 |\n| <strong>术</strong> 立策 | 先定设计风格再搭数据库再跑功能；权限删后端、纯前台自然语言配；设计语言对齐不了就\"用别的 AI 出设计图、截图喂给它仿\"；先写一份接近 BRD 的需求文档再开搭；迭代时绝不破坏数据库、用 plan 模式 | 直接抄她的搭建 SOP：BRD → 设计风格定稿 → 数据库 → 功能链路 → 调试；改风格前先备份/锁数据库 |\n| <strong>器</strong> 成事 | 妙搭（搭前台 + 自带数据库/数据表）、aily（知识库 + 工作流 + agent，做小客服/EAP/全科医生）、北森 API（人员数据源）、外部 AI 工具出设计图、阿里 agent/小龙虾/GPT 当\"数字员工\"参与需求讨论、飞书机器人做通知触达、飞行社模板（创建同款） | 别从 0 搭：去飞行社复制脱敏同款再按需改；aily 负责\"智能/对话\"，妙搭负责\"页面/表/流程\"，分工用 |\n| <strong>势</strong> 察时 | 零门槛低代码 + AI agent 已经能让业务人自建生产级系统；HR/行政/培训等\"重复性事务流\"是当下最适合被这套工具吃掉的场景 | 趁工具成熟期，把你部门里\"高频重复 + 入口散乱\"的事务优先系统化；HR/行政/培训都有现成模板 |\n\n## 📚 深挖：8 个值得单独学的知识点\n\n### 1. 福利广场的本质：把\"散乱入口\"收口成\"一个完整系统链路\"\nLinda 反复强调：这<strong>不是一个福利介绍页</strong>，是把商保理赔、体检、工作居住证、电脑福利、EAP 心理咨询、带薪假、积分落户、内购等<strong>全部加载进同一个平台的完整系统链路</strong>。改造前，商保在 keep caring 机器人里、体检在云文档里、政策在订阅号推送里、还有些散在多维表格——员工找不到、不知道哪版最新，于是疯狂问 HR，咨询量爆炸；HR 这边又要手动统计体检数据、付费、商保使用情况……两头都被重复劳动压着。\n<strong>为什么重要</strong>：这是所有\"事务型系统\"的底层逻辑——<strong>散乱入口本身就是成本</strong>（用户侧的找不到 + 管理侧的重复答疑）。收口的价值不在\"好看\"，在于同时砍掉两边的隐性成本。\n<strong>你能用</strong>：先画一张\"现在这件事的入口分布图\"，每多一个入口就标一笔咨询成本，收口的 ROI 自然浮现。\n\n### 2. 搭建的正确顺序：设计 → 数据库 → 功能（顺序错了赔两周）\n她踩的最大坑：<strong>先把功能全做完，最后才想换个设计风格</strong>，结果\"设计风格一变，所有功能链路全乱掉，有些链路甚至跑不通\"，被迫重新跑通和测试每一条链路，光这个坑就花了一两周。她的结论：<strong>\"你们在做的时候可以先做设计，把设计风格确定好之后，再去跑后台的数据库\"</strong>，这样一两周就能做完整个系统。\n<strong>为什么重要</strong>：低代码工具里，<strong>视觉/页面结构和数据/逻辑链路是耦合的</strong>，后期改外观会震动底层链路。这和写代码里\"先定 schema/接口再写实现\"是同一个道理——<strong>先定不易改的、再做易改的</strong>。\n<strong>你能用</strong>：任何低代码项目，第一步定设计风格和页面框架并定稿，第二步搭数据表，最后才接功能链路。别被\"前台一下就搭出来了\"的成就感骗着先做花架子。\n\n### 3. 前台 3 天、后台两三周：成本结构要心里有数\n明确的工时账：<strong>前台应用搭建约 3 天</strong>；<strong>后台数据库搭建 + 权限搭建约两三周</strong>；<strong>全流程跑通调试又用了几天</strong>；整体约一个月，但\"主要时间都用在调设计、调数据库、调权限\"。\n<strong>为什么重要</strong>：新手最容易高估前台、低估后台。前台让你\"眼前一亮、特别有成就感\"，但真正的工程量和风险全在后台的数据建模与权限。心理预期错位会导致排期严重失真。\n<strong>你能用</strong>：给低代码项目排期时，把后台（数据库 + 权限 + 对接）当成大头，前台只留个零头。别拿\"页面很快搭好了\"去承诺整体交付时间。\n\n### 4. 权限：放弃后端\"硬编码角色\"，纯前台自然语言配\n她的权限路径很值得抄：场景需要\"多管理员、多模块、多页面、还要按职场/部门/角色\"控权。她先用妙搭<strong>自带的权限角色（她称之为\"硬编码权限\"）</strong>做，发现满足不了这种多维组合。于是<strong>把后端权限角色全部删掉</strong>，直接在前台用自然语言和 AI 对话，\"按页面、按部门、按角色\"描述需求，大概 5 轮对话就调好了。\n关键细节：她一开始在\"三个能设权限的地方\"反复纠结（①前台自然语言对话；②前台发起时的角色选择/写死；③后端自带的硬编码权限角色），搞得权限一团乱。<strong>必须把后端权限删干净</strong>——否则系统会\"先读后端权限，再读前端自然语言对话\"，两者打架。\n<strong>为什么重要</strong>：低代码里多个权限机制并存时会互相覆盖/冲突。<strong>选一套、删掉其余</strong>，比\"既要又要\"更稳。自然语言配权限是非技术人最友好的路径。\n<strong>你能用</strong>：多管理员系统，先清空工具自带的角色权限，统一用自然语言在前台描述\"谁能看哪些页面/模块\"，避免多套权限机制打架。\n\n### 5. 动态人员数据用 API 对接，别用多维表格手动同步\n入职离职是动态的。她最初想用多维表格同步（\"多维表格跟系统同步非常简单\"），但发现<strong>每天都要手动更新多维表格，维护成本极高</strong>。于是改成<strong>直连北森 API</strong>，只关联一张含基础信息（司龄/职级/绩效等）的报表，<strong>满足\"功能使用最小化\"的数据调用需求</strong>，设定每天 9 点自动同步。前期搭 API 稍费劲，后期\"基本不需要花时间运营，人力全释放出来\"。\n<strong>为什么重要</strong>：这是\"一次性投入 vs 持续运营成本\"的经典权衡。<strong>简单方案（多维表格）省了搭建期、却把成本转嫁到每天的维护上</strong>；API 把成本前置一次、之后趋近于零。还引出一个好原则——<strong>只取最小必要数据</strong>（既降同步负担也降隐私面）。\n<strong>你能用</strong>：凡是\"需要持续保持最新\"的数据，优先 API 自动同步；只拉功能必需的字段；接受\"前期多花点劲换长期零运营\"。\n\n### 6. 妙搭的硬边界：不抗高并发，所以运营要\"分批触达\"\n她明确点出妙搭的能力边界：\"<strong>妙搭不太适用于高并发场景</strong>，像抢红包那种几十上百人同时登录，可能造成系统瘫痪/崩溃、登不上\"；但<strong>陆续登录、每天几十人完全没问题</strong>，数据量\"2 万条以上都没问题、不会崩\"。正因如此，她<strong>刻意不做大推广</strong>——上线只发了一篇推文，之后按业务事件（商保到期、EAP 排期）做小规模运营，让用户陆续来、不挤在一起。\n<strong>为什么重要</strong>：这是把\"工具的技术边界\"翻译成\"运营策略\"的范例。<strong>与其和工具的弱点硬刚，不如设计一套绕开它的运营节奏</strong>。同时纠正一个常见误解：高并发 ≠ 大数据量，妙搭怕的是前者不是后者。\n<strong>你能用</strong>：用任何低代码/SaaS 工具前，先问清它的并发上限；如果会撞墙，就用\"分批/错峰/按事件触达\"的运营节奏绕开，而不是一上线就全员大推。\n\n### 7. 隐私设计是\"让员工敢用\"的产品决策，不是合规补丁\n多处隐私动作是主动设计出来的：①体检报告智能解析做成<strong>\"只上传不存储\"</strong>，后台查不到哪个员工传过、用过该功能，结果只对本人呈现；②EAP 在线咨询、AI 全科医生咨询同样做隐私处理；③对外 API 的 ID/Secret 做<strong>加密解密 + 权限分离</strong>，连一般管理员都看不到 Secret，防多管理员/后台信息泄露。她特意说这是\"跟技术团队一起探讨怎么保护员工隐私\"后的设计。\n<strong>为什么重要</strong>：在涉及员工敏感信息（体检、心理）的系统里，<strong>\"员工敢不敢用\"直接决定使用率</strong>。隐私不是为了过合规，是产品的核心体验。\"只上传不存储\"是个很巧的设计——既给了 AI 解析能力，又从架构上消灭了泄露可能。\n<strong>你能用</strong>：做涉敏感数据的工具，把\"用户敢用\"当成显式目标；能从架构上不存的就不存（阅后即焚式处理）；密钥类信息一定做权限分离。\n\n### 8. \"数字员工\"参与需求讨论 + BRD 先行的工作流\n她的搭建起点不是直接开搭：先内部产生痛点 → 和\"人类伙伴\"（团队）初步沟通确定需求 → 再和\"数字员工\"（阿里 agent、小龙虾、GPT 等）一起探讨整个系统框架 → 形成一份<strong>接近完整 BRD 的文档</strong>再开搭。她坦诚这是自己第一个应用、没做到 PRD/设计图那一步，并由此踩了设计的坑——所以她<strong>建议别只整理\"大篇幅文字\"</strong>：给 AI 输入时如果\"功能要求/模块/每个页面\"都很粗、不明确，后续迭代设计会费极大功夫。\n<strong>为什么重要</strong>：把 AI 当\"共创需求的数字员工\"而非\"出活工具\"，是这套工作流的关键心智。而 BRD 写得粗 = 后期返工多，<strong>前期的结构化清晰度直接决定后期的返工量</strong>。\n<strong>你能用</strong>：开搭前先和 AI 反复对齐出一份结构化的 BRD（功能、模块、每个页面讲清楚），别用一大段模糊文字开工。\n\n## 🛠 可直接复用的方法（含\"不要误读成\"）\n\n<strong>方法 1：低代码搭建 SOP —— BRD → 设计定稿 → 数据库 → 功能链路 → 调试</strong>\n- 核心意思：先把不易改的东西（设计风格、数据 schema）定死，再做易改的功能。\n- 你可以怎么用：动手前产出结构化 BRD 和设计风格稿；锁定后再搭数据表，最后接功能。\n- 不要误读成：先把功能跑起来再慢慢调外观——外观一动链路全乱，这正是她赔进去两周的坑。\n\n<strong>方法 2：权限\"只留一套、删掉其余\"</strong>\n- 核心意思：多套权限机制并存会互相覆盖；选自然语言前台配，删掉后端硬编码角色。\n- 你可以怎么用：清空工具自带角色权限，统一用对话描述\"谁能看哪些页面/模块\"，几轮对话搞定。\n- 不要误读成：后端自带的权限角色更\"正规\"所以要保留——保留它会和前台对话打架，反而更乱。\n\n<strong>方法 3：动态数据走 API、只取最小必要字段</strong>\n- 核心意思：需要持续保鲜的数据用 API 自动同步，前期投入换长期零运营。\n- 你可以怎么用：对接人事系统 API、设定定时同步（如每天 9 点），只拉功能必需字段。\n- 不要误读成：多维表格\"同步简单\"就选它——简单是搭建期的简单，维护成本会按天累加。\n\n<strong>方法 4：拿工具的边界设计运营节奏（分批触达）</strong>\n- 核心意思：妙搭怕高并发不怕大数据量，所以按业务事件小步触达、避免全员同时涌入。\n- 你可以怎么用：上线不做一次性大推广，按\"商保到期/EAP 排期\"等事件分批发飞书通知。\n- 不要误读成：触达越多越好——发太多大群消息会被屏蔽，反而让福利触达失败（她原话）。\n\n## 📅 7 天作业\n\n- <strong>Day 1</strong>：盘点你部门一摊\"高频被重复问 + 入口散乱\"的事务，画出当前入口分布图，每个入口标注它带来的咨询/答疑成本。\n- <strong>Day 2</strong>：选其中一摊，和 AI（当数字员工）对齐出一份结构化 BRD——写清功能、模块、每个页面分别是什么，别用大段模糊文字。\n- <strong>Day 3</strong>：去飞行社/妙搭模板库搜\"创建同款\"（福利广场、培训、行政等都有脱敏模板），复制一个最接近的，跑一遍它的链路。\n- <strong>Day 4</strong>：在复制的同款里先把设计风格定稿；如果对不齐设计语言，用别的 AI 出一张设计图、截图喂给它仿。\n- <strong>Day 5</strong>：设计后台数据表结构（想清哪些字段、几张表），并明确动态数据走 API 还是写死/导入。\n- <strong>Day 6</strong>：把权限机制理清——删掉后端硬编码角色，纯用自然语言在前台按\"页面/部门/角色\"配权限，跑通多管理员场景。\n- <strong>Day 7</strong>：设计一条\"按业务事件触达\"的运营节奏（哪个事件发什么飞书通知给谁），并对任一敏感数据做一个隐私处理（能不存就不存）。\n\n## 🤔 回到自己业务的追问\n\n- 我手上有没有一摊\"入口散乱、天天被重复问\"的事务，正在悄悄吃掉我和同事的时间？\n- 如果我自己用低代码搭，是不是比走采购/定制更快更省？我之前是不是没把\"自建\"当成真选项？\n- 我做项目时，是不是也总被\"前台一下就出来了\"的成就感骗着先做花架子、后期返工？\n- 我的系统里需要持续保鲜的数据，是手动维护还是 API 自动同步？维护成本按天累加了吗？\n- 我用的低代码工具并发上限是多少？会不会一推广就撞墙？我有没有为它设计绕开的运营节奏？\n- 涉及敏感信息时，我是把\"用户敢不敢用\"当成产品目标，还是只当成事后补的合规项？\n- 我开搭前，有没有先和 AI 对齐出一份足够清晰的 BRD？还是拿一段模糊需求就开工？\n\n## 👥 关键人物与资源（这场分享能给你什么）\n\n| 人 / 资源 | 是谁 / 是什么 | 对你的价值 |\n|---|---|---|\n| <strong>张玲（Linda）</strong> | Keep 人力资源总监，飞书深度用户（妙搭/多维表格/aily/小龙虾/智能伙伴），非技术背景独自搭出福利广场 | 非技术人自建生产级系统的真实样板 + 踩坑清单 |\n| <strong>张佳宁</strong> | 飞行社「AI 开放麦」主持人，第三期 | 想上麦分享 AI 落地经验的投稿/对接入口 |\n| <strong>飞行社 AI 开放麦</strong> | 飞行社办的 AI 飞行家活动，邀请玩家分享最落地的 AI 经验/Skills | 持续的 AI 实战案例来源，每周有课、可预约 |\n| <strong>脱敏同款 Demo</strong> | Linda 在飞行社放的可\"创建同款\"福利广场（仅用户端脱敏，功能代码都在） | 直接复制改配置，不用从 0 到 1 |\n| <strong>飞行社模板库</strong> | 超级个体空间站、AI 社区、AI 游乐场，含大量应用模板 + aily Skills | 行政/培训等场景的现成模板，可直接学/仿/用 |\n| <strong>妙搭 / aily</strong> | 妙搭=前台页面+数据表；aily=知识库+工作流+agent | 妙搭搭页面和流程，aily 搭智能对话（小客服/EAP/全科医生） |\n| <strong>北森</strong> | 公司 HR 系统，通过 API 对接做人员数据源 | 动态人事数据自动同步的对接对象（按你司实际 HR 系统替换） |\n\n## 💬 金句\n\n- \"它不是一个福利的介绍页，它是把我们所有的福利项目都加载在这样一个平台中的一个完整的系统链路。\"——给\"福利广场\"定了性：是系统不是页面。\n- \"我想变一个设计风格，发现非常难……设计风格一变之后，我的所有功能链路就全都乱掉了，有些链路甚至就跑不通了。\"——搭建顺序错位的代价，最值钱的一句教训。\n- \"前台应用搭建就用了三天时间，后台的数据库搭建、权限的搭建大概用了两三周的时间。\"——成本结构的真相：后台才是大头。\n- \"我把这个权限部分删掉，然后直接在前台进行权限的设计……跟他大概做了 5 轮左右的对话，就把权限调整好了。\"——非技术人用自然语言配权限的可行性证明。\n- \"这一步我们是做了报告只上传、不进行存储的设计，后台其实查不到哪个员工上传了报告。\"——用架构消灭隐私风险，让员工敢用。\n- \"妙搭不太适用于高并发场景……所以我就没有把推广和运营做得很重。\"——把工具边界翻译成运营策略。\n- \"今年使用这个福利的人员是去年差不多两倍。\"——系统收口 + 自动触达带来的真实业务结果（销售/自述口径，见下）。\n\n## ⚠️ 来源边界\n\n本篇基于飞书妙记逐字稿整理。逐字稿为 ASR，人名/产品名以识别为准（如\"keep caring\"\"Feishuaily/aily\"\"北森\"\"小龙虾\"等可能有偏差；主持人后段把\"Linda\"念成\"丽娜/丽娜老师\"，应为同一人）。\"今年福利使用人数约为去年两倍\"\"近 400 用户\"\"一个月搭完\"\"设计/权限各踩坑约两周\"等均为分享者<strong>自述口径</strong>，未独立核实，作判断时请存疑。妙搭并发上限、数据上限（2 万条以上无碍）等为分享者经验值，正式上量前建议咨询妙搭官方。本篇不含原始逐字稿正文。";
