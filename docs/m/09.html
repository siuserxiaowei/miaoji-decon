var SRC = "> 场景：广交会期间，广州某酒店房间里两个朋友——小伟（阿伟，做 AI 硬件方案 + AI 账号代充的创业者）和涛哥（毛哥，做 AI 卖课 + 卖 API 的自媒体）——一边办入住、一边等人吃饭、一边各自处理手机/电脑上的活，从早聊到下午近 4 小时。中间穿插前台、酒店服务员、一个做灯光音响展会的\"说话人5（王总）\"的电话。\n>\n>\n> ⚠️ 飞书原标题\"业务合作与市场情况讨论\"是个客气的美化。\n>\n> 这其实是一场<strong>高密度的圈内 carryover 闲聊</strong>：表面碎、实际上把\"AI 账号代充这门灰产怎么赚钱、怎么被风控、质保纠纷怎么处理\"\"硬件 vs 自媒体哪条路活得好\"\"KOL/IP 圈的生态位和人情世故\"全抖了出来。原摘要完全没接住这层。\n>\n>\n> ⚠️ 本场属于<strong>强 ASR 噪声 + 高私密性</strong>录音：人名（涛哥/毛哥、胡小胡/胡昊、归藏/龟藏/归桑、黄小木、橘子、杨一、新哲/新折）大量识别不稳，且涉及代充、洗号、虚拟卡等灰色业务，下文凡判断处均按上下文还原并标注存疑。\n\n## ⏱ 如果只读 10 分钟（7 条带走判断）\n\n1. <strong>\"AI 账号代充\"是这桌当下最现实的现金牛，但本质是灰产、风控随时清零。</strong> 小伟做了个站、接了一堆上游（Claude Code/Codex/GPT Pro/CloudMesh），一周流水 14000、净赚六七千；曾经一个月充值六七十万。但代价是\"风险太大、只能低调赚\"，Telegram 群一直进人反而招封号——市场一拥而上，整条渠道被端。<strong>别把灰产的高毛利当成可持续生意。</strong>\n2. <strong>代充的核心竞争力不是价格，是\"兜底/质保\"。</strong> 涛哥从所罗门买账号被封，所罗门要\"先去申请退款再考虑\"——涛哥原话：\"我跟你做生意，我信任你按天质保，你就直接给我质保就完事了，我不需要关心你背后退不退得到钱。\"做这门生意的护城河 = 敢垫钱、敢即时兜底，把风险扛在自己这而不是甩给用户。\n3. <strong>硬件天花板最高，但现金流最折磨；自媒体/软件赚得轻松。</strong> 这是全场反复出现的主轴。小伟做硬件方案：一个车载品已投 16 万还没出，结构工程师跑路、重做又是三四万，回款慢（去年 7 月的 8 万至今没回）。涛哥的判断：\"你做自媒体一年做个一两百万很容易、还舒服；硬件天花板高但是真的难。\"\n4. <strong>方案商的结构性命门是\"回款 + 人走项目断\"。</strong> 尾款被吃回扣、对接人离职就联系不上、甲方先开发票还是先打钱永远在扯皮。小伟已经\"不发工资、全项目制\"还顶不住。做乙方/方案商，先把回款节奏和验收/付款条款锁死。\n5. <strong>涛哥给小伟的核心战略建议：少跑水局，深链接几个人，把一件事做透。</strong> \"你现在做的就挺好，AI 信息源好、产品有品味；但你大问题是全扑硬件去了。多数社群信息量还不如你，只盯几个高端社群 + 找几个深度朋友 + 把公众号阅读做到三五千，收益高很多。现在跟 AI 聊的价值是最大的。\"\n6. <strong>录音/手机在高端局是硬礼仪红线。</strong> 涛哥反复提醒：在大 V、网红的小局里，手机要收进包里，\"别人觉得你在录音就不愿跟你讲真东西\"；普通线下聚会无所谓。这是\"上桌资格\"的隐形门槛。\n7. <strong>微信外挂/洗号这条路当下正在被微信集中清算。</strong> 涛哥：\"最近微信直接把所有外挂都干了，即使只是读它的数据都有风险。\"小伟当场决定本地解码、断网处理，不再联网操作微信。<strong>风控周期来了就别硬刚。</strong>\n\n## 🎯 这篇真正能学什么\n\n这不是一场\"谈成了什么合作\"的会，而是一张<strong>中国 AI 灰产/自媒体/硬件创业者的真实生存切片</strong>。值得学的是四件事：①一门\"高毛利但脆弱\"的生意（AI 账号代充）到底靠什么赚钱、又怎么死；②做乙方/方案商/代充，\"兜底与质保\"为什么比价格更值钱；③硬件 vs 自媒体的现金流-天花板权衡，一个过来人怎么劝；④圈内的人情世故——录音礼仪、蹭流量的代价、\"卖课的把所有人都变成客户\"的商业模式设计。读完别记八卦，记这四张图。\n\n## 🧭 道法术器势（→ 你可以怎么用）\n\n| 层 | 本场对应（榨干版） | 你可以怎么用 |\n|---|---|---|\n| <strong>道</strong> 明向 | 高毛利灰产=借来的时间，风控一来归零；硬件天花板高但现金流折磨，自媒体/软件轻但天花板有限；\"现在跟 AI 聊的价值最大\"——信息源质量>社交量 | 先问：我这门生意的钱是\"结构性能持续\"的，还是\"窗口期借来的\"？我的时间该押天花板，还是押现金流？ |\n| <strong>法</strong> 立本 | 代充护城河=敢垫钱兜底/质保，不是低价；卖课的把\"客户/上游/学员\"统一进自己漏斗（\"你要么买我课、要么买我 API、要么成为我上游\"）；少跑水局、深链接几人把一件事做透 | 把\"兜底/质保\"做成你的卖点；设计一个\"所有相关方都被卷进你漏斗\"的模式；砍掉低质社群，定向深聊 3-5 个人 |\n| <strong>术</strong> 立策 | 接一堆上游做代充站、按天质保、拉群对接；公众号接商单（千问/街月找上门，靠社区身份不靠纯阅读量）；开拍/剪映这类工具一天产几十条视频；上门拜访选早上+办公室别选晚上娱乐场 | 选一个最小动作：把你的渠道做成\"一站式 + 兜底\"；或用模板化工具把内容产能拉满；重要拜访约白天办公室 |\n| <strong>器</strong> 成事 | Sider AI（几十块/月，逆向成本地 API、210 元号称无限调多模型）；开拍/剪映（模板化口播视频）；飞书文档/多维表格（记每一笔对公收入）；Bitget 虚拟卡充 Codex（1000 元≈200 刀，菲律宾区） | 评估 Sider 这类\"一个号逆向出多模型 API\"是否够用；用飞书多维表格把对公流水逐笔记清楚 |\n| <strong>势</strong> 察时 | 微信正集中清算外挂/洗号；代充渠道一拥而上被批量封；广交会把酒店价格直接翻倍（200→500）；AI 硬件赛道仍被看好但极难 | 风控周期来了就降调、转本地化；蹭短期红利前先想清退出；旺季资源（酒店/渠道）要提前锁 |\n\n## 📚 深挖：8 个值得单独学的知识点\n\n### 1. AI 账号代充：高毛利的真相与脆弱\n小伟做了个网站，把一堆上游渠道（涛哥的也接了）全聚合进去，做\"给别人代充\"。一周流水 14000、净赚六七千；巅峰期一个月充值六七十万。但反复强调\"风险太大、只能低调赚点\"，Telegram 群一直进人、整个市场都在做，结果\"整条渠道给封了\"。<strong>为什么重要</strong>：这是典型的\"窗口期套利\"——毛利高是因为信息差和合规风险溢价，不是因为壁垒。一旦人人都做、声量一大，平台风控就会把它端掉。<strong>你能用</strong>：碰到\"毛利高得不真实\"的生意，先算它的\"被封/被清\"概率和你的退出方式，别把它当主业重仓。（存疑：金额为当事人口径，未核实。）\n\n### 2. 兜底/质保 = 代充与中转生意的真正护城河\n涛哥从所罗门买账号、被封，所罗门让他\"先去申请退款再考虑\"，拖了两三天。涛哥反复说：我信任你\"按天质保\"，那你就该直接给我质保，\"我不需要关心你背后退不退得到账号的钱\"。小伟也认同：\"他做这种就是要垫钱的，哪有风险全在用户那的。\"<strong>为什么重要</strong>：在一个标的同质化（都是同样的账号/算力）、价格透明的市场里，唯一能溢价的是\"确定性\"——即时兜底、不让客户承担后端风险。涛哥明知低价渠道存在仍愿付几千找小伟，买的就是\"出一次局的关系 + 质保确定性\"。<strong>你能用</strong>：任何代理/中转/分销生意，把\"我替你扛后端风险\"做成卖点，比拼低价活得久。\n\n### 3. 硬件 vs 自媒体/软件：天花板与现金流的取舍\n全场最重的主轴。硬件这边：一个车载品已投 16 万还没出货、结构工程师跑路重做三四万、去年 7 月的 8 万尾款至今没回、已改成纯项目制不发工资还顶不住。自媒体这边：涛哥判断\"做自媒体一年做个一两百万很容易、还舒服，前两三个月不稳是正常\"。但涛哥也承认硬件\"天花板是真的高，我还是挺看好这个赛道\"。<strong>为什么重要</strong>：这是创业者最现实的二选一——硬件是\"高天花板 + 重资产 + 慢回款 + 团队风险\"，自媒体是\"低门槛 + 快现金 + 但天花板有限\"。没有标准答案，关键是认清自己扛不扛得住硬件的现金流折磨。<strong>你能用</strong>：押重资产赛道前，先把\"最坏情况下要垫多少钱、垫多久\"算清楚，别只看天花板。\n\n### 4. 方案商/乙方的回款地狱\n散落在多处的血泪细节：尾款三四万没结、对接人吃回扣差不多 2 万、跟我对接的人离职了就联系不上、甲方\"先开发票还是先打钱\"反复扯、\"项目制还顶不住\"。<strong>为什么重要</strong>：方案商最大的隐形成本不是研发，是<strong>应收账款和人员变动带来的项目中断</strong>。一个对接人离职，整个单子可能就悬了。<strong>你能用</strong>：做乙方先做三件事——付款节点写进合同并卡验收、对接人之外留第二联系人、回款超期就立刻启动催收（涛哥还在群里问\"有没有靠谱催债的，起诉了的就不能催了\"，说明拖到起诉就更被动）。\n\n### 5. 涛哥的战略劝诫：信息源质量 > 社交数量\n涛哥对小伟最实的一段建议：①你现在做的挺好，AI 信息源好、产品有品味；②你最大问题是全扑硬件去了，如果分点精力做软件/自媒体，一年一两百万很容易；③别花太多时间跟那些社群打交道，\"他们的信息量没你大\"，只盯几个高端社群 + 几个深度朋友，把一件事做透；④\"现在跟 AI 聊的价值是最大的\"；⑤把公众号阅读做到三五千，收益高很多。<strong>为什么重要</strong>：这是一个比小伟早出来五六年的人，对\"创业者注意力该放哪\"的判断——<strong>反对无效社交，主张深度链接 + 信息源 + 把单点做透</strong>。<strong>你能用</strong>：盘点你正在跑的局/群，砍掉信息量不如你的，把省下的时间投到 3-5 个真能给你信息增量的人和工具上。\n\n### 6. \"卖课的把所有人都变成客户\"——一种漏斗式商业模式\n涛哥点破自己和小伟的差别：\"我跟你不一样，我能卖课、又能卖 API，所有人都算我的客户——你要么买我课、要么买我 API、要么成为我的上游。\"<strong>为什么重要</strong>：这是一个把\"流量、教育、供应链\"打通的设计——同一批进来的人，按角色被分流进不同变现口（学员/API 客户/上游供货），没有一个流量是浪费的。对比小伟纯靠硬件项目单点变现，结构上更抗风险。<strong>你能用</strong>：画一遍你的人群——能不能让同一个人在不同阶段为你贡献不同收入（买产品→买服务→成为你的渠道/上游）？<strong>不要误读成</strong>到处卖课割韭菜——重点是漏斗结构的多变现口，不是收割。\n\n### 7. 录音与手机：高端局的隐形礼仪门槛\n涛哥两次提醒小伟：在大 V/网红的小局里，手机/录音设备要收进包里，\"别人会觉得你在录音、就不愿意跟你讲真东西\"；他自己去深圳那些局都是把手机放包里，\"还是很讲究的，别人很介意\"；普通线下聚会则无所谓。<strong>为什么重要</strong>：圈子里很多\"得罪人无数\"的人，恰恰是踩了这种\"小的边界\"。能不能上更高端的桌，往往不取决于能力，而取决于这些不成文的细节。<strong>你能用</strong>：进陌生高端局前，先观察并遵守这桌的隐形规矩（录音、转发截图、署名打码），别用\"我无所谓\"的心态去踩别人的边界。\n\n### 8. 蹭流量的代价：黄小木 vs 归藏事件\n现场八卦的真实教训：有人（黄小木，存疑）去截了别人打码的截图、强行蹭归藏（归桑/龟藏，存疑）的流量、还在推特上对骂，结果\"在 130 多个大 V 的群里直接上了主流大 V 黑名单\"。涛哥的评价：\"本来是件很小的事，但他偏偏去强行蹭……你抱一帮小 V 有什么用？\"<strong>为什么重要</strong>：在以\"声誉\"为货币的圈子里，<strong>短期蹭来的流量 vs 长期被主流拉黑</strong>是一笔极差的交易。把人得罪光，再多即时流量也换不回\"上桌资格\"。<strong>你能用</strong>：评估任何\"蹭热点/碰瓷大号\"的动作前，先算它对你长期声誉账户的扣分，别为一时流量透支信任。\n\n## 🛠 可直接复用的方法（含\"不要误读成\"）\n\n<strong>方法 1：把\"兜底/质保\"做成卖点而不是拼低价</strong>\n- 核心意思：同质化标的（账号/算力/货）市场里，确定性才是溢价点，谁敢即时扛后端风险谁赢。\n- 你可以怎么用：在你的代理/分销/服务里，明确写\"出问题我先赔/先换，退款是我的事\"。\n- 不要误读成：盲目兜底不算账——要先把封号率/坏账率算进定价，兜底是有成本的承诺。\n\n<strong>方法 2：用飞书多维表格逐笔记对公流水</strong>\n- 核心意思：小伟让胡小胡把每一笔对公收入记进飞书多维表格，因为钱打到公账、后续要分账/扣利润，必须可追溯。\n- 你可以怎么用：任何涉及\"代收代付/分账\"的合作，第一天就建一张逐笔台账（金额/对方/质保期/是否开票）。\n- 不要误读成：等月底再补记——分账纠纷往往出在\"当时没记清\"。\n\n<strong>方法 3：重要拜访约白天办公室，别约晚上饭局</strong>\n- 核心意思：小伟的判断——下午/晚上人家去娱乐了、听不进去；早上去办公室\"有 buffer 能好好讲\"。\n- 你可以怎么用：要谈实质合作的拜访，优先约上午、对方办公室。\n- 不要误读成：所有局都白天——纯关系维护的饭局照样有用，这条专指\"要谈成事\"的拜访。\n\n<strong>方法 4：风控周期来了就转本地化、降调</strong>\n- 核心意思：微信集中清算外挂期间，小伟改成\"本地解码聊天记录、断网处理、不再联网操作微信\"。\n- 你可以怎么用：你的业务一旦踩平台风控线，先降调、转能离线/合规的路径，别在风口浪尖硬冲量。\n- 不要误读成：换个马甲继续硬刚——那只是把封号推迟，不是解决。\n\n## 📅 7 天作业\n\n- <strong>Day 1</strong>：给你手上\"毛利高得不真实\"的那门生意，写下它的被封/被清概率 + 你的退出方式 + 它占你收入的比例。超过 30% 就是风险。\n- <strong>Day 2</strong>：把你的代理/分销/服务里的\"质保兜底条款\"写成一句话卖点，并算清它的坏账成本能不能覆盖。\n- <strong>Day 3</strong>：列出你正在跑的所有群/局，标出\"信息量不如我\"的，下周开始砍掉一半。\n- <strong>Day 4</strong>：选 3 个\"信息增量真比你大\"的人，主动约一次深度 1v1（线下或语音），别再发群里水。\n- <strong>Day 5</strong>：如果你做重资产（硬件/项目），算一遍\"最坏情况要垫多少钱、垫多久\"，写进你的现金流表。\n- <strong>Day 6</strong>：画你的人群漏斗——同一个人能不能在不同阶段贡献产品/服务/渠道三种收入？补上缺的那一口。\n- <strong>Day 7</strong>：给一笔涉及代收代付/分账的合作，建一张飞书多维表格逐笔台账，今天就开始记。\n\n## 🤔 回到自己业务的追问\n\n- 我现在的高毛利，是结构性壁垒，还是借来的窗口期红利？风控一来我归零吗？\n- 我和客户拼的是价格，还是\"我替你扛后端风险\"的确定性？\n- 我是不是也\"全扑在一个高天花板但折磨现金流的事\"上，该不该分一点精力做轻的、快的？\n- 我跑的这些局/群，哪些信息量其实不如我自己？为什么还在花时间？\n- 我有没有一个\"把同一批人按角色分流变现\"的漏斗，还是只靠单点变现？\n- 我做乙方/方案商，回款条款、第二对接人、催收触发线都锁死了吗？\n- 进高端局时，我有没有踩别人的隐形边界（录音、截图、蹭流量）而不自知？\n\n## 👥 关键人物与资源（这桌人能给你什么）\n\n>\n>\n> ⚠️ 人名多为 ASR 识别，普遍存疑，真实身份待核。\n\n| 人 | 是谁（按上下文推断） | 对你的价值 |\n|---|---|---|\n| <strong>涛哥 / 毛哥</strong> | 出来创业第六年，做 AI 卖课 + 卖 API，挖了竞品流量团队的人，正大重构 API 产品；有\"千里会\"社群 | 创业过来人，硬件 vs 自媒体的取舍、漏斗式变现、圈内人情世故的参谋 |\n| <strong>胡小胡 / 胡昊</strong> | 小伟的代充业务负责人，\"一直猛猛干活、很靠谱\" | 代充/账号供货的对接执行人 |\n| <strong>所罗门</strong> | 卖 AI 账号的上游，号称按天质保但实际兜底差、爱画\"几百万生意\"的饼 | 反面案例：质保不兑现的上游长什么样 |\n| <strong>小陆 / 陆哥</strong> | 被裁的嵌入式/公司业务工程师，有北京户口，输出很多、会比较焦虑 | 潜在量产/项目工程师，也是\"裁员后该不该先做自媒体卖课\"的讨论对象 |\n| <strong>黄小木 / 归藏（归桑）</strong> | 推特圈，蹭流量对骂事件主角，黄小木被 130+ 大 V 群拉黑 | 反面案例：蹭流量得罪主流的代价 |\n| <strong>橘子 / 杨一 / LisaHub / 考拉OS / 牛马AI</strong> | 涛哥点名\"有点水平\"的产品+流量型 KOL（橘子疑为 Minimax 产品经理） | 值得关注的少数高质量 AI 信息源 |\n| <strong>黄巧玲 / Ben（九度论道）/ 本杰明</strong> | 将分享 OpenRouter 全案市场经验的局的组织者/嘉宾 | OpenRouter 出海/商业化的经验源（涛哥说 Ben 与本杰明是好友） |\n| <strong>王总（说话人5）</strong> | 做灯光音响展会施工（广交会现场，给交通大学宋树新干活），无人机/音响/灯光资源 | 线下展会/活动的执行与媒介资源 |\n| <strong>康总 / 阿康</strong> | 做小程序，\"很厉害\"，有人撮合小伟产品与他合作\"可以卖爆\" | 小程序/产品合作的潜在对象 |\n\n## 💬 金句\n\n- \"我跟你做生意，我信任你按天质保，你就直接给我质保就完事了，我不需要关心你背后退不退得到账号的钱。\"——代充/中转生意里\"兜底\"才是真护城河。\n- \"你大问题是主要专注做硬件去了……你只需要关注几个稍微高端一点的社群，其他基本不用理会。\"——少跑水局、深链接、把一件事做透。\n- \"现在跟 AI 聊，本质上跟 AI 聊的价值是最大的。\"——信息源质量 > 社交数量。\n- \"你要么买我的课，要么卖我的 API，要么成为我的上游。\"——卖课人把所有人卷进漏斗的模式自白。\n- \"别人会觉得你在录音，其实不愿意跟你讲东西……尤其是在大 V 大网红的局上。\"——上高端桌的隐形礼仪门槛。\n- \"我强个屁。\"——一年多了现金流还不稳的真实创业焦虑底色。\n\n## ⚠️ 来源边界\n\n本篇基于飞书妙记逐字稿整理；这是一场近 4 小时、强私密性的朋友闲聊，信息点散落在大量生活流水（办入住、点咖啡、催货、订机票）之间，已尽量榨干其中有商业价值的部分。人名几乎全部以 ASR 识别为准且普遍存疑（涛哥/毛哥、胡小胡/胡昊、归藏/归桑/龟藏、黄小木、橘子、新哲/新折、所罗门等真实身份均待核）；所有金额（一周 14000、月充六七十万、投 16 万、质保 1000 多/200 刀等）为当事人现场口径，未独立核实；本场涉及 AI 账号代充、微信外挂洗号、虚拟卡跨区充值等灰色/高风险业务，文中仅做事实复盘与风险提示，不构成任何操作建议；不含原始逐字稿正文。";
