var SRC = "> 场景：小伟、胡昊（胡工/胡博）、小曹同学（曹大）、王工、肖如旸（如旸）几位同龄技术伙伴的线上语音会。前半小时是两件真业务——「龙虾盒子」交付给联通测试 + 「token 中转站/出海」是否要自建；后半段（约 30 分钟起）转成纯闲聊：换工作落差、做产品 vs 做自媒体、谈对象、麻将。\n>\n>\n> ⚠️ 诚实说明：<strong>本场信息密度中等偏低</strong>。真正能榨出认知的是前 25 分钟两个业务决策；后半段是同学间的近况吐槽和情绪交流，知识点很稀。下面只把真实有料的点挖透，不为凑章节注水。\n>\n>\n> ⚠️ 飞书原摘要给的关键词（龙虾、中转站、负载均衡、边际成本、自媒体……）是对的，但它没接住这场会真正的两个<strong>决策</strong>：龙虾盒子要不要现在就做后台管理；token 中转站要不要自建。这才是会的骨架。\n\n## ⏱ 如果只读 10 分钟（6 条带走判断）\n\n1. <strong>龙虾盒子是「卖头肯赚钱」+ 持续收费，不是一锤子买卖</strong>。下周先拿 2 台给联通测试，测通了采购一批。小伟反复强调：后面靠<strong>卖 token + 维护费 + 持续合作</strong>赚钱，硬件本身只是入口。\n2. <strong>「先别想那么多，先看客户要不要」是这场会最实的纪律</strong>。王工和胡昊多次把跑偏的功能讨论拉回来：后台管理、OTA、设备绑定这些先别做，<strong>先确认下周联通到底要哪几个功能，再做哪几个</strong>。MVP 思维。\n3. <strong>中转站要不要自建，核心不是技术难度，是上游渠道稳不稳</strong>。曹大的判断：开源中转站（new api 这类）一整套都现成，「80% 国内卖 token 的中转站都用这一家」；真正的麻烦在上游渠道会不会崩、价格怎么设。\n4. <strong>单渠道 = 没有负载均衡 = 单点故障</strong>。曹大反复劝：别只接威扬哥一家，接多家（联通 + 威扬哥），只要兼容 OpenAI 格式就能一个口出去；一家停电/号用光，能切另一家。\n5. <strong>国内 / 国外 token 要两套机子</strong>。卖国外得用国外的机器（如东京 GCP），还要验证不开梯子能不能访问；国内用国内的。变现/部署按国别分。\n6. <strong>这群人的共识焦虑：自媒体上不了桌，得做产品</strong>。小伟引大佬的话——自媒体只能「锦上添花、不能逆天改命」；产品翻身机会大，但<strong>试错成本低了、流量却很贵</strong>，现在拼的是流量和运营。\n\n## 🎯 这篇真正能学什么\n\n这不是一场讲干货的分享会，而是一群一线小团队在<strong>真刀真枪地拍两个业务决策</strong>。值得学的是三件事：①一个 AI 硬件（龙虾盒子）从「能跑」到「能交付/能运营」之间，到底缺哪些工程件（后台管理、OTA、设备绑定、远程配网），以及哪些该先砍；②一个 token 中转/转售生意的真实结构（开源中转站 + 上游多渠道 + 客服 + 运维）；③同龄人里「进稳定大厂 vs 自己做产品」的真实落差与心态。读完别记谁说了啥，记这两张「业务怎么落地」的工程清单。\n\n## 🧭 道法术器势（→ 你可以怎么用）\n\n| 层 | 本场对应（榨干版） | 你可以怎么用 |\n|---|---|---|\n| <strong>道</strong> 明向 | 硬件不靠硬件赚钱，靠 token + 维护费 + 持续合作（小伟原话「不是只做一次性的生意」）；做产品才能翻身，自媒体只锦上添花 | 设计产品先问：我赚的是一次性差价，还是能持续收费的入口？流量贵的当下，先想清楚后端怎么持续收钱 |\n| <strong>法</strong> 立本 | MVP 纪律：先确认客户要什么再做；多渠道负载均衡对冲单点风险；国内外两套部署；自建中转站 vs 纯做销售分钱两条路 | 把「先看客户要不要」当成铁律，砍掉一切客户没确认的功能；任何依赖单一上游的生意都要问「他崩了我有备用吗」 |\n| <strong>术</strong> 立策 | 远程帮客户配网（少量可以、几百台就废）；录配置视频/写文档替代人工配置；设备配网走「热点→局域网 IP→Web server 填模型 key + 飞书机器人信息」 | 交付前先把「客户自助配置」的视频/文档做出来，别把自己锁死在一台台远程配置上 |\n| <strong>器</strong> 成事 | 龙虾盒子（硬件）+ OpenClaw / 爱马仕（装在系统里）+ 飞书机器人（控制入口）；new api 开源中转站；东京 GCP（卖国外 token）；威扬哥/联通/中软等上游渠道 | 想做 token 转售先去看开源中转站项目（如 new api），别从零造；做硬件 Agent 盒子可参考「飞书机器人当遥控器」这条交互 |\n| <strong>势</strong> 察时 | AI 硬件盒子 + Agent 落地正在被真实采购（联通要测要采）；卖前端工程师在被裁（编程猫天天裁人、不招纯前端要全栈）；金融等稳定行业 AI 用得极保守（断网、不敢开梯子） | 趁联通这类 B 端愿意测的窗口把样机交出去；如果你还是纯前端，认真补全栈 / AI |\n\n## 📚 深挖：6 个值得单独学的知识点\n\n### 1. AI Agent 硬件盒子从「能跑」到「能交付」缺的那一层工程件\n胡昊把「卖出去」要补的东西列得很清楚：<strong>后台管理</strong>（知道谁绑定了你的平台、给设备授权）、<strong>OTA</strong>（远程升级）、<strong>远程运维</strong>（盒子出问题能远程进去修）。他直说「这个我一个人搞不完」，开源方案找了一堆但「都不完整，没有一个满足全部需求」。\n<strong>为什么重要</strong>：很多人以为硬件 demo 能演示就接近交付了，其实「能演示」和「能规模化交付/运维几百台」之间隔着一整套后台系统——这是 To B 硬件真正的工作量所在，也是这场会反复出现的现实约束。\n<strong>你能用</strong>：做任何要批量交付的硬件/设备，提前列出「设备管理 + 授权 + OTA + 远程运维」四件套，并判断哪些能用开源拼、哪些必须自研。\n\n### 2. 「先看客户要不要」——把 MVP 纪律喊出来的人最值钱\n这场会里王工和胡昊各喊了三四次同样的话：「前期不用管这么多」「先看他们要不要吧，这个才是最重要的」「先把下个星期他最重要的要什么功能聊清楚，我们就做哪些」。小伟一度被「设备绑定、后台管理、量大了怎么配」带跑，都被拉回来。\n<strong>为什么重要</strong>：技术团队的天然倾向是把架构想完整，但在需求未验证前，完整架构就是浪费。把「客户下周到底要哪 3 个功能」当成唯一排序依据，是省命的纪律。\n<strong>你能用</strong>：下次讨论功能跑偏时，问一句「客户这周确认要这个了吗？没确认就先不做」。\n\n### 3. 龙虾盒子的「最基础版」到底是什么\n小伟把 MVP 定义得很具体：<strong>客户用飞书机器人去控制龙虾 + 爱马仕，替代一些重复的活</strong>（比如做个 PPT），配上模型，就这。他说「其实我们现在已经做完了」。剩下的设备绑定、后台管理都算增项。\n<strong>为什么重要</strong>：一句话能把 MVP 说清——「通过飞书操控 X 去做替代重复劳动的活」——说明产品定位是清醒的：盒子是个<strong>能被飞书遥控的 AI 干活终端</strong>。\n<strong>你能用</strong>：给你的产品也写一句「用户用【入口】控制【执行体】去做【某类活】」的最小价值句，写不出来说明定位还糊。\n\n### 4. token 中转站的真实结构：开源 + 多渠道 + 价格设置 + 客服\n曹大把这门生意拆得很白：①中转站本身是<strong>开源的、一整套现成</strong>（new api 之类，「80% 国内卖 token 的都用这一家」）；②难点是<strong>价格设置</strong>（「上一家公司弄价格设置闹了好多笑话」）；③接<strong>多渠道</strong>对冲风险还能「把价格平衡下来」；④无论自不自建，<strong>都得有客服</strong>——「客服去问上游，你问我我问别人，都是这样」；⑤再加一个<strong>懂技术的小运维</strong>就能跑。\n<strong>为什么重要</strong>：这把「卖 token」从神秘生意还原成了一个可拆的运营盘子：技术门槛低、护城河在上游稳定性和价格运营，人力上是「运维 + 客服」两个角色。\n<strong>你能用</strong>：评估任何「转售型」生意时，照这个清单问：现成工具有没有？价格怎么设？上游几家？谁做客服？谁做运维？\n\n### 5. 设备自助配网的标准流程（也是为什么不能全靠远程配）\n胡昊完整描述了配网流程：盒子开一个<strong>热点</strong>→手机连上配 WiFi 名和密码→拿到一个<strong>局域网 IP</strong>→盒子上跑了个 <strong>Web server</strong>→浏览器打开这个 IP，填模型选择、API key、飞书机器人的 ID/密钥。他点出关键约束：<strong>机器人是客户自己的，key 要客户自己申请，你进不了他的东西</strong>；「一两台可以远程帮配，几百台天天远程配你就别干别的活了」。王工补充：主流 cloud 类产品「全都是这样，都得自己配」。\n<strong>为什么重要</strong>：这是「人工配置不可规模化」的具体证据。解决方案不是更努力地远程，而是<strong>录视频/写文档让客户自助</strong>——会上当场决定「录两个视频」「写文档，再开个公众号专门做这块」。\n<strong>你能用</strong>：凡是交付环节有「每个客户都要手动配一遍」的动作，立刻把它产品化成自助文档/视频，否则交付量就是你的天花板。\n\n### 6. 自媒体 vs 产品，和「试错成本低、流量贵」的当下判断\n小伟刚跟一桌大佬吃完饭，受刺激很深：<strong>自媒体「上不了桌」，只能锦上添花、不能逆天改命，还是得做产品</strong>。他举了几个对标：做「养个石头」DIY 的人干两年、几十万用户、一年 500 万稳；巧玲姐的「万能小组件」常年 App Store 榜首、靠它再做一系列 App 矩阵；飘哥靠擦边/NSFW 产品做到分类前 20、团队搬去美国。共同点：都很年轻（91/93/94 年），做产品几年就翻身。但小伟也清醒：「现在试错成本很低，但流量很贵」，玩法大的直接买量投放测需求，飘哥们「一天投几十万刀」；小白则只能各个群发、小红书发、推特发慢慢起量。\n<strong>为什么重要</strong>：这是这群人的集体世界观——产品是翻身路径，但胜负手已经从「能不能做出来」转移到「能不能搞到便宜流量 + 运营」。\n<strong>你能用</strong>：如果你也在自媒体和产品之间犹豫，记住这桌的判断：自媒体当放大器、产品当本体；做产品前先想清楚冷启流量从哪来，因为这才是真正贵的部分。\n<strong>⚠️ 口径提醒</strong>：「养个石头一年 500 万」「飘哥一天几十万刀」「巧玲核心团队搬美国/香港永居」等都是<strong>饭桌转述的销售口径</strong>，小伟自己也说「这你问我哪里知道」，请存疑，别当事实引用。\n\n## 🛠 可直接复用的方法（含\"不要误读成\"）\n\n<strong>方法 1：需求未验证前，砍掉一切完整架构</strong>\n- 核心意思：先确认客户下周要哪几个功能，只做那几个；后台、OTA、设备绑定全往后放。\n- 你可以怎么用：每次功能会先排「客户已确认 / 未确认」，未确认的不进本期。\n- 不要误读成：永远不做后台/OTA——量一上来这些是必须的，只是<strong>不在 MVP 阶段做</strong>。\n\n<strong>方法 2：依赖单一上游的生意，必须配负载均衡/备用渠道</strong>\n- 核心意思：接多家上游（联通 + 威扬哥 + 中软…），兼容 OpenAI 格式就能一个口出去，一家崩了切另一家，还能拉平价格。\n- 你可以怎么用：盘一遍你最关键的供应商，凡是「只有一家」的地方都列一个备用方案。\n- 不要误读成：一上来就接五六家——可以先一家跑通，但<strong>架构上要预留切换能力</strong>（如让联通随时能换 base url）。\n\n<strong>方法 3：把「每个客户都要手配一遍」的动作产品化</strong>\n- 核心意思：少量客户可以远程帮配，规模化必须靠自助视频/文档，因为 key 和机器人是客户自己的、你进不去。\n- 你可以怎么用：交付前先录 2 个配置视频 + 写一份文档（甚至开个公众号专放这类教程）。\n- 不要误读成：自助文档=甩锅给客户——是把你从重复劳动里解放出来，前期照样可以远程兜底。\n\n## 📅 7 天作业\n\n- <strong>Day 1</strong>：写一句话定义你产品的 MVP——「用户用【入口】控制【执行体】做【某类活】」，写不出来就说明定位没收敛。\n- <strong>Day 2</strong>：列出你产品「客户已确认要」和「你自己想加」的功能两栏，把第二栏全部冻结到下一阶段。\n- <strong>Day 3</strong>：盘点你业务里所有「只依赖一家上游/一个渠道」的单点，给每个写一条备用方案。\n- <strong>Day 4</strong>：把交付环节里「每个客户都要手动做一遍」的动作找出来，录一个配置/使用视频或写一份文档。\n- <strong>Day 5</strong>：如果你在做转售型生意（token/算力/任何中间商），照曹大的清单填：现成工具？价格怎么设？上游几家？谁客服？谁运维？\n- <strong>Day 6</strong>：拆一个你佩服的「做产品翻身」案例（如养个石头/万能小组件），看它的冷启流量到底从哪来——是投放还是群发起量。\n- <strong>Day 7</strong>：诚实回答：我现在的精力是放在「锦上添花的自媒体」还是「能翻身的产品」上？要不要调。\n\n## 🤔 回到自己业务的追问\n\n- 我的硬件/产品赚的是一次性差价，还是 token/维护费这种能持续收的钱？\n- 我团队讨论功能时，有没有人负责把跑偏的人拉回「客户到底要不要」？\n- 我有没有一句话就能说清的 MVP？还是每次都想把架构做完整？\n- 我最关键的上游/渠道是不是单点？它崩了我当天能切换吗？\n- 我的交付里有没有「不可规模化的手动动作」？我把它产品化了吗？\n- 我是不是把太多精力压在自媒体上，却没真正推进产品？\n- 我引用的那些「一年 X 百万、一天投 X 万刀」数字，是事实还是饭桌转述？\n\n## 👥 关键人物与资源（这桌人能给你什么）\n\n| 人 | 是谁 | 对你的价值 |\n|---|---|---|\n| <strong>siuser小伟</strong> | 召集人，跟着涛哥/Ben Ben 老师、巧玲姐混圈子；在推「龙虾盒子 + token 中转/出海」，物色合伙小伙伴 | 龙虾盒子/token 出海这条线的对接人；爱拆解、会把内容分享到群 |\n| <strong>胡昊（胡工/胡博）</strong> | 龙虾盒子主力工程，做过「小智」类设备，懂配网/OTA/后台 | AI 硬件盒子的工程落地与运维，知道交付到底缺什么 |\n| <strong>小曹同学（曹大）</strong> | 现在某金融/京东系公司做 IT（技术客服+数据分析），公司极重保密（断网、不敢开梯子）；之前做过 token 中转站，熟开源方案与价格设置 | token 中转站/多渠道/价格设置的实战经验，AI 工具用得最前沿（Codex） |\n| <strong>王工</strong> | 在凯乐石那边接过百炼 token play/coding play；刚做完「一碰好运」，准备学剪辑做自媒体 | 第三方 token 接入（API key + base url）的实操；MVP 纪律的提醒者 |\n| <strong>肖如旸（如旸）</strong> | 同学，准备硕士毕业 + 北京读博面试（北邮）；女友在上海做机器人 SDK 公司（上海交大教授背景、去年融资） | 学术/机器人创业圈信息；时间这几个月较空 |\n| <strong>威扬哥</strong> | 上游 token 渠道方，号称稳、有国产模型（Kimi，后续要跟 Minimax 官方合作），白号 | 龙虾盒子/中转站的主力上游渠道；也找小伟帮卖 |\n| <strong>巧玲姐 / 飘哥（转述）</strong> | 万能小组件创始人（App Store 榜首，App 矩阵）/ 飘哥做擦边产品分类前 20，团队搬美国 | 产品翻身的对标案例（口径存疑，仅作参考） |\n\n## 💬 金句\n\n- 「不是说只是做一次性的生意，后面会有卖 token 赚钱，还有维护费。」——小伟，把硬件从一锤子买卖拨回持续收费入口。\n- 「先别考虑这么多，先看他们要不要吧，这个才是最重要的。」——王工，全场最实的 MVP 纪律。\n- 「难的应该是你上游的渠道稳不稳定，就看你上游那个渠道稳不稳定。」——胡昊，一句话点破中转站生意的真护城河。\n- 「你一两台可以帮他搞，但你要是几百台天天远程给他搞，你就不用干别的活了。」——胡昊，人工配置不可规模化的硬约束。\n- 「做自媒体真的就只能说锦上添花，你不能逆天改命，还是得做产品，做自媒体上不了桌。」——小伟，这桌人的集体世界观。\n- 「我是 Yes 工程师，他负责跑，我负责说 Yes 就行了。」——胡昊自嘲，也是这场轻松基调的注脚。\n\n## ⚠️ 来源边界\n\n本篇基于飞书妙记逐字稿整理；人名以 ASR 识别为准（如「小曹同学/曹大」「胡昊/胡工/胡博」「肖如旸」「黄润哲/黄润泽」「威扬哥」「巧玲」「飘哥」等可能有偏差，「龙虾盒子」「爱马仕」「OpenClaw」「new api」「pocket cloud」等产品/工具名也以 ASR 为准，真实拼写待核）。所有「用户数/营收/投放金额/身份永居」类数字均为现场饭桌转述的销售口径，未独立核实，使用前请存疑。本场后半段为闲聊，知识点已尽量从前半段业务讨论中榨取，未注水凑数。不含原始逐字稿正文。";
