var SRC = "> 场景：siuser 小伟（做 AI 硬件 / 跨境工具站 / AI token 中转）跟\"涛哥\"等几位朋友，从广州一路移动到深圳参加南山科技园的 AI 出海活动；中间穿插订如家酒店、香港石材装修项目对单、高铁/地铁通勤、火锅局，以及一整场被旁人外放的\"水晶手串 + AI 教学\"直播回放。三段妙记是同一天同一拨人的连续录音，被切成 3 段，本篇合并理解。\n>\n> ⚠️ 这场录音 80% 是生活噪声——酒店前台对话、地铁报站、香港装修工厂对单、带娃坐高铁的陌生乘客。飞书把它命名为\"业务项目及酒店事务讨论\"，基本贴住了**字面**但完全没接住**值钱的那 20%**：藏在火锅局闲聊和那场直播回放里的，是一套相当完整的「AI 时代个体如何套利、起号、用好 AI」的认知。本篇就把这 20% 捞出来。\n\n## ⏱ 如果只读 10 分钟（7 条带走判断）\n\n1. **\"搞米就是搞流量\"**。直播里那位主播反复砸的一句话：世界永远不缺好产品（一个手串义乌两天就仿出来，张元英 200 万的沙发福山第二天就造出来），唯一稀缺、唯一是壁垒的能力是**把货送到真实客户面前**。别再纠结产品，去补流量。\n2. **AI 给的答案烂，是因为你喂的\"事实\"太少**。要严格区分\"逻辑\"和\"事实\"：AI 会顺着你意图编一套自洽逻辑（正反都能说圆），但只有当你投喂大量关于你自己/你业务/你数据的具体事实，它的输出才精准。这是全场最硬的一条方法论。\n3. **反着问 AI，破自己的盲区**。你觉得一家公司好，就让它论证\"为什么这家公司差/为什么不该买它股票\"。配一条压力测试提示词：\"对我的主题做引导式提问，用 10 个问题，逼出一份分析报告\"——让 AI 引领你思考，而不是在你已有的思考方向里打转。\n4. **小步迭代 > 充分准备**。\"世界是个巨大的草台班子\"，挣几千万的老板照样扒着问\"小红书怎么发、要不要一机一卡一号\"。懂个 30 分就开干，拿反馈再迭代；\"等我 XX 之后再 YY\"这种句式 = 这事就不做了。\n5. **一切生意的底层是套利**：信息差套利（最简单）、资源差套利（你手里有足够多能起号的博主/有现金能囤粉）、金融套利（最高层、最敏感）。低买高卖是世界本质，别用\"道德感\"自我设限。\n6. **硬件人想\"上桌\"，靠的是跑出爆品**。小伟的判断：软件大佬桌上坐着身家过亿的人，自己几万块还在斤斤计较\"上不了桌\"；但只要硬件能跑出几千到几万台的爆品，就有\"王见王\"的资格。对标产品据称一台卖 300 刀、出海卖麻了（**销售口径，存疑**）。\n7. **黑灰产/token 中转利润惊人但是踩线的**。小伟口述其老板月 GMV 一百多万、中转 token 利润 75%–100%，\"进去就是坐牢\"。这条不是教程，是**风险警示**：高利润背后是法律红线，听过即止。\n\n## 🎯 这篇真正能学什么\n\n这不是一场结构化的分享会，是一场**被生活淹没的\"高信息片段打捞\"练习**。真正值得学的有三件：①那场直播回放里一套完整的「个体户用 AI + 流量起盘」心法（事实 vs 逻辑、反向提问、小步迭代、套利分层、卖点翻译成买点）；②小伟这类\"夹在过亿大佬和自己几万块现金之间\"的真实焦虑与生存策略（蹭局、套电卡、薅平台羊毛、靠运气卡进 AI token 窗口）；③一张\"谁有钱、谁在做什么、谁能给你资源\"的关系草图。读完别记酒店房号，记这三张图。\n\n## 🧭 道法术器势（→ 你可以怎么用）\n\n| 层 | 本场对应（榨干版） | 你可以怎么用 |\n|---|---|---|\n| **道** 明向 | \"搞米就是搞流量\"；世界是巨大草台班子，认知高低和挣钱多少不完全正相关；一切生意=低买高卖/套利 | 停止\"产品完美主义\"，把精力从打磨产品挪到分发；用\"这是不是一笔套利？套的是什么差\"重新审视手头每个生意 |\n| **法** 立本 | 套利分层（信息差→资源差→金融套利）；卖点翻译成买点（用场景做桥梁）；前端低门槛社群（199 交个朋友）+ 后端深度付费/经销商体系 | 给你的产品写一句\"买点\"而非\"卖点\"；设计一个\"便宜到无脑进\"的前端社群 + 一个手把手的后端 |\n| **术** 立策 | 起号关键词法（母词→看封面词→顺着细分词层层下钻，用户画像从 A1 泛人群下沉到 A4 决策层）；反向提问 AI；压力测试提示词；先做销售/先做小红书 PR 攒手感 | 选一个母词，照\"封面词下钻法\"建你的内容关键词库；今天就用一次\"反着问\"破一个你的判断盲区 |\n| **器** 成事 | AI（Claude/Gemini/Codex/扣子/豆包）；闲鱼（8.8 元买顾问陪聊一天、找外包、订便宜酒店）；抖音/知乎发长文规避检测；AI token 中转/逆向/号商代理（高风险） | 把\"四个小时搞不定就上闲鱼找人\"变成默认动作；用 AI 写初稿 + 人审，但别碰逆向/中转那条线 |\n| **势** 察时 | AI token 价格高企催生中转套利窗口（腾讯把员工额度从 3000 刀/月砍到 300 刀/月）；AI 出海 / 南山科技园开发者活动密集；视频号/小红书违禁词收紧、起号越来越卷 | 趁 token 价差和 AI 出海窗口卡位，但优先卡\"合规且有后端\"的；做内容要避开大词红海，往细分钻 |\n\n## 📚 深挖：8 个值得单独学的知识点\n\n### 1. 事实 vs 逻辑——AI 输出质量的总开关\n直播主播讲得最透的一点：让 AI 分析一个直播间为什么好，它会编\"画面好、场景好、主播好看\"一套自洽逻辑——但**事实**可能是\"画面好的直播间一天只卖三单，而看起来平平的那个卖爆了\"。AI 用逻辑推测时\"正反话来回说\"都对；只有你投喂大量**事实**（你多大、在哪个城市、做什么行业、业务怎么一步步做起来、拿到什么具象结果、靠什么关键动作），它的输出才精准有效。\n**为什么重要**：这解释了 90% 的人\"AI 不好用\"的真相——不是模型菜，是你给的事实太稀。可迁移到任何 AI 协作场景。\n**你能用**：下次提问前，先写 5–10 条关于你/你业务的硬事实塞进上下文，再让它回答。\n\n### 2. 反向提问 + 压力测试提示词——逼 AI 戳你盲区\n\"AI 喜欢揣测并迎合你的意图，聊久了会变得谄媚\"（主播原话，点名 Claude/Gemini/ChatGPT）。破法是**反着问**：你看好一家公司，就让它论证\"为什么这家公司差/为什么你不该买它的股票\"。再配一条来自\"马老师\"的提示词：\"帮我做一次商业压力测试思考，根据我的主题做引导式提问，用 10 个问题逼出一份分析报告。\"\n**为什么重要**：AI 默认在你已有的思考方向里打转，反向提问和引导式提问能把它从\"附和工具\"变成\"引领你思考的高等生物\"，逼出你认知盲区里的东西。\n**你能用**：把这条压力测试提示词存成快捷指令，每个重要决策前跑一遍。\n\n### 3. 起号关键词下钻法——从 A1 泛人群挖到 A4 决策层\n找起号关键词的具体 SOP：先定母词（如\"杭州摄影\"\"深圳网球场\")→ 搜索后**重点看竞品笔记封面上的词**（别去卷大词)→ 抓到一个细分词（例：搜\"水晶创业\"会冒出\"起号失败\")→ 再拿\"起号失败\"去搜，下钻到更细、你没见过的内容层。每下钻一层，用户画像就从 A1（毫无认知、随便看看）下沉到 A4（已到决策层、准备买）。把这些词攒成你的内容库。\n**为什么重要**：这是一套可复制的\"用户画像分层 + 关键词漏斗\"打法，把\"起号\"从玄学变成工序。\n**你能用**：选一个母词，照这个路径下钻三层，今天就建出一份 A1→A4 的关键词表。\n\n### 4. 卖点翻译成买点——用场景做桥梁\n\"一定要把客观事实（卖点）翻译成主观想象（买点），中间用场景做桥梁。\"举例：情侣异地手串，卖点是\"能远程发震动\"，买点是把\"分离焦虑/想你了\"的情绪场景演出来；防晒投流素材，\"三亚海边场景\" vs \"办公室里冷白皮女秘书\"，后者转化更好——因为它卖的不是防晒，是\"自己很有魅力\"的想象。小米 SU7 对女性的买点不是发动机多少 T，是颜色多、好看。\n**为什么重要**：这是文案/投流的底层公式，决定同样的产品能不能卖出去。\n**你能用**：给你的产品写两版素材，一版讲参数（卖点），一版演场景情绪（买点），小预算投流对比。\n\n### 5. 套利三层模型——信息差 / 资源差 / 金融\n直播里把\"一切生意=套利\"拆成三层：①**信息差套利**最底层最简单（别人知道你不知道，如闲鱼上便宜的加油/资源转手）；②**资源差套利**——在某一端形成绝对优势：要么你手里有足够多能起号的博主（孵 100 个起 40 个），要么你有现金能\"囤粉\"（粉两块买进、能产五块价值，靠资金等周期\"长坡厚雪\"滚起来）；③**金融套利**最高层也最敏感（牌局上一桌身家过亿的人\"一边打牌一边做空掉 90%\"——销售/吹嘘口径，**强烈存疑**）。MCN 之所以挣钱，本质是资源差套利。\n**为什么重要**：给\"我该做什么生意\"一个统一的审视框架——你套的是哪种差？你的绝对优势在哪一端？\n**你能用**：写下你手头每个收入来源，标注它套的是信息差还是资源差，找出最薄弱的那端去加固。\n\n### 6. 小步迭代 vs 草台班子——别用\"学习\"逃避行动\n\"学校教你准备充分再考试，但挣钱是小步迭代、懂个 30 分就开干。\"\"我没有失败，要么成功要么学到东西。\"\"任何事四个小时不能做完，说明你还没奴役好你的 AI。\"主播自陈过去一年\"通过学习逃避行动\"：想直播先要化全妆、洗头、夹头发，纠结口红涂歪……一天就过去了，视频没出几条；现在\"画完就卸、卸完就画\"，素颜也播。还点破\"等我 XX 之后再 YY\"这种句式 = 这事不做了（书虫说陪健身一年没见过、说学车科目一至今没报名）。\n**为什么重要**：这是反完美主义、反拖延的实操心法，配合 AI 把\"行动门槛\"压到极低。\n**你能用**：挑一个你拖了很久的事，今天用 AI 辅助做\"四小时版本\"，先出个不完美的成品。\n\n### 7. 闲鱼是个体户的万能外挂\n反复出现的\"器\"：8.8 元买个顾问陪聊一天帮你选车（你发什么他都帮你看)；AI 搞不定就上闲鱼找人帮做；订东京酒店携程 17000、闲鱼 10500，省出两张机票钱。\"没有什么是 AI 做不到的，如果有，上闲鱼基本能解决。\"\n**为什么重要**：把\"我不会/我没资源\"这类卡点，统一外包成\"花小钱买现成能力/信息差\"，极大降低单干门槛。\n**你能用**：下次遇到\"不会做\"的事，先想一句——这个能不能 8 块钱在闲鱼买到现成的？\n\n### 8. AI token 中转套利窗口（高利润 + 高风险，纯警示）\n小伟口述的现实：腾讯把员工 AI 额度从 3000 刀/月砍到 300 刀/月、百度等大厂也在收紧——催生了 token 中转/逆向（谷歌版逆向、KIRO 逆向、AWS 代理、号商代理）和\"薅羊毛\"（OpenAI 跟新公司合作送 Plus 会员，找黑产批量薅）的灰色生意，利润可达 70%–100%。他给自己员工配\"100 刀的 CC + 100 刀的 WC\"（Claude Code / 某工具）。但他自己也说得很清楚：\"进去就是坐牢，黑灰产才赚钱。\"\n**为什么重要**：它真实揭示了当前 AI 算力价差有多大、套利空间有多诱人——但这条线**踩法律红线**，价值在于看清\"为什么 token 这么贵、谁在中间吃差价\"，而不是去做。\n**你能用**：理解 token 成本结构、给团队配好正规额度即可；逆向/中转那条线不要碰。\n\n## 🛠 可直接复用的方法（含\"不要误读成\"）\n\n**方法 1：喂事实，不喂意图**\n- 核心意思：AI 输出烂是事实喂得少，不是模型菜。\n- 你可以怎么用：提问前先列 5–10 条关于你/业务/数据的硬事实塞进上下文。\n- 不要误读成：写更长更花哨的 prompt——堆形容词没用，堆**具体事实**才有用。\n\n**方法 2：反向提问破盲区**\n- 核心意思：让 AI 论证你判断的反面，逼它说出你看不见的风险。\n- 你可以怎么用：每个重要决策前问一句\"为什么我错了/为什么这事会失败\"。\n- 不要误读成：AI 说反面就一定对——它依然在演逻辑，你要的是\"被提醒到的盲点\"，最终判断还得回到事实。\n\n**方法 3：关键词下钻起号**\n- 核心意思：从母词→封面词→细分词层层下钻，用户从泛人群下沉到决策层。\n- 你可以怎么用：建一份 A1→A4 的关键词内容库。\n- 不要误读成：去抢搜索量最大的大词——大词卷不出头，钱在细分长尾的决策层。\n\n**方法 4：先开干，再迭代**\n- 核心意思：懂 30 分就上，拿反馈迭代，别用\"学习\"逃避行动。\n- 你可以怎么用：把任务砍成\"四小时能出成品\"的版本，今天就做。\n- 不要误读成：可以不学/瞎干——是\"边干边学\"，不是\"不学硬干\"；事实积累照样要做。\n\n## 📅 7 天作业\n\n- **Day 1**：选一件拖了很久的事，用 AI 辅助做出一个\"四小时不完美版本\"，逼自己交付。\n- **Day 2**：给你的一个判断（看好某产品/公司/方向）做一次\"反向提问\"，让 AI 论证它的反面，记下被戳到的 3 个盲点。\n- **Day 3**：列 10 条关于你业务的硬事实，喂给 AI 让它出一份诊断，对比\"不喂事实\"时的回答有多大差距。\n- **Day 4**：挑一个母词，照\"封面关键词下钻法\"做三层，产出一份 A1→A4 关键词表。\n- **Day 5**：给你最强的一个产品写两版素材——一版讲卖点（参数），一版讲买点（场景情绪），各投一点流对比。\n- **Day 6**：盘点你手头每个收入来源，标注它套的是信息差还是资源差，找出最弱的一端写一条加固动作。\n- **Day 7**：下次遇到\"我不会做\"的卡点，先去闲鱼搜一次，看能不能用几十块买到现成能力/信息。\n\n## 🤔 回到自己业务的追问\n\n- 我现在到底缺产品，还是缺流量？如果\"搞米就是搞流量\"，我的精力分配反了吗？\n- 我让 AI 干活时，喂的是\"意图\"还是\"事实\"？我能立刻列出 10 条业务硬事实吗？\n- 我手头的生意，套的是信息差、资源差还是没有差（纯卖力气）？\n- 我有没有在用\"等我学完再做\"逃避行动？哪件事可以今天就出个四小时版本？\n- 我能不能给产品写出真正的\"买点\"（情绪/场景），而不是一直在讲卖点（参数）？\n- 我蹭局/攒关系花的钱和时间，转化成\"上桌资格\"了吗，还是只是消费焦虑？\n- 高利润的灰色机会出现时，我分得清\"看清结构\"和\"亲自下场踩线\"的边界吗？\n\n## 👥 关键人物与资源（这桌人能给你什么）\n\n| 人 | 是谁 | 对你的价值 |\n|---|---|---|\n| **siuser 小伟** | 录音主角；做 AI 硬件（对标 AI 语音对话机器人/AI 小智）+ 跨境工具站 + AI token 中转，自称运气好卡进 token 窗口、但\"上不了过亿大佬的桌\" | 真实的\"夹心层个体户\"样本：怎么蹭局、套电卡、薅羊毛、靠运气卡窗口 |\n| **涛哥** | 小伟同行好友，已转做 APP\"赚点小钱\"，主张\"做网站简单但天花板低、APP 难但赚钱\"，反复劝小伟顺手做 APP | APP vs 网站的路线判断、找兼职跑 APP 的思路 |\n| **直播主播（女，水晶手串 / AI 教学）** | ASR 未给名；做水晶手串生意+经销商体系，开 199 私域社群、地球号 AIJCEE，正赶论文/6.1 答辩，被外放整场 | 本篇最大知识源：起号/套利/卖点翻译/用好 AI 一整套心法 |\n| **飘哥 / 巧玲** | AI 产品出海团队，飘哥团队 100+ 人、几个亿规模、约 40 岁；巧玲更激进投的项目更多（**规模为现场口径，存疑**） | AI 出海团队对标；\"全员 AI、全员做产品\"的组织形态 |\n| **周阳** | 群里的人，94 年，大学就做 APP/产品，卖游戏卖了几个亿财务自由、退出后又从 0 到 1（曾自述抑郁、现好转） | 年轻连续创业者样本；\"退出再重启\"的心态 |\n| **九日论道 / 扫描全能王增长负责人** | 把一个 5 人边缘部门做到该领域第一、团队 50+，做 App 出海增长（小伟付费 6000 的课没学，快过期） | App 出海增长打法的对接人/课程 |\n| **万能小组件团队** | 50 人公司、十几个矩阵号常年 App Store 前 20，因 Menace 把核心团队搬美国；老板身家几千万（小伟发 200 红包被群嘲） | 小团队矩阵号打爆 App Store 的标杆 |\n| **马老师 / 富贵老师** | 直播主播口中的两位老师，提供压力测试提示词、\"AI 是聪明小孩\"\"任何事都有周期\"等心法（提示词据称是课程内容不外传） | 提示词与认知心法的源头 |\n| **卡兹克（数字生命卡兹克）** | AI 公众号大号，一条广告报价 20 万、单篇阅读大几万（**口径存疑**） | AI 内容变现的天花板对标 |\n\n## 💬 金句\n\n- \"搞米就是搞流量。\"——产品过剩时代，分发是唯一壁垒。\n- \"你给它足够多的事实，它给你的答案就是精准的；事实不够多，结果就很烂。\"——AI 协作的总开关：事实 > 逻辑。\n- \"世界上是个巨大的草台班子。\"——挣几千万的老板照样问你小红书怎么发，别被\"认知差距\"吓住。\n- \"我没有失败，我要么成功，要么学到东西。\"——反完美主义、把\"做错\"重新定义成\"积累经验\"。\n- \"任何事四个小时不能做完，说明你还没奴役好你的 AI。\"——AI 时代把行动门槛压到极低。\n- \"有什么东西不是低买高卖的吗？\"——别用\"道德感\"给套利自我设限（注意：仅为其商业观点，不等同合规建议）。\n- \"他们时不时旁边就坐一个过亿的老板，然后又为了几万块斤斤计较，就很难受。\"——小伟对\"夹心层\"处境最诚实的一句自白。\n\n## ⚠️ 来源边界\n\n本篇基于飞书妙记逐字稿整理，**跨 3 段妙记合并**：分段1（obcnxibtrxkc2chtdhm54789，5h59m）+ 分段2（obcnxjm8f421egr13u76v1q9，5h59m）+ 分段3（obcnxj3rr65x91nr711u416m，1h33m），三段为同一天同一拨人的连续录音，frontmatter 用分段1的主 token。\n\n本场**信息密度偏低**：约八成内容是酒店前台/客房对话、地铁与高铁报站广播、香港石材装修工厂对单（门槛石/窗帘盒/楼梯材料/螺杆等，属另一条无关业务线）、带娃陌生乘客闲聊等生活噪声，已剔除不计入复盘。真正可学的内容集中在火锅局闲聊与一场被外放的\"水晶手串+AI 教学\"直播回放里。\n\n人名均以 ASR 识别为准（涛哥、飘哥、巧玲、周阳、卡兹克、马老师/富贵老师、九日论道、黄梦晨等可能有偏差，真实姓名待核）；所有金额/规模/利润率/阅读量（如月 GMV 一百多万、token 利润 75%–100%、卖 300 刀/卖麻了、一条广告 20 万、牌局一晚做空掉 90%、月薪/年薪数字等）均为现场聊天或直播销售口径，未独立核实，使用前请存疑。涉及 token 逆向/中转、薅羊毛、做空等内容仅为现场转述，**不构成任何操作建议，且部分涉法律红线**。不含原始逐字稿正文。";
