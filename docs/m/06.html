var SRC = "> 场景：「九日问道」线下闭门会 · 深圳（4楼会场）· 主持人戴老师（疑似「九瑞/九日问道」主理人，做抖音/IP商业化拆解）。上半场是 3 场服务商干货（青创王峰讲 AI 替代工作流 + Adapty 崔泰讲订阅变现大盘数据 + AppGrowing Abby 讲素材投放算法）；下半场是一场创始人圆桌（HelloTalk、新创、国英科技万能小组件、闪点智能 faceplay）+ 开放麦（uwork/墨造 AI 口罩、OpenRouter 中转站团队、CTAI、买量方张岩、Pika 脸搭）。参会者基本是工具 APP 出海 / AI 应用圈，\"九邦系\"出身的人很多。\n>\n>\n>\n> ⚠️ 这场录音前 4 小时几乎全是堵路、找会场、吃饭、刷短视频外放的环境噪声（ASR 把抖音剧情、导航语音都收进来了），真正有信息的内容从分段1的 04:23 才开始。飞书原摘要若按全程关键词归纳，大概率会把\"价格、本地化、流量、微信\"和一堆生活流水混在一起——别被它带偏，这其实是一张<strong>AI 时代 APP 出海\"投放变贵→变现补救→素材为王→入口迁移\"的完整链条图</strong>。\n\n## ⏱ 如果只读 10 分钟（8 条带走判断）\n\n1. <strong>流量正在系统性变贵，且回不去了</strong>。多位创始人体感一致：美国工具赛道 CPI/单用户付费成本两三年涨了 30%–50%，Adapty 给的口径是某垂类 CPI 从 6 美元涨到 9 美元（涨约 44%），但<strong>总投放预算没怎么涨</strong>——价涨了，量没涨，说明是存量市场里\"出价的人变多了\"。\n2. <strong>变贵的根因是 AI 把供给端炸开了</strong>：手搓一个 APP 太容易，同质产品疯狂洗用户心智；同时大模型本身替代了一部分\"下载 APP\"的需求，用户下载意愿下降。供给暴增 + 需求疲软，两头夹击推高 CPI。\n3. <strong>投放红利结束，钱要从\"买量\"挪到\"变现\"和\"素材\"</strong>。平台越来越聪明，钻空子的空间越来越小，投手从\"管账户\"变成\"管素材创意\"。这场会的潜台词：买量这关大家拼不出差异了，胜负手前移到<strong>变现设计</strong>和<strong>爆款素材</strong>。\n4. <strong>订阅结构有明确最优解（Adapty 大盘 2 万客户口径）</strong>：周订阅占比逐年上升、在抢月订阅的份额；\"周订阅 + 免费试用\"的漏斗转化最高，拉长到半年/一年看 LTV 能到 5–6 倍。但<strong>免费试用要分品类给</strong>——工具/健康/教育/图音视频给试用有正向溢价，生活方式/生产力工具给试用容易被白嫖完就流失。\n5. <strong>付费墙的\"暗黑设计\"是合规边界内的转化术</strong>：把价格写在按钮里、用 50% 透明度的延迟关闭按钮、把\"3天免费→扣一年\"做成第二选项让用户误以为免费——合规但取巧，对中老年/美国下沉用户转化极高。这是一把双刃刀，知道原理是为了<strong>看懂同行、也守住自己产品的底线</strong>。\n6. <strong>素材的底层逻辑变了：先理解素材，再反向定义人群</strong>。Meta 分发模型从\"双塔\"升级到\"交互式\"（提到 HSNN），算法不再只看你点了什么，而是看素材前 3 秒激发了你什么情绪、情绪又驱动什么行为。爆款拼的是\"情绪钩子 + 语义内容一致性\"，不是堆素材数量。\n7. <strong>AI 产品别掉进\"token 越烧越值钱\"的陷阱</strong>。国英科技创始人最尖锐：生图生视频类边际成本随用户量上升，本身就不是好商业模式；选模型要按\"功能需要做到什么程度\"来选（TTS 用 MiniMax 还是别家、文本用千问还是 Claude，成本差十几到几十倍），而不是无脑上最贵的模型。能让用户\"感受不到 AI 存在\"反而是控成本的好方式。\n8. <strong>入口可能要从 APP 迁移到对话/语音/IM bot，但不会一夜清场</strong>。戴老师押\"IM bot 入口\"未来能和 Web、APP 三分天下；闪点严总用《Her》《黑镜》类比未来交互；但多数人共识是：高确定性、流程化、需要中间可控的任务，对话式交互暂时接不住，老的编辑界面会\"藏在背后\"而非消失。\n\n## 🎯 这篇真正能学什么\n\n这不是一场\"谁家产品牛\"的展销，而是一张 <strong>AI 时代 APP 出海的价值链迁移图</strong>。值得练的是四种眼力：①<strong>看懂流量经济学</strong>——为什么变贵、变贵之后钱往哪挪；②<strong>看懂订阅变现的\"工程化\"</strong>——SKU 结构、试用、本地化、AB 测试的优先级是有大盘数据支撑的，不靠拍脑袋；③<strong>看懂素材算法的代际变化</strong>——从\"匹配标签\"到\"理解情绪语义\"，以及 AI 怎么反过来打 AI 的算法；④<strong>看懂入口迁移与定价范式</strong>——token 成本怎么消化、对话式交互能吃掉什么吃不掉什么。读完别记产品名，记这四张图。\n\n## 🧭 道法术器势（→ 你可以怎么用）\n\n| 层 | 本场榨干版 | 你可以怎么用 |\n|---|---|---|\n| <strong>道</strong> 明向 | AI 把\"做产品\"的供给炸开 → 流量必然变贵、同质必然内卷；价值从\"卖功能/卖下载\"转向\"卖结果/卖高价值服务\"；人的底层需求没变，AI 只是新工具，别为了用 AI 而用 AI | 先问：我赚的是\"被无限复制的功能费\"，还是\"别人复制不了的结果/服务/高价值人群\"？ |\n| <strong>法</strong> 立本 | 流量贵→双线作战：一手增营收（变现做细）、一手降成本（算细账）；订阅结构有大盘最优解（周订阅+试用）；定价\"抄比创新容易\"，看头部怎么定（阶梯订阅/积分制/Costco 会员制） | 把\"变现工程化\"当一条独立业务线来经营；定价先去扒 3 个 top 同行怎么收钱再设计 |\n| <strong>术</strong> 立策 | 付费墙暗黑设计（价格藏按钮里、延迟透明关闭键、误导性 SKU 排序）；素材\"前3秒情绪钩子+三段论(片头/片中/片尾)\"；员工矩阵 120 个账号低成本获客；需求\"先验\"——花 15 美金小测试验证付费意愿再倒推 token 成本 | 选一个最小动作：拆一张同行付费墙的\"套路\"；或给一条爆款素材做\"片头情绪/片中代入/片尾CTA\"三段拆解 |\n| <strong>器</strong> 成事 | Adapty（订阅变现 SaaS+2026 订阅报告）、AppGrowing（素材 AI 策略分析+AI 仿拍）、CTAI（行为+非结构化数据 AI 分析）、Claude Code/Codex（一人写全栈）、中转站（OpenRouter 级 token 聚合）、买量方（CPA 14–23 美金接量） | 给自己挑一个：用订阅报告对标自家数据、用素材平台拆竞品、用 AI 把竞品拆解从\"半天/一天\"压到\"半小时\" |\n| <strong>势</strong> 察时 | CPI 长期上行；周订阅份额上升；AI lifestyle 应用收入 +691%（约7倍）、图像/视频生成是最猛三垂类；语音输入(\"并线/Voice first\")是兵家必争之地；IM bot/对话式交互是下一代入口候选；生产力工具因 AI 进入\"builder 制\"组织变革 | 趁窗口卡\"有后端变现 + 高客单\"的细分，避开图音视频最卷红海；关注语音输入/对话入口的新形态机会 |\n\n## 📚 深挖：12 个值得单独学的知识点\n\n### 1. CPI 为什么涨、却\"价涨量不涨\"——AI 时代流量经济学\n戴老师给的数字：他跑的 AI 卡路里产品获客成本从去年 2–3 刀涨到现在 3–4 刀；另一组数据 CPI 从 6 美元涨到 9 美元（约 +44%），但<strong>整体 ads spending 基本没变</strong>。他归因两条：①AI 让产品供给暴增，APP Store 下载量虽涨，但涨的是\"开发者各自做营销\"而非用户真愿意多下载，参与营销的玩家变多→竞争变激烈→CPI 涨；②大模型本身替代了\"下载一个 APP\"的场景，用户下载渴望度下降→同样推高 CPI。<strong>为什么重要</strong>：这解释了\"价涨量不变\"这个反直觉现象——老玩家发现 CPI 太高只能减预算（投了是亏的），所以总量没涨。这是一个存量博弈的标准信号。<strong>你能用</strong>：如果你的 CPI 在涨但行业总投放没涨，别想着加预算抢量，应该把钱挪到变现和素材上算细账。\n\n### 2. AI 已经能替代研发链路里哪几段（青创王峰的实操清单）\n王峰把产品工作拆成\"行业调研→竞品拆解→数据分析→用户研究→产品交付\"五段，逐段说 AI 替代到什么程度：\n- <strong>调研</strong>：写脚本在本地设备 24 小时跑，监听竞品的上升/下滑/迭代/下架，已<strong>完全替代</strong>一个每天扒数据的产品同学（\"AI 24 小时不会出错，但人会\"）。\n- <strong>数据采集</strong>：把 APK 丢给 AI 助手、让它装反编译工具按规则解析，原来要安卓同学花半小时排期的活，现在产品自己一键搞定，报告还更规范（不因人水平不同而波动）。\n- <strong>数据分析/清洗</strong>：杂乱数据直接给 AI 整理清洗。\n- <strong>Demo 改造</strong>：基本不再人工开发 demo，AI 一天搞定。\n<strong>为什么重要</strong>：这是一份\"哪些岗位动作会被先吃掉\"的真实地图，且王峰直言副作用——\"AI 替代之后，团队很难有初级人员去成长\"。<strong>你能用</strong>：把团队工作按\"标准化/非标\"拆，标准化的交给 AI 脚本+一键部署（他用 GitHub + Visor 部署成内部工具分享给团队），非标的让 AI 做润色和减重复清洗。竞品拆解可从\"半天到一天\"压到\"半小时\"。\n\n### 3. 付费墙的\"暗黑模式\"——合规边界内的转化术\n这是上半场信息密度最高的一段，王峰（自称做娱乐向 IA、商业化\"激进粗暴\"）逐条拆：\n- <strong>关闭按钮</strong>：从不写 \"close\"，只放一个透明度 50%、延迟 2 秒出现、极小的关闭键，故意把返回键从左挪到右，目的是提高用户在订阅页停留时长、提高订阅点击率。\n- <strong>价格展示</strong>：不直接写\"多少天多少钱\"，把价格折算成\"每月 XX\"的小字、用和上面不一样的颜色（利用\"用户先看颜色\"的阅读习惯绕审核）；按苹果要求只需是本地最低单价即可。\n- <strong>信任锚</strong>：加\"苹果担保 / Apple guarantee 仲裁 / 随时退款\"等字样降低警惕。\n- <strong>SKU 误导排序</strong>（戴老师补充的三页对比）：把权限罗列成像\"一团免费功能\"，按钮写 \"start learning\" 让用户误以为免费；\"cut offer（1块钱两周）\"和 \"free trial（点了直接扣一年）\"并排，用户绕过 offer 选 free trial 时反而中了\"7 天忘记取消扣一年\"的更大坑。\n<strong>为什么重要</strong>：这套东西<strong>合规但取巧</strong>，对\"没那么聪明、机智\"的用户尤其是中老年/美国下沉用户转化极高、回本周期短；产品出身的开发者会本能抵触并很快识破。<strong>你能用</strong>：拆一张你竞品的付费墙，标出每个\"取巧点\"；再决定自己产品要不要、要哪些——知道边界是为了既看懂同行、也守住底线。<strong>不要误读成</strong>：\"越坑越好\"——产品调性高、面向高客单人群时，这套反而会拉低高级感。\n\n### 4. 周订阅 + 免费试用，是当前订阅最优漏斗（Adapty 大盘口径）\nAdapty 崔泰（总部纽约、19 年创立、约 2 万客户、OpenAI 内外端在用、做订阅变现 SaaS）给的 2026 订阅报告结论：23→24→25 年<strong>周订阅安装适用率逐年上升</strong>，月订阅掉得厉害；\"周订阅 + 试用\"的转化漏斗显著高于\"月/年 + 试用\"；担心\"周订阅+试用会拉低 LTV\"的人，把窗口从 0 拉到 180 天看，这个组合的半年到一年 LTV 反而能涨 5–6 倍。<strong>为什么重要</strong>：很多团队凭直觉觉得周订阅\"不值钱\"，但大盘数据指向相反方向，且这是最简单落地、效率最高的策略。<strong>你能用</strong>：默认先给用户推周订阅方案，但回收/LTV 评估一定要拉长窗口看，别从第 0 天的回本率下结论。⚠️ 数字为 Adapty 销售口径，使用前建议拿自家数据验证。\n\n### 5. 免费试用要\"分品类给\"，不是越多越好\nAdapty 口径：工具类、大健康、教育、图片/音视频，给免费试用对转化和 LTV 有明显帮助；但生活方式（lifestyle）、生产力工具（productivity）给试用，用户很可能\"白玩两三天就流失\"。生产力工具数据显示<strong>直接购买的用户留存率更高</strong>，建议这类干脆不推免费试用。<strong>为什么重要</strong>：免费试用不是中性工具，它对不同品类是正/负溢价，一刀切会变相压低收入。<strong>你能用</strong>：先确认自己品类属于\"试用友好\"还是\"试用流失\"，前者把试用做足、后者把试用和付费订阅结构绑起来（甚至不给试用）。\n\n### 6. 优化的优先级顺序：本地化 → 价格 → 布局 → 文案视觉 →（最后）特定市场价格\nAdapty 反复强调一个反直觉顺序：<strong>不要一上来就测价格</strong>。推荐顺序是先做本地化（成本最低，只需翻译文案+货币单位+合规微调，但对远端市场增幅最明显）→ 再测套餐组合/试用/订阅时长 → 再测布局 layout → 再测文案和视觉 → 最后才针对特定地区测价格。另外两条配套结论：①iOS 和安卓在娱乐/生活方式/图片视频/AI 类要<strong>当两套独立变现业务做</strong>，别把 iOS 付费墙整套复制到安卓（等于自己压低收入）；②美国跑差不多后，建议去日本、墨西哥、土耳其、巴西做本地化测试——这些市场用户 LTV 已追平甚至超过美国。<strong>你能用</strong>：把\"测试日程\"按这个顺序排，本地化先行；月流水 <10 万时先怀疑\"产品核心价值与该地区市场不匹配\"，去新兴市场试，而非一味怪品类太卷。\n\n### 7. \"第一次会话定生死\"——付费墙时机\nAdapty：约 9 成用户的免费试用或订阅都发生在<strong>安装当日的首次会话</strong>。如果第一次打开 APP 时没有把价格-价值的强绑定推送给用户，后续再用邮件/短信营销拉回的效果非常弱（数据上差异约 0.1%）。唯一例外是教育类——学习是长线，转化耗时可能拉到 30 天左右。<strong>为什么重要</strong>：这把\"付费墙放哪/何时弹\"从玄学变成了有数据支撑的硬约束。<strong>你能用</strong>：从引导页（onboarding）就开始设计付费墙，把它当成整套变现策略的起点和最该优化的方向；图片生成类尤其要在 onboarding 抓画像、在引导页最后一页直接推最贴合需求的订阅。\n\n### 8. Meta 算法从\"双塔\"到\"交互式\"——素材逻辑的代际变化\nAppGrowing 的 Abby：随 HSNN 引入，Meta 分发模型从\"双塔\"变成\"交互式\"。旧双塔：你点了一个\"帮助母女\"的模拟经营素材，平台判定你是\"轻度三消模拟经营用户\"。新模型：它看的是这条素材<strong>激发了你什么情绪</strong>（保护、修复、帮助弱势群体的高警觉感），情绪又驱动什么行为。结论金句：\"现在新算法让大家先<strong>理解素材本身，再反向定义人群</strong>。\"另一条重要区分：生成式 AI 解决的是<strong>制作效率</strong>，不是分发效率；过去同质素材被判低质，2026 年要用 AI 去\"看懂为什么这条素材会火\"，和算法做对等博弈。<strong>你能用</strong>：做素材别先想\"投给谁\"，先想\"这条素材前 3 秒打的是什么情绪、情绪导向什么行为\"，让素材自己去定义人群。\n\n### 9. 爆款素材的\"三段论\"拆解法（片头/片中/片尾）\nAbby 以 DanceAI（C 端，上传图视频→AI 舞蹈特效短视频，2/1 开投，3 月中下旬一波买量高峰）为例，演示 AppGrowing 的\"片段级拆解\"：<strong>片头</strong>（约前 17%）直观快速展示产品功能 + 传递\"生成效果优秀\"的卖点；<strong>片中</strong>（约 30%、9 秒）用\"胖大叔跳少女舞\"这种猎奇元素吸睛 + 增强代入感；<strong>片尾</strong>承接 CTA 与推送。再叠加\"AI 仿拍/自研 agent 高效复刻高频片段\"和\"换底层脚本但保留逻辑→把职场压力改成职场解压、受众人群就变了\"的玩法。<strong>为什么重要</strong>：这是一套可复用的素材结构化模板，把\"凭感觉做素材\"变成\"按段位设计钩子\"。<strong>你能用</strong>：拆任意一条爆款，标出片头钩子（情绪/卖点）、片中代入（猎奇/真人/欧美面孔）、片尾 CTA，再用同一脚本骨架换创意外壳裂变。\n\n### 10. 别掉进\"token 越烧越值钱\"的陷阱——AI 产品的边际成本与模型选型\n国英科技（万能小组件，国内霸榜近 10 年）创始人最锋利的一段：移动互联网时代一个 APP 边际成本接近 0，但生图/生视频产品<strong>用户量越大边际成本越高</strong>，本身就不是好商业模式。他们刻意不做图音视频。核心方法论：①别为了\"用 AI\"而做产品，要解决用户需求点，甚至让用户<strong>感受不到 AI 的存在</strong>就是一种控成本方式；②<strong>模型选型按功能需要分级</strong>——TTS 用 MiniMax vs 别家、文本用千问 vs Claude/GPT，成本差十几到几十倍，\"先想清楚功能要做到什么程度，再选适合的模型，而不是每次都上最贵的\"。<strong>你能用</strong>：算清你每个功能的\"最低可用模型\"，把贵模型只用在用户真在意效果的场景（HelloTalk 的做法：高质量头像生图给最好模型但限额度、引导分享换额度）。\n\n### 11. 流量贵之后的两条真实出路：员工矩阵 & 高客单 toB\n闪点智能（faceplay/AI 换脸，做了 13 年、约 170 人、自承\"非常不擅长投放、靠自然流量\"）严总给了两条已验证的解法：\n- <strong>员工矩阵</strong>：从老板到合伙人到高管到员工，做了 120 个员工账号，3–4 个实习生管 100 多个号、每天自动发内容；小红书上一个\"长得帅的开发小哥\"已有 15 万粉、月增 1 万多。还把这套打包成产品赋能教育/微商/品牌客户。对标追觅 CEO 于浩\"日更百条\"、网红校长\"日更百条\"。\n- <strong>高客单 toB/智能体</strong>：把一位老师的思想做成智能体对话产品，先想卖 399（引流）算下来不挣钱，最后卖 1 万/年、去年卖了 7000 多个 = 7000 多万，靠线下卖给粉丝/学员、搭课程卖；另一个智能体玩法卖 5980，用户天天在群里打卡，而免费用户只会拿你和剪映对比。结论：\"越高价值的用户越能把产品用起来、粘度越高。\"香港保险群体的订阅内容（每天 11 条素材：3 条短视频+1 条小红书+1 篇文章+1 条播客+朋友圈）收 3000/月，因为一条视频算力成本就要 16 块，收 300 连成本都不够。<strong>你能用</strong>：流量买不动时，往\"低成本内容矩阵\"和\"高客单人群\"两头走，别在中间夹层硬投。\n\n### 12. APP 会不会被大模型吃掉——入口迁移的三种判断\n第三个圆桌问题，几种观点值得对照：\n- <strong>戴老师</strong>：押 IM bot 入口（聊天工具里的 bot）未来能和 Web、APP 三分天下；引钉钉高管/龙虾创始人\"很多按钮键 APP 会死掉\"的说法。\n- <strong>谨慎派（HelloTalk 翔哥）</strong>：对话式适合\"容错率高、一问一答、轻量级\"的场景；但流程式工作每一步交付要明确结论、中间要可控可暂停可微调，对话式给一个输入吐一个结果、不可控、还烧 token，体验糟，所以不会简单替代。\n- <strong>悲观派（陈曦）</strong>：把判断锁在 2 年/5 年两个节点，认为大多数业务高概率被替代；AI 短期做不到的三件事——①情绪价值（\"豆包没法在你跟女朋友吵架时帮你哄好她\"，利好游戏泛娱乐）；②复杂决策（怎么经营公司、怎么做到榜单 top）；③AI 取不到的物料（IoT/可穿戴如 Oura 拿到的健康数据是 AI 没有的学习资料）。\n- <strong>乐观派（闪点严总）</strong>：\"老的编辑界面会藏在背后，入口交互会变\"；并延伸到组织变革——他和新创创始人都讲了 <strong>builder 制</strong>：生产力变了→生产关系变→分配方式变（从固定薪资+奖金变成项目分成制），新创甚至出现\"产品出需求、AI 全写完，技术有半个月没活干\"。还提到四个阶级跨越杠杆：资金/劳动力/影响力/技术，AI 让没有技术背景的人也能撬动技术杠杆。\n<strong>你能用</strong>：别赌单一终局，按\"任务确定性高低\"分流——高确定性流程化任务守住可控编辑界面，低确定性轻量任务拥抱对话入口；同时认真想：AI 让你的\"能力杠杆\"放大后，你的组织和分配方式要不要跟着改。\n\n## 🛠 可直接复用的方法（含\"不要误读成\"）\n\n<strong>方法 1：把变现当成一条独立工程线（不是顺手做的事）</strong>\n- 核心意思：流量买不动后，胜负手在 SKU 结构/试用/本地化/AB 测试，且这些有大盘最优解和优先级顺序。\n- 你可以怎么用：照 Adapty 顺序排测试日程（本地化→套餐→布局→文案视觉→特定市场价格），周订阅+试用做默认漏斗，付费墙从 onboarding 就开始设计。\n- 不要误读成：变现 = 把价格定高。变现是结构+时机+本地化的组合工程。\n\n<strong>方法 2：素材按\"情绪—行为\"逻辑做，三段论拆爆款</strong>\n- 核心意思：算法已从匹配标签升级到理解情绪语义，素材先打情绪、再让算法反向定义人群。\n- 你可以怎么用：每条素材明确\"前3秒打什么情绪\"，按片头(钩子)/片中(代入)/片尾(CTA)拆，再换脚本外壳裂变。\n- 不要误读成：堆更多同质素材。数量不再是壁垒，情绪钩子和语义一致性才是。\n\n<strong>方法 3：需求\"先验\"——先低成本验证付费意愿，再倒推 token 成本</strong>\n- 核心意思（陈曦举的欧美个人开发者例子）：做一个\"AI 帮你判断 dating 对象是不是 nice 的人\"功能，每人收 15 美金，先验证用户愿付多少，再倒推 AI 该花多少 token——商业模式可被先验验证。\n- 你可以怎么用：上线前先用最小功能+真实收费测付费意愿，落在\"用户心理账户愿意为这个结果花多少钱\"上，再反推模型成本。\n- 不要误读成：先想定价。先想用户需求和心理账户，定价是结果。\n\n<strong>方法 4：模型按功能分级选型 + Costco 会员制定价</strong>\n- 核心意思：不同功能用不同价位模型（成本差十几到几十倍）；定价可学 Costco——靠会员费赚钱，token 按成本价\"过一遍\"卖，甚至让用户自带 API。\n- 你可以怎么用：列出每个功能的\"最低可用模型\"；定价\"抄比创新容易\"，扒 3 个 top 同行（提到 Flat AI、Post AI 等）的阶梯订阅/积分制再设计。\n- 不要误读成：无脑上最贵模型 = 产品更好。用户要的是结果达成，不是模型规格。\n\n## 📅 7 天作业\n\n- <strong>Day 1</strong>：算一笔自家账——近 3 个月 CPI/单用户付费成本的变化曲线，对照\"价涨量不涨\"判断你是不是在存量博弈里。\n- <strong>Day 2</strong>：拆 3 张同行付费墙，逐条标出\"取巧点\"（关闭键/价格展示/SKU 排序/信任锚），决定哪些你愿意用、哪些越底线。\n- <strong>Day 3</strong>：按 Adapty 顺序给自己排一张测试日程表（本地化→套餐→布局→文案视觉→特定市场价格），先把本地化清单列出来。\n- <strong>Day 4</strong>：判断自己品类属于\"试用友好\"还是\"试用流失\"，据此重设免费试用策略；检查 iOS/安卓是否被你当成两套独立变现业务。\n- <strong>Day 5</strong>：挑一条本垂类爆款素材做三段论拆解（片头情绪/片中代入/片尾CTA），写出\"换脚本外壳\"的 2 个裂变方向。\n- <strong>Day 6</strong>：给一个核心功能做模型分级选型，列出\"最低可用模型\"和\"用户真在意效果时才上的贵模型\"，估算月度 token 成本。\n- <strong>Day 7</strong>：设计一个\"需求先验\"小实验（最小功能+真实收费），找 10 个目标用户验证他们愿不愿付、愿付多少。\n\n## 🤔 回到自己业务的追问\n\n- 我的 CPI 在涨吗？涨了之后我是在加预算抢量，还是把钱挪去做变现和素材？\n- 我赚的是\"会被无限复制的功能费\"，还是\"复制不了的结果/高价值人群/服务\"？\n- 我的付费墙是从 onboarding 第一次会话就开始抓，还是指望后续邮件短信拉回？\n- 我的免费试用是按品类给的，还是一刀切？iOS 和安卓我当成一套还是两套在做？\n- 我做素材是先想\"投给谁\"，还是先想\"前 3 秒打什么情绪\"？\n- 我是不是为了\"用 AI\"而堆 token，掉进了边际成本越来越高的陷阱？\n- AI 把我的\"能力杠杆\"放大后，我的组织和分配方式（薪资 vs 项目分成）要不要变？\n- 如果对话式/语音入口真起来，我哪些功能该守住可控编辑界面、哪些该拥抱新入口？\n\n## 👥 关键人物与资源（这桌人能给你什么）\n\n| 人 | 是谁 | 对你的价值 |\n|---|---|---|\n| <strong>戴老师 / 九瑞 / 九日问道主理人</strong> | 主持人，做抖音/IP 商业化拆解，每年做 IP 课程，押\"IM bot 入口\"；全国巡回办闭门会（6/26 成都、9 月广州、三四个月内深圳企业家会） | APP 出海/商业化的局与资源入口；商业化拆解视角 |\n| <strong>王峰（青创/星创系）</strong> | 青创旗下某 team 总负责人，公众号\"微图AI笔记\"每天拆一个产品；AI 替代全工作流的表率 | AI 工作流落地实操；脱敏版投放 ROI 预测 skill + 数据爬取脚本（现场承诺开放） |\n| <strong>崔泰（Adapty）</strong> | 纽约订阅变现 SaaS（约 2 万客户，OpenAI 在用），出 2026 年度订阅收入报告 | 订阅 SKU/试用/本地化/AB 测试的大盘数据与最优解；报告可贴自家产品对标 |\n| <strong>Abby（AppGrowing/App Growing）</strong> | 全球广告 AI 策略分析平台，AI 画面解析/策略分析/AI 仿拍 | 竞品素材拆解、爆款三段论分析、AI 仿拍复刻高频片段 |\n| <strong>刘成/Lex（HelloTalk）</strong> | 语言学习社区（约 10 年、靠自然增长/网络效应），双档会员 | 自然增长/网络效应+UGC+GEO 回写打法；按场景而非按功能定价的思路 |\n| <strong>陈曦（深圳新创集团）</strong> | 客户负责人，订阅工具 APP；做 Body Wave（HRV）从 0 到 1 | 广告变现+订阅变现+增长细分经验；\"需求先验\"+AI 能力边界判断 |\n| <strong>国英科技创始人</strong> | 万能小组件（国内霸榜近 10 年），近年做 AI 新产品 | \"别掉 token 陷阱\"+模型分级选型+KOL/KOC 时机洞察的清醒视角 |\n| <strong>闪点智能严总 / 小林</strong> | faceplay（AI 换脸，做了 13 年约 170 人，靠自然流量） | 员工矩阵 120 账号低成本获客；高客单 toB/智能体（5980、1万/年卖 7000 个）打法 |\n| <strong>顾班/周凡（uwork/墨造）</strong> | 软件工程师转做 AI 口罩硬件（Voice coding 入口），京东众筹、微博 2 亿+曝光、何同学背书 | \"用软件方式做硬件\"+极速 MVP+先把市场拉到前侧的范式；语音输入硬件入口 |\n| <strong>张岩（OK他 团队）</strong> | 买量方，套电商流量/APP/小游戏/AI 破圈/GEO 引导 | 接量变现：CPA 14–23 美金分档，可走百万美金供应商入库 |\n| <strong>李阳（CTAI 解决方案负责人）</strong> | 原做定位/信息，现做 AI 数据分析（行为+非结构化+企业知识库） | 把数据分析延伸到工单/帖子情感解析，并落地到产品 AB 测试 |\n| <strong>OpenRouter 中转站团队（九瑞合伙人）</strong> | 自称做了\"全球最大中转站 OpenRouter\"的用户增长，有 AI 投资+出海增长机构 | token 中转/出海增长/AI 产品投资对接 |\n\n## 💬 金句\n\n- \"AI 24 小时不会出错，但产品（人）会。\"——王峰，说 AI 替代调研岗的底层理由。\n- \"他这个东西就是个免费的……用户的误解率就会非常高。\"——讲付费墙暗黑设计为什么转化高，合规外衣下的取巧。\n- \"周订阅加上免费试用……半年到一年的 LTV 增长可能会在 5 到 6 倍左右。\"——Adapty 反直觉的订阅最优解（销售口径，需自验）。\n- \"现在新的算法体系更让大家知道，我是要先理解素材本身，再反向定义人群。\"——Abby，素材逻辑的代际转折。\n- \"不要掉入到我要去让 AI 产品的这么一个陷阱里面去。\"——国英科技创始人，对\"为用 AI 而用 AI\"最清醒的一刀。\n- \"你卖一万块钱一年的会员，去年卖了 7000 多个，就 7000 多万。\"——闪点严总，高客单+线下卖给粉丝的反互联网打法。\n- \"豆包无法在你跟你老婆或者女朋友吵架的时候帮你哄好她。\"——陈曦，给 AI 能力边界划的一条最具体的线。\n- \"我们是用软件的方式做硬件……直接把市场拉到前侧，而不是闭门研究半年再发出来。\"——周凡，AI 时代做硬件的范式。\n\n## ⚠️ 来源边界\n\n本篇基于飞书妙记逐字稿整理，<strong>跨 2 段合并理解</strong>：分段1（token `obcnxi7521sha52fd3b81szb`，约6小时，前4小时为找会场/吃饭/短视频外放等环境噪声，有效内容从 04:23 起）+ 分段2（token `obcnxiqo15c3u4j7u142i811`，约3小时，圆桌+开放麦，01:55 后转入散场社交闲聊）。人名/公司名以 ASR 识别为准，多处存疑待核：主持人\"戴老师/九瑞/九日（问道）\"疑为同一人但 ASR 写法不一；\"青创/星创/新创/金创\"疑指同一/相近实体（青创-王峰所属，新创集团-陈曦/Body Wave）；\"崔泰/Adopty/Adapty\"\"AppGrowing/Apponly/App Growing\"\"CTAI/CPAI/明迈(token赠送方)\"\"于浩(追觅CEO)\"\"HSNN(Meta算法)\"\"Flat AI/Post AI\"\"墨造/uwork/周凡/顾班\"等均可能有偏差。所有宏观数字（CPI 涨幅、+691%/7倍、LTV 5–6 倍、CPA 14–23 美金、7000 万营收等）为现场服务商/创始人口径，未独立核实，使用前请存疑并自行验证。不含原始逐字稿正文。";
