const listEl=document.getElementById('list'), qEl=document.getElementById('q'),
      countEl=document.getElementById('count'), contentEl=document.getElementById('content'),
      mainEl=document.getElementById('main'), app=document.getElementById('app');
const R=new marked.Renderer(); const ot=R.table.bind(R);
R.table=(h,b)=>`<div class="tablewrap">${ot(h,b)}</div>`;
marked.setOptions({renderer:R,gfm:true,breaks:false});
let active=null;
function rowHtml(it){
  const tags=(it.scenes||[]).map(s=>`<i>${s}</i>`).join('');
  return `<div class="row" data-slug="${it.slug}"><div class="t">${it.title}</div><div class="d">${it.date||''}</div><div class="tags">${tags}</div></div>`;
}
function render(list){
  listEl.innerHTML=list.map(rowHtml).join('');
  countEl.textContent=`共 ${list.length} 篇`;
  [...listEl.querySelectorAll('.row')].forEach(r=>r.onclick=()=>open(r.dataset.slug,r));
}
async function open(slug,rowEl){
  if(active) active.classList.remove('active');
  if(rowEl){active=rowEl; rowEl.classList.add('active');}
  app.classList.remove('open');
  contentEl.innerHTML='<div class="loading">墨迹未干…</div>';
  mainEl.scrollTop=0;
  const it=ITEMS.find(x=>x.slug===slug);
  try{
    const md=await (await fetch('data/'+slug+'.md')).text();
    contentEl.innerHTML=`<h1 class="title">${it.title}</h1><div class="meta">${it.date||''}</div>`+marked.parse(md);
    location.hash=slug;
  }catch(e){ contentEl.innerHTML='<div class="loading">加载失败</div>'; }
}
qEl.oninput=()=>{
  const k=qEl.value.trim().toLowerCase();
  render(!k?ITEMS:ITEMS.filter(it=>(it.title+' '+it.date).toLowerCase().includes(k)));
};
document.getElementById('menuBtn').onclick=()=>app.classList.toggle('open');
document.getElementById('scrim').onclick=()=>app.classList.remove('open');
render(ITEMS);
const h=location.hash.replace('#','');
const first=ITEMS.find(x=>x.slug===h)||ITEMS[0];
if(first){const r=listEl.querySelector(`[data-slug="${first.slug}"]`); open(first.slug,r);}
